/* ═══════════════════════════════════════
   MUSIC THEORY
═══════════════════════════════════════ */
const CHROMATIC = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const DISPLAY_BOTH   = { 'C#':'C#/Db','D#':'D#/Eb','F#':'F#/Gb','G#':'G#/Ab','A#':'A#/Bb' };
const DISPLAY_FLAT   = { 'C#':'Db','D#':'Eb','F#':'Gb','G#':'Ab','A#':'Bb' };
const showNote = (n, style='both') => {
  if (style==='flat')  return DISPLAY_FLAT[n]  || n;
  if (style==='sharp') return n;
  return DISPLAY_BOTH[n] || n;
};

// Top-to-bottom: high E, B, G, D, A, low E
const STRINGS = ['E','B','G','D','A','E'];

function noteAt(si, fret) {
  const idx = CHROMATIC.indexOf(STRINGS[si]);
  return CHROMATIC[(idx + fret) % 12];
}

function matchNote(input, expected) {
  const FLAT_MAP = {'DB':'C#','EB':'D#','GB':'F#','AB':'G#','BB':'A#'};
  const n = input.trim().toUpperCase().replace('♭','B').replace('/','').replace(' ','');
  return (FLAT_MAP[n] || n) === expected;
}

const MAJOR_SCALE = [0,2,4,5,7,9,11];
const MINOR_SCALE = [0,2,3,5,7,8,10];
const PENTATONIC_MAJOR = [0,2,4,7,9];
const PENTATONIC_MINOR = [0,3,5,7,10];

function scaleNotes(root, intervals) {
  const ri = CHROMATIC.indexOf(root);
  return intervals.map(i => CHROMATIC[(ri+i)%12]);
}

  { name:'F7#9', positions:[{s:5,f:1,iv:'1'},{s:4,f:3,iv:'5'},{s:3,f:1,iv:'b7'},{s:2,f:2,iv:'3'},{s:1,f:1,iv:'5'},{s:0,f:4,iv:'#9'}] },
  { name:'F#7#9', positions:[{s:5,f:2,iv:'1'},{s:4,f:4,iv:'5'},{s:3,f:2,iv:'b7'},{s:2,f:3,iv:'3'},{s:1,f:2,iv:'5'},{s:0,f:5,iv:'#9'}] },
  { name:'G7#9', positions:[{s:5,f:3,iv:'1'},{s:4,f:5,iv:'5'},{s:3,f:3,iv:'b7'},{s:2,f:4,iv:'3'},{s:1,f:3,iv:'5'},{s:0,f:6,iv:'#9'}] },
  { name:'Ab7#9', positions:[{s:5,f:4,iv:'1'},{s:4,f:6,iv:'5'},{s:3,f:4,iv:'b7'},{s:2,f:5,iv:'3'},{s:1,f:4,iv:'5'},{s:0,f:7,iv:'#9'}] },
  { name:'A7#9', positions:[{s:5,f:5,iv:'1'},{s:4,f:7,iv:'5'},{s:3,f:5,iv:'b7'},{s:2,f:6,iv:'3'},{s:1,f:5,iv:'5'},{s:0,f:8,iv:'#9'}] },
  { name:'Bb7#9', positions:[{s:5,f:6,iv:'1'},{s:4,f:8,iv:'5'},{s:3,f:6,iv:'b7'},{s:2,f:7,iv:'3'},{s:1,f:6,iv:'5'},{s:0,f:9,iv:'#9'}] },
  { name:'B7#9', positions:[{s:5,f:7,iv:'1'},{s:4,f:9,iv:'5'},{s:3,f:7,iv:'b7'},{s:2,f:8,iv:'3'},{s:1,f:7,iv:'5'},{s:0,f:10,iv:'#9'}] },
  // compact-shape
  { name:'C7#9', positions:[{s:4,f:3,iv:'1'},{s:3,f:2,iv:'3'},{s:2,f:3,iv:'b7'},{s:1,f:4,iv:'#9'}] },
  { name:'C#7#9', positions:[{s:4,f:4,iv:'1'},{s:3,f:3,iv:'3'},{s:2,f:4,iv:'b7'},{s:1,f:5,iv:'#9'}] },
  { name:'D7#9', positions:[{s:4,f:5,iv:'1'},{s:3,f:4,iv:'3'},{s:2,f:5,iv:'b7'},{s:1,f:6,iv:'#9'}] },
  { name:'Eb7#9', positions:[{s:4,f:6,iv:'1'},{s:3,f:5,iv:'3'},{s:2,f:6,iv:'b7'},{s:1,f:7,iv:'#9'}] },
  { name:'E7#9', positions:[{s:4,f:7,iv:'1'},{s:3,f:6,iv:'3'},{s:2,f:7,iv:'b7'},{s:1,f:8,iv:'#9'}] },
  { name:'F7#9', positions:[{s:4,f:8,iv:'1'},{s:3,f:7,iv:'3'},{s:2,f:8,iv:'b7'},{s:1,f:9,iv:'#9'}] },
  { name:'F#7#9', positions:[{s:4,f:9,iv:'1'},{s:3,f:8,iv:'3'},{s:2,f:9,iv:'b7'},{s:1,f:10,iv:'#9'}] },
  { name:'G7#9', positions:[{s:4,f:10,iv:'1'},{s:3,f:9,iv:'3'},{s:2,f:10,iv:'b7'},{s:1,f:11,iv:'#9'}] },
  { name:'Ab7#9', positions:[{s:4,f:11,iv:'1'},{s:3,f:10,iv:'3'},{s:2,f:11,iv:'b7'},{s:1,f:12,iv:'#9'}] },
  { name:'Bb7#9', positions:[{s:4,f:1,iv:'1'},{s:3,f:0,iv:'3'},{s:2,f:1,iv:'b7'},{s:1,f:2,iv:'#9'}] },
  { name:'B7#9', positions:[{s:4,f:2,iv:'1'},{s:3,f:1,iv:'3'},{s:2,f:2,iv:'b7'},{s:1,f:3,iv:'#9'}] },
];

const CHORD_GOAL = 20;

function shuffleArr(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

/* ═══════════════════════════════════════
   FRETBOARD SVG
═══════════════════════════════════════ */
function Fretboard({ markers=[], onCellClick, fretSet, showNotes={}, interactive=false, selectedCell, totalFrets=12, noteStyle='both', boardType='rosewood', theme='vintage', freeLearn=false }) {
  const FW = 70, SH = 32, ML = 54, MT = 36, MB = 18;
  const W = ML + totalFrets * FW + 22;
  const H = MT + 5 * SH + MB;
  const cx = f => f === 0 ? 14 : ML + (f - 0.5) * FW;
  const cy = s => MT + s * SH;
  // Board colors — theme + board type aware
  const isMaple = boardType === 'maple';
  const isVintage = theme === 'vintage';
  const accentColor = theme === 'metal' ? '#00c8ff' : theme === 'funk' ? '#ff40c0' : '#c89030';
  const accentDim   = theme === 'metal' ? '#006888' : theme === 'funk' ? '#a02890' : '#7a5820';

  // Board wood
  const boardTop    = isVintage ? (isMaple ? '#c8a878' : '#3c2010')
                    : (isMaple  ? '#c8a878' : '#111214');
  const boardMid    = isVintage ? (isMaple ? '#b89060' : '#2a1608')
                    : (isMaple  ? '#b89060' : '#0a0c0e');
  const boardBot    = isVintage ? (isMaple ? '#c8a878' : '#3c2010')
                    : (isMaple  ? '#c8a878' : '#111214');
  const grainColor  = isVintage ? (isMaple ? 'rgba(0,0,0,0.06)' : 'rgba(0,0,0,0.12)')
                    : (isMaple  ? 'rgba(0,0,0,0.06)' : 'rgba(255,255,255,0.02)');

  // Inlays
  const inlayFill   = isVintage ? (isMaple ? 'rgba(60,40,20,0.35)'    : 'rgba(240,220,178,0.32)')
                    : (isMaple  ? 'rgba(60,40,20,0.35)' : `rgba(${theme==='metal'?'0,200,255':'255,64,192'},0.18)`);
  const inlayStroke = isVintage ? (isMaple ? 'rgba(40,20,10,0.15)'    : 'rgba(240,220,178,0.12)')
                    : (isMaple  ? 'rgba(40,20,10,0.15)' : `rgba(${theme==='metal'?'0,200,255':'255,64,192'},0.35)`);

  // Nut
  const nutTop      = isMaple ? '#f8f0e0' : (isVintage ? '#f0e0b0' : '#303438');
  const nutBot      = isMaple ? '#d8c8a0' : (isVintage ? '#c8a860' : '#1a1e22');

  // Frets
  const fretColor   = isVintage ? (isMaple ? '#8a7858' : '#8a6420')
                    : (isMaple  ? '#8a7858' : '#2a3038');
  const fret12Color = isVintage ? (isMaple ? '#b0986a' : '#b08840')
                    : (isMaple  ? '#b0986a' : '#3a4450');

  // Strings
  const stringColor = isVintage ? (isMaple ? '#3a2a0a' : '#c8a030')
                    : (isMaple  ? '#3a2a0a' : '#8090a0');

  // Labels
  const labelFill         = isVintage ? (isMaple ? '#7a6040' : '#6a5830')
                          : (isMaple  ? '#7a6040' : accentDim);
  const stringLabelColor  = isVintage ? (isMaple ? '#a07828' : '#c89030')
                          : (isMaple  ? accentColor : accentColor);

  // Revealed note circles
  const noteCircleBg     = isVintage ? (isMaple ? 'rgba(180,130,60,0.9)' : 'rgba(42,22,8,0.85)')
                         : (isMaple  ? 'rgba(180,130,60,0.9)' : 'rgba(10,14,20,0.92)');
  const noteCircleStroke = isVintage ? (isMaple ? 'rgba(120,80,20,0.7)'  : 'rgba(200,144,48,0.6)')
                         : (isMaple  ? 'rgba(120,80,20,0.7)'  : `${accentColor}99`);
  const noteTextColor    = isVintage ? (isMaple ? '#5a3a10' : '#d4902a')
                         : (isMaple  ? '#5a3a10' : accentColor);

  const stringWidths = [1.0, 1.3, 1.7, 2.2, 2.8, 3.5];

  const INLAY = [3,5,7,9];
  const INLAY2 = [12];
  const FRET_LABELS = [1,3,5,7,9,12];

  // Check if a cell has a marker
  const markerAt = (s,f) => markers.find(m => m.s===s && m.f===f);

  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`}>
      <defs>
        <linearGradient id="bgrd" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={boardTop}/>
          <stop offset="40%" stopColor={boardMid}/>
          <stop offset="100%" stopColor={boardBot}/>
        </linearGradient>
        <linearGradient id="nutGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor={nutTop}/>
          <stop offset="100%" stopColor={nutBot}/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
      </defs>

      {/* Board background */}
      <rect x={ML} y={MT - SH*0.55} width={totalFrets*FW} height={5*SH + SH*1.1}
        fill="url(#bgrd)" rx="2"/>

      {/* Wood grain lines */}
      {[0.2,0.45,0.72,0.88].map((t,i) => (
        <line key={i}
          x1={ML} y1={MT - SH*0.55 + t*(5*SH+SH*1.1)}
          x2={ML+totalFrets*FW} y2={MT - SH*0.55 + t*(5*SH+SH*1.1)}
          stroke={grainColor} strokeWidth="1"/>
      ))}

      {/* Fret set highlight */}
      {fretSet && (() => {
        const isMetal = theme === 'metal';
        const isFunk  = theme === 'funk';
        const fillRgb   = isMetal ? '0,200,255' : isFunk ? '255,64,192' : '180,120,30';
        const strokeRgb = isMetal ? '0,200,255' : isFunk ? '255,64,192' : '200,160,60';
        const barRgb    = isMetal ? '0,200,255' : isFunk ? '200,255,32' : '200,160,60';
        return (
        <>
          <rect
            x={ML + (fretSet[0]-1)*FW} y={MT - SH*0.55}
            width={(fretSet[1]-fretSet[0]+1)*FW} height={5*SH+SH*1.1}
            fill={`rgba(${fillRgb},0.13)`} rx="2"/>
          <rect
            x={ML + (fretSet[0]-1)*FW} y={MT - SH*0.55}
            width={(fretSet[1]-fretSet[0]+1)*FW} height={5*SH+SH*1.1}
            fill="none" stroke={`rgba(${strokeRgb},0.55)`} strokeWidth="1.5" rx="2"/>
          <rect
            x={ML + (fretSet[0]-1)*FW} y={MT - SH*0.55}
            width={(fretSet[1]-fretSet[0]+1)*FW} height={3}
            fill={`rgba(${barRgb},0.6)`} rx="1"/>
          <rect
            x={ML + (fretSet[0]-1)*FW} y={MT + 5*SH + SH*0.55 - 3}
            width={(fretSet[1]-fretSet[0]+1)*FW} height={3}
            fill={`rgba(${barRgb},0.6)`} rx="1"/>
        </>
        );
      })()}

      {/* Inlay dots */}
      {INLAY.map(f => f <= totalFrets && (
        <circle key={f} cx={cx(f)} cy={MT + 2.5*SH} r={5.5}
          fill={inlayFill} stroke={inlayStroke} strokeWidth="0.5"/>
      ))}
      {INLAY2.filter(f => f <= totalFrets).map(f => [1.2, 3.8].map((sv,i) => (
        <circle key={`${f}-${i}`} cx={cx(f)} cy={MT + sv*SH} r={5.5}
          fill={inlayFill} stroke={inlayStroke} strokeWidth="0.5"/>
      )))}

      {/* Nut */}
      <rect x={ML-5} y={MT-SH*0.55} width={5} height={5*SH+SH*1.1}
        fill="url(#nutGrad)" rx="1"/>

      {/* Fret lines */}
      {Array.from({length:totalFrets},(_,i)=>i+1).map(f => (
        <line key={f}
          x1={ML+f*FW} y1={MT-SH*0.55}
          x2={ML+f*FW} y2={MT+5*SH+SH*0.55}
          stroke={f===12?fret12Color:fretColor}
          strokeWidth={f===12?2.5:1.5}/>
      ))}

      {/* String lines */}
      {STRINGS.map((_, s) => (
        <line key={s}
          x1={ML-5} y1={cy(s)} x2={ML+totalFrets*FW+1} y2={cy(s)}
          stroke={stringColor} strokeWidth={stringWidths[s]} opacity="0.85"/>
      ))}

      {/* Fret number labels */}
      {FRET_LABELS.filter(f=>f<=totalFrets).map(f => (
        <text key={f} x={cx(f)} y={MT-16} textAnchor="middle"
          fill={labelFill} fontSize="11" fontFamily="'DM Mono',monospace">{f}</text>
      ))}

      {/* String labels — in free-learn mode show clickable ✕ / revealed note */}
      {STRINGS.map((n, s) => {
        const openKey = `${s}-0`;
        const isFreeLearning = freeLearn;
        const openRevealed = showNotes[openKey];
        if (isFreeLearning && !openRevealed) {
          return (
            <text key={s} x={ML-18} y={cy(s)+5} textAnchor="middle"
              fill="#c04040" fontSize="15" fontWeight="700"
              fontFamily="'DM Mono',monospace"
              style={{pointerEvents:'none'}}>✕</text>
          );
        }
        if (isFreeLearning && openRevealed) {
          return (
            <text key={s} x={ML-18} y={cy(s)+5} textAnchor="middle"
              fill={noteTextColor} fontSize="11" fontWeight="600"
              fontFamily="'DM Mono',monospace"
              style={{pointerEvents:'none'}}>{showNote(noteAt(s,0), noteStyle)}</text>
          );
        }
        return (
          <text key={s} x={ML-18} y={cy(s)+5} textAnchor="middle"
            fill={stringLabelColor} fontSize="13" fontWeight="600"
            fontFamily="'DM Mono',monospace">{n}</text>
        );
      })}

      {/* Revealed note labels (free mode) — skip fret 0 (shown in string label) */}
      {Object.entries(showNotes).filter(([key]) => !key.endsWith('-0')).map(([key, note]) => {
        const [s,f] = key.split('-').map(Number);
        const r = 13;
        const fs = showNote(noteAt(s,f),noteStyle).includes('/') ? 8 : 11;
        return (
          <g key={key}>
            <circle cx={cx(f)} cy={cy(s)} r={r} fill={noteCircleBg} stroke={noteCircleStroke} strokeWidth="1"/>
            <text x={cx(f)} y={cy(s)+4} textAnchor="middle"
              fill={noteTextColor} fontSize={fs}
              fontFamily="'DM Mono',monospace" fontWeight="500">{showNote(noteAt(s,f),noteStyle)}</text>
          </g>
        );
      })}

      {/* Markers */}
      {markers.map((m, i) => {
        const mcx = cx(m.f), mcy = cy(m.s);
        const isMetal = theme === 'metal';
        const isFunk  = theme === 'funk';
        const colors = {
          question: isMetal ? ['#08384a', '#80e0ff']
                  : isFunk  ? ['#3a0a30', '#ffb0e8']
                  : ['#a87028', '#f0ddb8'],
          correct:  isMetal ? ['#0a4838', '#80f0c0']
                  : isFunk  ? ['#2a3a08', '#e8ff80']
                  : ['#4a7830', '#b0e890'],
          wrong:    isMetal ? ['#480818', '#ff90a0']
                  : isFunk  ? ['#480818', '#ff90a0']
                  : ['#882018', '#f0a090'],
          marked:   isMetal ? ['#08384a', '#80e0ff']
                  : isFunk  ? ['#3a0a30', '#ffb0e8']
                  : ['#a87028', '#f0ddb8'],
          interval: isMetal ? ['#082838', '#a0d8ff']
                  : isFunk  ? ['#2a0a3a', '#c890ff']
                  : ['#285870', '#90c8e8'],
        };
        const [bg, fg] = colors[m.type] || colors.question;
        const label = m.label ?? '?';
        const small = label.length > 2;
        return (
          <g key={i} filter={m.type==='question' ? "url(#glow)":undefined}>
            <circle cx={mcx} cy={mcy} r={13} fill={bg} stroke={fg} strokeWidth="1.5" opacity={m.opacity ?? 0.95}/>
            {label && <text x={mcx} y={mcy+4} textAnchor="middle"
              fill={fg} fontSize={small?8:11}
              fontFamily="'DM Mono',monospace" fontWeight="600">{label}</text>}
          </g>
        );
      })}

      {/* Selected cell highlight (free mode) */}
      {selectedCell && !markerAt(selectedCell.s, selectedCell.f) && (
        <rect
          x={selectedCell.f===0 ? (freeLearn ? ML-18-12 : cx(0)-14) : cx(selectedCell.f)-FW/2+2}
          y={cy(selectedCell.s)-SH/2+2}
          width={selectedCell.f===0 ? 24 : FW-4} height={SH-4}
          fill="rgba(200,144,48,0.12)" stroke="rgba(200,144,48,0.5)"
          strokeWidth="1" rx="2"/>
      )}

      {/* Interactive click areas */}
      {interactive && STRINGS.map((_,s) =>
        Array.from({length:totalFrets+1},(_,f)=>f).map(f => {
          const inRange = !fretSet || (f===0 || (f>=fretSet[0] && f<=fretSet[1]));
          const isFret0 = f === 0;
          const x = isFret0 ? (freeLearn ? ML-18-14 : cx(0)-14) : cx(f)-FW/2+1;
          const width = isFret0 ? (freeLearn ? 28 : 28) : FW-2;
          return (
            <rect key={`${s}-${f}`}
              x={x} y={cy(s)-SH/2}
              width={width} height={SH}
              fill="transparent"
              style={{cursor: inRange?'crosshair':'default'}}
              onClick={() => inRange && onCellClick && onCellClick(s,f)}/>
          );
        })
      )}
    </svg>
  );
}

/* ═══════════════════════════════════════
   TIMER HOOK
═══════════════════════════════════════ */
function useTimer() {
  const [t, setT] = useState(0);
  const ref = useRef(null);
  const start = useCallback(() => {
    setT(0);
    clearInterval(ref.current);
    ref.current = setInterval(() => setT(p => p+1), 1000);
  }, []);
  const stop = useCallback(() => clearInterval(ref.current), []);
  useEffect(() => () => clearInterval(ref.current), []);
  return [t, start, stop];
}

const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

function NoteKeyboard({ onNote, disabled, noteStyle='both' }) {
  return (
    <div className="note-keyboard">
      {CHROMATIC.map(n => (
        <button key={n} className="note-key" disabled={disabled}
          onClick={() => onNote(n)}>
          {showNote(n, noteStyle)}
        </button>
      ))}
    </div>
  );
}

const CHORD_QUALITIES_EASY   = ['major', 'minor', '7'];
const CHORD_QUALITIES_MEDIUM = ['major', 'minor', '7', 'sus2', 'sus4', 'add9'];
const CHORD_QUALITIES_HARD   = ['major', 'minor', '7', 'sus2', 'sus4', 'add9', 'maj7', 'm7', '9', '7#9'];

function getChordDifficulty(name) {
  const n = name.toLowerCase();
  if (/7#9$/.test(n))   return 'hard';
  if (/maj7$/.test(n))  return 'hard';
  if (/m7$/.test(n))    return 'hard';
  if (/(?<!add)9$/.test(n))  return 'hard';
  if (/sus[24]$/.test(n))    return 'medium';
  if (/add9$/.test(n))       return 'medium';
  return 'easy';
}

const DIFFICULTY_RANK = { easy: 0, medium: 1, hard: 2, pro: 2 };

function isBasicBarreChord(chord) {
  const n = chord.name.toLowerCase();
  if (!n.endsWith(' major') && !n.endsWith(' minor')) return false;
  const ps = chord.positions;
  if (ps.length < 5) return false;
  if (ps.some(p => p.f === 0)) return false;
  const sorted = [...ps].sort((a, b) => b.s - a.s);
  return sorted[0].iv === '1' && sorted[1].iv === '5';
}

function chordsForDifficulty(diff) {
  const rank = DIFFICULTY_RANK[diff] ?? 0;
  return CHORD_SHAPES.filter(c => {
    if (DIFFICULTY_RANK[getChordDifficulty(c.name)] > rank) return false;
    if ((diff === 'hard' || diff === 'pro') && isBasicBarreChord(c)) return false;
    return true;
  });
}

function qualitiesForDifficulty(diff) {
  if (diff === 'hard' || diff === 'pro') return CHORD_QUALITIES_HARD;
  if (diff === 'medium') return CHORD_QUALITIES_MEDIUM;
  return CHORD_QUALITIES_EASY;
}

function ChordKeyboard({ onChord, disabled, noteStyle='both', difficulty='easy' }) {
  const [root, setRoot] = useState(null);

  function pickRoot(n) {
    setRoot(n);
  }

  function pickQuality(q) {
    if (!root) return;
    // Qualities that append directly without space: 7, sus2, sus4, add9, maj7, m7, 9, 7#9
    const spacedQualities = ['major', 'minor'];
    const name = spacedQualities.includes(q) ? root + ' ' + q : root + q;
    onChord(name);
    setRoot(null);
  }

  const qualities = qualitiesForDifficulty(difficulty);

  useEffect(() => { if (disabled) setRoot(null); }, [disabled]);

  if (root) {
    return (
      <div className="note-keyboard">
        <div style={{width:'100%',textAlign:'center',fontFamily:'DM Mono',fontSize:'0.75rem',
          color:'var(--text-muted)',marginBottom:4}}>
          Root: <span style={{color:'var(--gold)'}}>{showNote(root, noteStyle)}</span>
        </div>
        {qualities.map(q => (
          <button key={q} className="note-key" style={{minWidth:70}} disabled={disabled}
            onClick={() => pickQuality(q)}>{q}</button>
        ))}
        <button className="note-key" style={{minWidth:70,color:'var(--text-muted)'}}
          onClick={() => setRoot(null)}>← back</button>
      </div>
    );
  }

  return (
    <div className="note-keyboard">
      {CHROMATIC.map(n => (
        <button key={n} className="note-key" disabled={disabled}
          onClick={() => pickRoot(n)}>
          {showNote(n, noteStyle)}
        </button>
      ))}
    </div>
  );
}

/* ═══════════════════════════════════════
   STATS PERSISTENCE
═══════════════════════════════════════ */
const STATS_KEY = 'frem_stats';

function loadStats() {
  try { return JSON.parse(localStorage.getItem(STATS_KEY)) || []; }
  catch { return []; }
}

function saveResult({ mode, timeSeconds, totalItems, avgPerItem }) {
  const stats = loadStats();
  stats.push({ mode, timestamp: Date.now(), timeSeconds, totalItems, avgPerItem });
  localStorage.setItem(STATS_KEY, JSON.stringify(stats));
}

/* ═══════════════════════════════════════
   GAME MODE 1: RANDOM NOTE
═══════════════════════════════════════ */
function RandomNoteGame({ onBack, tweaks }) {
  const totalFrets = tweaks.frets;
  const total = 6 * totalFrets;
  const [done, setDone] = useState(new Set());
  const [queue, setQueue] = useState(() => {
    const q = [];
    for(let s=0;s<6;s++) for(let f=1;f<=totalFrets;f++) q.push({s,f});
    return shuffleArr(q);
  });
  const [qi, setQi] = useState(0);
  const [input, setInput] = useState('');
  const [feedback, setFeedback] = useState(null);
  const [streak, setStreak] = useState(0);
  const [finished, setFinished] = useState(false);
  const [time, startTimer, stopTimer] = useTimer();
  const inputRef = useRef(null);
  const [flashing, setFlashing] = useState(false);

  useEffect(() => { startTimer(); }, []);
  useEffect(() => { if (!feedback) inputRef.current?.focus(); }, [feedback]);
  useEffect(() => { inputRef.current?.focus(); }, [qi]);
  useEffect(() => {
    if (finished) saveResult({ mode: 'random', timeSeconds: time, totalItems: total, avgPerItem: +(time/total).toFixed(2) });
  }, [finished]);
  useEffect(() => {
    function onKey(e) { if (e.key === 'Escape') onBack(); }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const current = queue[qi % queue.length];
  const expected = current ? noteAt(current.s, current.f) : null;

  function handleAnswer(note) {
    if (!current) return;
    if (note === expected) {
      const newDone = new Set(done); newDone.add(`${current.s}-${current.f}`);
      setDone(newDone);
      setStreak(s => s+1);
      setFeedback('correct');
      setFlashing(true);
      if (newDone.size >= total) {
        stopTimer();
        setTimeout(() => setFinished(true), 600);
      } else {
        setTimeout(() => { setFlashing(false); setFeedback(null); setInput(''); setQi(q => q+1); }, 500);
      }
    } else {
      setStreak(0);
      setFeedback('wrong');
      setTimeout(() => {
        setFeedback(null);
        setInput('');
      }, 600);
    }
  }

  function submit() {
    if (!input.trim()) return;
    handleAnswer(matchNote(input, expected) ? expected : input);
  }

  if (finished) return (
    <div className="game-wrap" style={{maxWidth:480,textAlign:'center',gap:32}}>
      <div style={{fontSize:'clamp(2rem,5vw,3rem)',fontWeight:900,fontStyle:'italic',color:'var(--gold)',textShadow:'0 0 40px rgba(200,144,48,0.4)'}}>
        All Clear!
      </div>
      <div style={{fontFamily:'DM Mono',fontSize:'0.85rem',color:'var(--text-dim)',letterSpacing:'0.1em'}}>
        You named every note on the fretboard
      </div>
      <div style={{display:'flex',gap:40,justifyContent:'center',fontFamily:'DM Mono',fontSize:'0.8rem',color:'var(--text-dim)'}}>
        <span><span style={{color:'var(--text-muted)'}}>time </span>{time}s</span>
        <span><span style={{color:'var(--text-muted)'}}>notes </span>{total}</span>
        <span><span style={{color:'var(--text-muted)'}}>best streak </span>{streak}</span>
        <span><span style={{color:'var(--text-muted)'}}>avg/note </span>{(time/total).toFixed(1)}s</span>
      </div>
      <div style={{width:80,height:1,background:'linear-gradient(90deg,transparent,var(--gold),transparent)',margin:'0 auto'}}/>
      <button className="submit-btn" style={{fontSize:'0.9rem',padding:'12px 32px'}} onClick={onBack}>
        ← back to menu
      </button>
    </div>
  );

  // Solved + current markers
  const markers = [
    ...[...done].map(key => {
      const [s, f] = key.split('-').map(Number);
      return { s, f, type: 'correct', label: '', opacity: 0.45 };
    }),
    // Current question
    ...(current ? [{
      s: current.s, f: current.f,
      type: feedback==='correct' ? 'correct' : feedback==='wrong' ? 'wrong' : 'question',
      label: feedback==='correct' ? '' : '?'
    }] : [])
  ];

  return (
    <div className="game-wrap">
      <div className="game-header">
        <span className="game-title">▸ Guess the Note</span>
        <button className="back-btn" onClick={onBack}>← back</button>
      </div>

      <div className="fretboard-wrap">
        <Fretboard markers={markers} totalFrets={totalFrets} noteStyle={tweaks.noteStyle} boardType={tweaks.board} theme={tweaks.theme}/>
      </div>

      <div className="input-area">
        <div className="prompt-text">Find the note!</div>
        {isMobile ? (
          <NoteKeyboard onNote={n => !feedback && handleAnswer(n)} disabled={!!feedback} noteStyle={tweaks.noteStyle}/>
        ) : (
          <div className="note-input-row">
            <input
              ref={inputRef}
              className={`note-input ${feedback||''} ${flashing?'flash':''}`}
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key==='Enter' && submit()}
              placeholder="note…"
              maxLength={4}
              disabled={!!feedback}
              autoComplete="off" autoCorrect="off" spellCheck="false"
            />
            <button className="submit-btn" onClick={submit}>Enter ↵</button>
          </div>
        )}
        <div className={`feedback-msg ${feedback||''}`}>
          {feedback==='correct' && '✓ Correct!'}
          {feedback==='wrong' && '✗ Wrong answer, try again'}
        </div>
      </div>

      <div className="progress-bar-wrap">
        <div className="progress-label">
          <span>Progress</span>
          <span>{done.size}/{total}</span>
        </div>
        <div className="progress-track">
          <div className="progress-fill" style={{width:`${(done.size/total)*100}%`}}/>
        </div>
      </div>

      <div className="stats-row">
        <span><span className="stat-label">time </span><span className="stat-val">{time}s</span></span>
        <span><span className="stat-label">streak </span><span className={`stat-val ${streak>4?'good':''}`}>{streak}</span></span>
        <span style={{fontFamily:'DM Mono',fontSize:'0.68rem',color:'var(--text-muted)'}}>type name + enter</span>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   GAME MODE 2: FIND NOTES IN FRET SET
═══════════════════════════════════════ */
const FRET_SETS_MODE2 = [[1,3],[4,6],[7,9],[10,12]];
const SET_SIZE = 18; // 3 frets × 6 strings
const TOTAL_MODE2 = SET_SIZE * FRET_SETS_MODE2.length; // 72

function notesInSet(fretSet) {
  // Returns shuffled list of unique notes that appear in this fret set
  const seen = new Set();
  for(let s=0;s<6;s++) for(let f=fretSet[0];f<=fretSet[1];f++) seen.add(noteAt(s,f));
  return shuffleArr([...seen]);
}

function positionsOfNote(note, fretSet) {
  const positions = [];
  for(let s=0;s<6;s++) for(let f=fretSet[0];f<=fretSet[1];f++)
    if(noteAt(s,f)===note) positions.push(`${s}-${f}`);
  return positions;
}

function FindNotesGame({ onBack, tweaks }) {
  const [setIdx, setSetIdx] = useState(0);
  const fretSet = FRET_SETS_MODE2[setIdx];
  const [noteQueue, setNoteQueue] = useState(() => notesInSet(FRET_SETS_MODE2[0]));
  const [noteQi, setNoteQi] = useState(0);
  const [foundInSet, setFoundInSet] = useState(new Set());
  const [totalFound, setTotalFound] = useState(0);
  const [wrongKey, setWrongKey] = useState(null);
  const [setComplete, setSetComplete] = useState(false);
  const [finished, setFinished] = useState(false);
  const [time, startTimer, stopTimer] = useTimer();

  useEffect(() => { startTimer(); }, []);
  useEffect(() => {
    if (finished) saveResult({ mode: 'find', timeSeconds: time, totalItems: TOTAL_MODE2, avgPerItem: +(time/TOTAL_MODE2).toFixed(2) });
  }, [finished]);
  useEffect(() => {
    function onKey(e) { if (e.key === 'Escape') onBack(); }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const targetNote = noteQueue[noteQi] ?? null;
  const targetPositions = targetNote ? positionsOfNote(targetNote, fretSet) : [];
  const remainingForNote = targetPositions.filter(p => !foundInSet.has(p));

  function clickCell(s, f) {
    if (setComplete || !targetNote) return;
    const key = `${s}-${f}`;
    if (foundInSet.has(key)) return;
    if (noteAt(s,f) === targetNote) {
      const newFound = new Set(foundInSet); newFound.add(key);
      setFoundInSet(newFound);
      setTotalFound(t => t+1);
      // All occurrences of this note found?
      const remaining = targetPositions.filter(p => !newFound.has(p));
      if (remaining.length === 0) {
        const nextNoteQi = noteQi + 1;
        // All notes in set found?
        if (nextNoteQi >= noteQueue.length) {
          setSetComplete(true);
          const isLastSet = setIdx === FRET_SETS_MODE2.length - 1;
          if (isLastSet && totalFound + 1 >= TOTAL_MODE2) {
            stopTimer();
            setTimeout(() => setFinished(true), 1400);
          } else {
            setTimeout(() => {
              const nextIdx = (setIdx + 1) % FRET_SETS_MODE2.length;
              const nextFretSet = FRET_SETS_MODE2[nextIdx];
              setSetIdx(nextIdx);
              setNoteQueue(notesInSet(nextFretSet));
              setNoteQi(0);
              setFoundInSet(new Set());
              setSetComplete(false);
            }, 1400);
          }
        } else {
          setNoteQi(nextNoteQi);
        }
      }
    } else {
      setWrongKey(key);
      setTimeout(() => setWrongKey(null), 700);
    }
  }

  const markers = [];
  for(let s=0;s<6;s++) for(let f=fretSet[0];f<=fretSet[1];f++) {
    const key = `${s}-${f}`;
    if (foundInSet.has(key)) markers.push({s,f,type:'correct',label:'',opacity:0.45});
    if (wrongKey===key) markers.push({s,f,type:'wrong',label:'✗'});
  }

  const setFoundCount = foundInSet.size;

  if (finished) return (
    <div className="game-wrap" style={{maxWidth:480,textAlign:'center',gap:32}}>
      <div style={{fontSize:'clamp(2rem,5vw,3rem)',fontWeight:900,fontStyle:'italic',color:'var(--gold)',textShadow:'0 0 40px rgba(200,144,48,0.4)'}}>
        All Clear!
      </div>
      <div style={{fontFamily:'DM Mono',fontSize:'0.85rem',color:'var(--text-dim)',letterSpacing:'0.1em'}}>
        You found every note on the fretboard
      </div>
      <div style={{display:'flex',gap:32,justifyContent:'center',flexWrap:'wrap',fontFamily:'DM Mono',fontSize:'0.8rem',color:'var(--text-dim)'}}>
        <span><span style={{color:'var(--text-muted)'}}>time </span>{time}s</span>
        <span><span style={{color:'var(--text-muted)'}}>notes </span>{TOTAL_MODE2}</span>
        <span><span style={{color:'var(--text-muted)'}}>avg/note </span>{(time/TOTAL_MODE2).toFixed(1)}s</span>
      </div>
      <div style={{width:80,height:1,background:'linear-gradient(90deg,transparent,var(--gold),transparent)',margin:'0 auto'}}/>
      <button className="submit-btn" style={{fontSize:'0.9rem',padding:'12px 32px'}} onClick={onBack}>
        ← back to menu
      </button>
    </div>
  );

  return (
    <div className="game-wrap">
      <div className="game-header">
        <span className="game-title">▸ Find Notes in Fret Set</span>
        <button className="back-btn" onClick={onBack}>← back</button>
      </div>

      <div className="fretboard-wrap">
        <Fretboard markers={markers} onCellClick={clickCell} fretSet={fretSet} interactive={true} totalFrets={12} noteStyle={tweaks.noteStyle} boardType={tweaks.board} theme={tweaks.theme}/>
      </div>

      <div className="input-area">
        {setComplete ? (
          <div style={{fontFamily:'DM Mono',fontSize:'0.95rem',color:'var(--correct)',letterSpacing:'0.1em'}}>
            ✓ Set complete! Next set…
          </div>
        ) : (
          <div style={{textAlign:'center'}}>
            <div className="prompt-text">
              Find all&nbsp;<strong style={{color:'var(--gold)',fontSize:'1.6rem'}}>{targetNote ? showNote(targetNote, tweaks.noteStyle) : '—'}</strong>
            </div>
            <div style={{fontFamily:'DM Mono',fontSize:'0.72rem',color:'var(--text-muted)',marginTop:6}}>
              {remainingForNote.length} remaining · frets {fretSet[0]}–{fretSet[1]}
            </div>
          </div>
        )}
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:8,alignItems:'center',width:'100%',maxWidth:600}}>
        <div className="progress-bar-wrap" style={{marginBottom:0}}>
          <div className="progress-label">
            <span>Fret set {setIdx+1}/{FRET_SETS_MODE2.length} · frets {fretSet[0]}–{fretSet[1]}</span>
            <span>{setFoundCount}/{SET_SIZE}</span>
          </div>
          <div className="progress-track">
            <div className="progress-fill" style={{width:`${(setFoundCount/SET_SIZE)*100}%`}}/>
          </div>
        </div>
        <div className="progress-bar-wrap" style={{marginBottom:0}}>
          <div className="progress-label"><span>Fretboard total</span><span>{totalFound}/{TOTAL_MODE2}</span></div>
          <div className="progress-track">
            <div className="progress-fill" style={{width:`${(totalFound/TOTAL_MODE2)*100}%`}}/>
          </div>
        </div>
      </div>

      <div className="stats-row">
        <span><span className="stat-label">time </span><span className="stat-val">{time}s</span></span>
        <span style={{fontFamily:'DM Mono',fontSize:'0.68rem',color:'var(--text-muted)'}}>click all occurrences</span>
      </div>
    </div>
  );
}

// ── interval helpers ──────────────────────────────────────────────────────────
const IV_ORDER = ['1','2','b3','3','4','5','b7','7','9','#9'];
const IV_LABEL = {
  '1':  'root note (1)',
  '2':  'major second (2)',
  'b3': 'minor third (b3)',
  '3':  'major third (3)',
  '4':  'perfect fourth (4)',
  '5':  'perfect fifth (5)',
  'b7': 'minor seventh (b7)',
  '7':  'major seventh (7)',
  '9':  'ninth (9)',
  '#9': 'sharp nine (#9)',
};

function buildChordIntervals(chord) {
  const seen = new Set();
  const result = [];
  for (const sym of IV_ORDER) {
    const pos = chord.positions.find(p => p.iv === sym);
    if (pos && !seen.has(sym)) {
      seen.add(sym);
      result.push({ symbol: sym, note: noteAt(pos.s, pos.f) });
    }
  }
  return result;
}

// ── chord name matching helpers ───────────────────────────────────────────────
const CHORD_ENHARMONIC = {
  'c#':'db','db':'c#','d#':'eb','eb':'d#',
  'f#':'gb','gb':'f#','g#':'ab','ab':'g#',
  'a#':'bb','bb':'a#',
};

function expandChordInput(s) {
  return s.replace(/maj$/, ' major').replace(/min$/, ' minor')
    .replace(/(?<!aj)(?<!di)m(?!aj|7|9|in)/, ' minor')
    .trim().replace(/\s+/g,' ');
}

function normalizeChordName(s) {
  return s.trim().toLowerCase().replace(/[()]/g,'').replace(/\s+/g,' ');
}

function matchesChordName(input, cname) {
  const ni = normalizeChordName(input);
  const nc = normalizeChordName(cname);
  const exp = normalizeChordName(expandChordInput(input));
  if (ni === nc || exp === nc) return true;
  if (nc.endsWith(' major')) {
    const root = nc.replace(' major', '');
    if (ni === root || exp === root) return true;
  }
  return false;
}

function chordNameCorrect(norm, name) {
  if (matchesChordName(norm, name)) return true;
  const rootMatch = name.match(/^([a-g][#b]?)/);
  const nameRoot  = rootMatch?.[1];
  const ehRoot    = nameRoot && CHORD_ENHARMONIC[nameRoot];
  const ehName    = ehRoot ? ehRoot + name.slice(nameRoot.length) : null;
  return !!(ehName && matchesChordName(norm, ehName));
}

/* ═══════════════════════════════════════
   GAME MODE 3: CHORD IDENTIFICATION
═══════════════════════════════════════ */
function ChordGame({ onBack, tweaks }) {
  const diff = tweaks.chordDifficulty || 'easy';
  const [chords] = useState(() => shuffleArr(chordsForDifficulty(diff)));
  const [ci, setCi] = useState(0);
  const [input, setInput] = useState('');
  const [feedback, setFeedback] = useState(null);
  const [score, setScore] = useState(0);
  const [finished, setFinished] = useState(false);
  const [phase, setPhase] = useState('naming');       // 'naming' | 'intervals'
  const [intervals, setIntervals] = useState([]);
  const [intervalIdx, setIntervalIdx] = useState(0);
  const [solvedSymbols, setSolvedSymbols] = useState(new Set());
  const [time, startTimer, stopTimer] = useTimer();
  const inputRef = useRef(null);

  useEffect(() => { startTimer(); }, []);
  useEffect(() => { inputRef.current?.focus(); }, [ci, phase, intervalIdx]);
  useEffect(() => {
    if (finished) saveResult({ mode: 'chord', timeSeconds: time, totalItems: CHORD_GOAL, avgPerItem: +(time/CHORD_GOAL).toFixed(2) });
  }, [finished]);
  useEffect(() => {
    function onKey(e) { if (e.key === 'Escape') onBack(); }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const chord = chords[ci % chords.length];

  function advanceToNextChord(newScore) {
    if (newScore >= CHORD_GOAL) {
      stopTimer();
      setTimeout(() => setFinished(true), 700);
    } else {
      setTimeout(() => {
        setFeedback(null); setInput('');
        setCi(c => c + 1);
        setPhase('naming');
        setSolvedSymbols(new Set());
      }, 700);
    }
  }

  function handleNaming(name) {
    const norm = name.trim().toLowerCase().replace(/\s+/g,' ');
    if (chordNameCorrect(norm, chord.name.toLowerCase())) {
      setFeedback('correct');
      const ivs = buildChordIntervals(chord);
      setTimeout(() => {
        setFeedback(null); setInput('');
        setIntervals(ivs);
        setIntervalIdx(0);
        setSolvedSymbols(new Set());
        setPhase('intervals');
      }, 600);
    } else {
      setFeedback('wrong');
      setTimeout(() => { setFeedback(null); setInput(''); inputRef.current?.focus(); }, 1200);
    }
  }

  function handleInterval(note) {
    const current = intervals[intervalIdx];
    if (!current) return;
    if (note === current.note) {
      const newSolved = new Set(solvedSymbols);
      newSolved.add(current.symbol);
      setSolvedSymbols(newSolved);
      setFeedback('correct');
      const nextIdx = intervalIdx + 1;
      if (nextIdx >= intervals.length) {
        const newScore = score + 1;
        setScore(newScore);
        advanceToNextChord(newScore);
      } else {
        setTimeout(() => { setFeedback(null); setInput(''); setIntervalIdx(nextIdx); }, 600);
      }
    } else {
      setFeedback('wrong');
      setTimeout(() => { setFeedback(null); setInput(''); inputRef.current?.focus(); }, 1200);
    }
  }

  function submit() {
    if (!input.trim()) return;
    if (phase === 'naming') {
      handleNaming(input);
    } else {
      const current = intervals[intervalIdx];
      if (current && matchNote(input, current.note)) handleInterval(current.note);
      else handleInterval(input);
    }
  }

  if (finished) return (
    <div className="game-wrap" style={{maxWidth:480,textAlign:'center',gap:32}}>
      <div style={{fontSize:'clamp(2rem,5vw,3rem)',fontWeight:900,fontStyle:'italic',color:'var(--gold)',textShadow:'0 0 40px rgba(200,144,48,0.4)'}}>
        Well Done!
      </div>
      <div style={{fontFamily:'DM Mono',fontSize:'0.85rem',color:'var(--text-dim)',letterSpacing:'0.1em'}}>
        You identified {CHORD_GOAL} chords
      </div>
      <div style={{display:'flex',gap:40,justifyContent:'center',fontFamily:'DM Mono',fontSize:'0.8rem',color:'var(--text-dim)'}}>
        <span><span style={{color:'var(--text-muted)'}}>time </span>{time}s</span>
        <span><span style={{color:'var(--text-muted)'}}>chords </span>{CHORD_GOAL}</span>
        <span><span style={{color:'var(--text-muted)'}}>avg/chord </span>{(time/CHORD_GOAL).toFixed(1)}s</span>
      </div>
      <div style={{width:80,height:1,background:'linear-gradient(90deg,transparent,var(--gold),transparent)',margin:'0 auto'}}/>
      <button className="submit-btn" style={{fontSize:'0.9rem',padding:'12px 32px'}} onClick={onBack}>
        ← back to menu
      </button>
    </div>
  );

  // During interval phase: hide labels on unsolved dots, reveal note names on solved ones
  const markers = chord.positions.map(({s, f, iv}) => {
    if (phase === 'naming') return { s, f, type:'interval', label: diff === 'pro' ? '' : iv };
    const solved = solvedSymbols.has(iv);
    return {
      s, f,
      type:  solved ? 'correct' : 'interval',
      label: solved ? showNote(noteAt(s, f), tweaks.noteStyle) : '',
    };
  });

  const currentIv = phase === 'intervals' ? intervals[intervalIdx] : null;

  return (
    <div className="game-wrap">
      <div className="game-header">
        <span className="game-title">▸ Chord Identification</span>
        <button className="back-btn" onClick={onBack}>← back</button>
      </div>

      <div className="fretboard-wrap">
        <Fretboard markers={markers} totalFrets={tweaks.frets} noteStyle={tweaks.noteStyle} boardType={tweaks.board} theme={tweaks.theme}/>
      </div>

      <div className="input-area">
        {phase === 'naming' ? (<>
          <div className="prompt-text">Which chord is this?</div>
          {isMobile ? (
            <ChordKeyboard onChord={name => !feedback && handleNaming(name)} disabled={!!feedback} noteStyle={tweaks.noteStyle} difficulty={diff}/>
          ) : (
            <div className="note-input-row">
              <input ref={inputRef}
                className={`note-input chord-input-wide ${feedback||''}`}
                value={input} onChange={e => setInput(e.target.value)}
                onKeyDown={e => e.key==='Enter' && submit()}
                placeholder="chord name…" disabled={feedback==='correct'}
                autoComplete="off" spellCheck="false"/>
              <button className="submit-btn" onClick={submit}>Enter ↵</button>
            </div>
          )}
          <div className={`feedback-msg ${feedback||''}`}>
            {feedback==='correct' && '✓ Correct!'}
            {feedback==='wrong' && '✗ Wrong, try again!'}
          </div>
          {!isMobile && <div style={{fontFamily:'DM Mono',fontSize:'0.68rem',color:'var(--text-muted)',marginTop:4}}>
            Numbers show intervals: 1=root  3=major 3rd  b3=minor 3rd  5=fifth  b7=minor 7th
          </div>}
        </>) : (<>
          <div style={{fontFamily:'DM Mono',fontSize:'0.75rem',color:'var(--text-muted)',marginBottom:6}}>
            Chord: <span style={{color:'var(--gold)',fontWeight:700}}>{chord.name}</span>
            &nbsp;·&nbsp;{solvedSymbols.size}/{intervals.length} intervals found
          </div>
          <div className="prompt-text">
            What is the <span style={{color:'var(--gold)'}}>{currentIv && IV_LABEL[currentIv.symbol]}</span>?
          </div>
          {isMobile ? (
            <NoteKeyboard onNote={n => !feedback && handleInterval(n)} disabled={!!feedback} noteStyle={tweaks.noteStyle}/>
          ) : (
            <div className="note-input-row">
              <input ref={inputRef}
                className={`note-input ${feedback||''}`}
                value={input} onChange={e => setInput(e.target.value)}
                onKeyDown={e => e.key==='Enter' && submit()}
                placeholder="note…" maxLength={4}
                disabled={feedback==='correct'}
                autoComplete="off" spellCheck="false"/>
              <button className="submit-btn" onClick={submit}>Enter ↵</button>
            </div>
          )}
          <div className={`feedback-msg ${feedback||''}`}>
            {feedback==='correct' && '✓ Correct!'}
            {feedback==='wrong' && '✗ Wrong, try again!'}
          </div>
        </>)}
      </div>

      <div className="progress-bar-wrap">
        <div className="progress-label">
          <span>Progress</span>
          <span>{score}/{CHORD_GOAL}</span>
        </div>

        </div>

        <span><span className="stat-label">score </span><span className="stat-val good">{score}</span></span>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   GAME MODE 4: FREE LEARNING
═══════════════════════════════════════ */
function FreeLearn({ onBack, tweaks }) {
  const totalFrets = tweaks.frets;
  const [revealed, setRevealed] = useState({});
  const [sel, setSel] = useState({s:0,f:1});
  const [scaleRoot, setScaleRoot] = useState('C');
  const [scaleType, setScaleType] = useState(null);

  const scaleSet = scaleType ? new Set(scaleNotes(scaleRoot, {
    major: MAJOR_SCALE, minor: MINOR_SCALE,
    'pent.maj': PENTATONIC_MAJOR, 'pent.min': PENTATONIC_MINOR
  }[scaleType])) : null;

  function handleCellClick(s, f) {
    const key = `${s}-${f}`;
    setRevealed(prev => {
      const n = {...prev};
      if (n[key]) delete n[key]; else n[key] = showNote(noteAt(s,f), tweaks.noteStyle);
      return n;
    });
    setSel({s,f});
  }

  useEffect(() => {
    function onKey(e) {
      const {s,f} = sel;
      if (e.key==='ArrowUp'||e.key==='k') setSel({s:Math.max(0,s-1),f});
      else if (e.key==='ArrowDown'||e.key==='j') setSel({s:Math.min(5,s+1),f});
      else if (e.key==='ArrowLeft'||e.key==='h') setSel({s,f:Math.max(0,f-1)});
      else if (e.key==='ArrowRight'||e.key==='l') setSel({s,f:Math.min(totalFrets,f+1)});
      else if (e.key===' ') { e.preventDefault(); handleCellClick(s,f); }
      else if (e.key==='r') setRevealed({});
      else if (e.key==='Escape') onBack();
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [sel, revealed, totalFrets]);

  // Match revealed notes against chord shapes
  const matchedChords = (() => {
    const keys = Object.keys(revealed);
    if (keys.length < 3) return [];
    const revSet = new Set(keys);
    const revPositions = keys.map(k => { const [s,f] = k.split('-').map(Number); return {s,f}; });
    const matches = [];
    const seen = new Set();
    for (const chord of CHORD_SHAPES) {
      const posKeys = chord.positions.map(p => `${p.s}-${p.f}`);
      // every chord position must be revealed
      if (!posKeys.every(k => revSet.has(k))) continue;
      const chordSet = new Set(posKeys);
      // detect barre fret: the lowest fret that appears on 2+ strings (skip fret 0)
      const fretCounts = {};
      for (const p of chord.positions) { if (p.f > 0) fretCounts[p.f] = (fretCounts[p.f]||0)+1; }
      const barreFret = Object.entries(fretCounts)
        .filter(([,c]) => c >= 2)
        .map(([f]) => Number(f))
        .sort((a,b) => a-b)[0] || -1;
      const extraOk = revPositions.every(rp => {
        const k = `${rp.s}-${rp.f}`;
        if (chordSet.has(k)) return true;
        // extra note allowed only at the barre fret (not fret 0)
        return barreFret > 0 && rp.f === barreFret;
      });
      if (!extraOk) continue;
      if (!seen.has(chord.name)) {
        matches.push(chord);
        seen.add(chord.name);
      }
    }
    return matches;
  })();

  // Build scale markers
  const scaleMarkers = [];
  if (scaleSet) {
    for(let s=0;s<6;s++) for(let f=1;f<=totalFrets;f++) {
      const n = noteAt(s,f);
      if (scaleSet.has(n) && !revealed[`${s}-${f}`]) {
        const isRoot = n===scaleRoot;
        scaleMarkers.push({s,f,type:isRoot?'question':'interval',label:n});
      }
    }
  }

  return (
    <div className="game-wrap">
      <div className="game-header">
        <span className="game-title">▸ Free Learning</span>
        <button className="back-btn" onClick={onBack}>← back</button>
      </div>

      <div className="fretboard-wrap">
        <Fretboard
          markers={scaleMarkers}
          showNotes={revealed}
          onCellClick={handleCellClick}
          interactive={true}
          selectedCell={sel}
          totalFrets={totalFrets}
          noteStyle={tweaks.noteStyle} boardType={tweaks.board} theme={tweaks.theme}
          freeLearn={true}
        />
      </div>

      <div style={{textAlign:'center',fontFamily:'DM Mono',fontSize:'0.85rem',
        color: matchedChords.length > 0 ? 'var(--gold,#c89030)' : 'var(--text-dim,#888)',
        padding:'6px 0'}}>
        {matchedChords.length > 0
          ? matchedChords.map((c,i) => {
              const IV_SHORT = {'1':'root','2':'major 2nd','b3':'minor 3rd','3':'major 3rd','4':'perfect 4th','5':'perfect 5th','b7':'minor 7th','7':'major 7th','9':'9th','#9':'sharp 9th'};
              const seen = new Set();
              const parts = [];
              for (const iv of IV_ORDER) {
                const p = c.positions.find(p => p.iv === iv);
                if (!p || seen.has(iv)) continue;
                seen.add(iv);
                parts.push(`${IV_SHORT[iv]}: ${showNote(noteAt(p.s, p.f), tweaks.noteStyle)}`);
              }
              return <div key={i}>{i > 0 && <hr style={{border:'none',borderTop:'1px solid var(--text-dim,#444)',margin:'4px 0'}}/>}<strong>{c.name}</strong> ({parts.join(', ')})</div>;
            })
          : 'no chord identified yet'}
      </div>

      <div className="scale-row">
        <select className="root-select" value={scaleRoot} onChange={e=>setScaleRoot(e.target.value)}>
          {CHROMATIC.map(n=><option key={n} value={n}>{showNote(n, tweaks.noteStyle)}</option>)}
        </select>
        {['major','minor','pent.maj','pent.min'].map(t => (
          <button key={t} className={`scale-btn ${scaleType===t?'active':''}`}
            onClick={()=>setScaleType(p=>p===t?null:t)}>{t}</button>
        ))}
        <button className="scale-btn" onClick={()=>setRevealed({})}>clear</button>
      </div>

      <div className="free-legend">
        <span><span>↑↓←→</span> / hjkl: move</span>
        <span><span>Space</span>: reveal/hide</span>
        <span><span>click</span>: reveal note</span>
        <span><span>r</span>: clear all</span>
      </div>
    </div>
  );
}

function NoteListGame({ onBack, tweaks }) {
  const [notes, setNotes] = useState(() => shuffleArr(CHROMATIC));
  const [key, setKey] = useState(0);

  function shuffle() { setNotes(shuffleArr(CHROMATIC)); setKey(k=>k+1); }

  useEffect(() => {

      if (e.key==='n' || e.key===' ' || e.key==='Enter') { e.preventDefault(); shuffle(); }
      else if (e.key==='Escape'||e.key==='b') onBack();
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  return (

const MODE_LABELS = { random: 'Random Note', find: 'Find Notes', chord: 'Chords' };

function ProgressGraph({ mode, stats }) {
  const data = stats.filter(s => s.mode === mode);
  if (data.length < 2) return null;
  const W = 480, H = 120, PX = 40, PY = 16;
  const avgs = data.map(d => d.avgPerItem);
  const maxY = Math.max(...avgs) * 1.15;
  const points = data.map((d, i) => ({
    x: PX + (i / (data.length - 1)) * (W - 2*PX),
    y: PY + (1 - d.avgPerItem / maxY) * (H - 2*PY),
  }));
  const polyline = points.map(p => `${p.x},${p.y}`).join(' ');
  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{width:'100%',maxWidth:W}}>
      {[0.25,0.5,0.75].map(t => (
        <line key={t} x1={PX} y1={PY + t*(H-2*PY)} x2={W-PX} y2={PY + t*(H-2*PY)}
          stroke="var(--border)" strokeWidth="0.5"/>
      ))}
      <text x={4} y={PY+4} fontSize="9" fill="var(--text-muted)" fontFamily="DM Mono">
        {maxY.toFixed(1)}s
      </text>
      <text x={4} y={H-PY+4} fontSize="9" fill="var(--text-muted)" fontFamily="DM Mono">0s</text>
      <polyline points={polyline} fill="none" stroke="var(--gold)" strokeWidth="1.5"
        strokeLinejoin="round" strokeLinecap="round"/>
      {points.map((p,i) => (
        <circle key={i} cx={p.x} cy={p.y} r={2.5} fill="var(--gold)"/>
      ))}
    </svg>
  );
}

function StatsView({ onBack }) {
  const [stats] = useState(loadStats);
  const [filter, setFilter] = useState('all');

  useEffect(() => {
    function onKey(e) { if (e.key === 'Escape') onBack(); }

    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const filtered = filter === 'all' ? stats : stats.filter(s => s.mode === filter);
  const recent = [...filtered].reverse().slice(0, 20);

  function formatDate(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString(undefined, { month:'short', day:'numeric' })
      + ' ' + d.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
  }

  return (
    <div className="game-wrap" style={{maxWidth:560}}>

          <button key={m} className={`scale-btn ${filter===m?'active':''}`}
            onClick={() => setFilter(m)}>

        {filtered.length > 0 && <>
          <span><span style={{color:'var(--text-muted)'}}>best avg </span>
            {Math.min(...filtered.map(s=>s.avgPerItem)).toFixed(1)}s</span>
          <span><span style={{color:'var(--text-muted)'}}>last avg </span>
            {filtered[filtered.length-1].avgPerItem.toFixed(1)}s</span>
        </>}
      </div>

      {(filter === 'all' ? ['random','find','chord'] : [filter]).map(m => {
        const modeData = stats.filter(s => s.mode === m);
        if (modeData.length < 2) return null;
        return (
          <div key={m} style={{width:'100%'}}>
            <div style={{fontFamily:'DM Mono',fontSize:'0.7rem',color:'var(--text-muted)',
              letterSpacing:'0.1em',marginBottom:8}}>
              {MODE_LABELS[m]} — avg/item over time (lower is better)
            </div>
            <ProgressGraph mode={m} stats={stats}/>
          </div>
        );
      })}

      {recent.length === 0 ? (
        <div style={{fontFamily:'DM Mono',fontSize:'0.8rem',color:'var(--text-muted)',
          textAlign:'center',padding:'32px 0'}}>
          No sessions yet. Complete a game to see stats here.
        </div>
      ) : (
        <div style={{width:'100%',display:'flex',flexDirection:'column',gap:0}}>
          {recent.map((s, i) => (
            <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
              padding:'8px 12px',borderBottom:'1px solid var(--border)',
              fontFamily:'DM Mono',fontSize:'0.72rem'}}>
              <span style={{color:'var(--text-muted)',minWidth:120}}>{formatDate(s.timestamp)}</span>
              <span style={{color:'var(--gold-dim)'}}>{MODE_LABELS[s.mode]}</span>
              <span style={{color:'var(--text-dim)'}}>{s.timeSeconds}s</span>
              <span style={{color:'var(--text-dim)'}}>{s.avgPerItem.toFixed(1)}s/item</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

      <div className="tweak-row">
        <div className="tweak-label">THEME</div>
        <div className="tweak-options">
          {[['vintage','Vintage'],['metal','Metal'],['funk','Funk']].map(([val,label]) => (
            <button key={val} className={`tweak-opt ${tweaks.theme===val?'active':''}`}
              onClick={() => setTweaks(t=>({...t,theme:val}))}>{label}</button>
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <div className="tweak-label">FINGERBOARD</div>
        <div className="tweak-options">
          {[['rosewood','Rosewood'],['maple','Maple']].map(([val,label]) => (
            <button key={val} className={`tweak-opt ${tweaks.board===val?'active':''}`}
              onClick={() => setTweaks(t=>({...t,board:val}))}>{label}</button>
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <div className="tweak-label">FRETS</div>
        <div className="tweak-options">
          {[7,9,12].map(n => (
            <button key={n} className={`tweak-opt ${tweaks.frets===n?'active':''}`}
              onClick={() => setTweaks(t=>({...t,frets:n}))}>{n}</button>
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <div className="tweak-label">NOTE STYLE</div>
        <div className="tweak-options">
          {['sharp','flat','both'].map(s => (
            <button key={s} className={`tweak-opt ${tweaks.noteStyle===s?'active':''}`}
              onClick={() => setTweaks(t=>({...t,noteStyle:s}))}>{s}</button>
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <div className="tweak-label">
          CHORD DIFFICULTY
          <span onClick={() => setShowChordInfo(v => !v)}
            style={{marginLeft:6,cursor:'pointer',display:'inline-block',width:16,height:16,
              lineHeight:'16px',textAlign:'center',borderRadius:'50%',fontSize:'0.6rem',
              fontWeight:700,border:'1px solid var(--text-muted)',color:'var(--text-muted)',
              verticalAlign:'middle',userSelect:'none'}}>?</span>
        </div>
        <div className="tweak-options">
          {['easy','medium','hard','pro'].map(d => (
            <button key={d} className={`tweak-opt ${tweaks.chordDifficulty===d?'active':''}`}
              onClick={() => setTweaks(t=>({...t,chordDifficulty:d}))}>{d}</button>
          ))}
        </div>
      </div>
      {showChordInfo && (
        <div style={{padding:'8px 12px',fontSize:'0.7rem',fontFamily:'DM Mono',color:'var(--text-muted)',
          lineHeight:1.5,borderTop:'1px solid var(--border-subtle,rgba(128,128,128,0.15))'}}>
          <div><b>Easy</b> — major, minor, dominant 7th</div>
          <div><b>Medium</b> — + sus2, sus4, add9</div>
          <div><b>Hard</b> — + maj7, m7, 9th, 7#9</div>
          <div><b>Pro</b> — same as hard, intervals hidden</div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════
   APP
═══════════════════════════════════════ */
function App() {
  const [mode, setMode] = useState(() => localStorage.getItem('frem_mode') || null);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  // Apply theme + board to <html>
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', tweaks.theme);
    document.body.style.backgroundColor =
      tweaks.theme === 'metal' ? '#06080a' :
      tweaks.theme === 'funk'  ? '#0d0420' : '';
  }, [tweaks.theme]);

  useEffect(() => {
    if (mode) document.documentElement.setAttribute('data-in-game', '');
    else document.documentElement.removeAttribute('data-in-game');
  }, [mode]);

  useEffect(() => {
    if (mode) localStorage.setItem('frem_mode', mode);
    else localStorage.removeItem('frem_mode');
  }, [mode]);

  // Tweaks toggle via keyboard shortcut (T key on the menu screen)
  useEffect(() => {
    function handler(e) {
      if (!mode && e.key === 't') setTweaksOpen(o => !o);
    }
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [mode]);

  function back() { setMode(null); }

  return (
    <>
      {!mode && <Menu onSelect={setMode}/>}
      {mode==='random' && <RandomNoteGame onBack={back} tweaks={tweaks}/>}
      {mode==='find' && <FindNotesGame onBack={back} tweaks={tweaks}/>}
      {mode==='chord' && <ChordGame onBack={back} tweaks={tweaks}/>}
      {mode==='free' && <FreeLearn onBack={back} tweaks={tweaks}/>}
      {mode==='notes' && <NoteListGame onBack={back} tweaks={tweaks}/>}
      {mode==='stats' && <StatsView onBack={back}/>}
      {tweaksOpen && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} onClose={() => setTweaksOpen(false)}/>}
      {!tweaksOpen && (
        <button className="tweaks-cta" onClick={() => setTweaksOpen(true)} aria-label="Open tweaks">
          <span className="tweaks-cta-icon">⚙</span>
          <span className="tweaks-cta-label">Tweak it</span>
        </button>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
