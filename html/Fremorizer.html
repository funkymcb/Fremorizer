<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fremorizer</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Oswald:wght@400;500;700&family=Bungee&family=Fraunces:ital,wght@0,400;1,400;1,700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// Music theory + chord matching helpers live in /lib.js so they're testable
// under Node. The names below are re-bound from the global API object.
const {
  CHROMATIC, DISPLAY_BOTH, DISPLAY_FLAT, showNote,
  TUNINGS, stringsFor, noteAt, matchNote,
  MAJOR_SCALE, MINOR_SCALE, PENTATONIC_MAJOR, PENTATONIC_MINOR, scaleNotes,
  CHORD_SHAPES, CHORD_GOAL, shuffleArr,
  CHORD_QUALITIES_EASY, CHORD_QUALITIES_MEDIUM, CHORD_QUALITIES_HARD,
  getChordDifficulty, DIFFICULTY_RANK, isBasicBarreChord,
  chordsForDifficulty, qualitiesForDifficulty,
  FRET_SETS_MODE2, notesInSet, positionsOfNote,
  IV_ORDER, IV_LABEL, buildChordIntervals,
  CHORD_ENHARMONIC, expandChordInput, normalizeChordName,
  matchesChordName, chordNameCorrect,
  triadStringSets, findTriads, triadKey,
} = window.Fremorizer;

/* ═══════════════════════════════════════
   FRETBOARD SVG
═══════════════════════════════════════ */
function Fretboard({ markers=[], onCellClick, fretSet, stringSet, showNotes={}, interactive=false, selectedCell, totalFrets=12, noteStyle='both', boardType='rosewood', theme='vintage', freeLearn=false, instrument='guitar' }) {
  const strings = stringsFor(instrument);
  const nStrings = strings.length;
  const lastS = nStrings - 1;
  const FW = 70, SH = 32, ML = 54, MT = 36, MB = 18;
  const W = ML + totalFrets * FW + 22;
  const H = MT + lastS * SH + MB;
  const cx = f => f === 0 ? 14 : ML + (f - 0.5) * FW;
  const cy = s => MT + s * SH;
  // Board colors — theme + board type aware
  const isMaple = boardType === 'maple';
  const isVintage = theme === 'vintage';
  const accentColor = theme === 'metal' ? '#00c8ff' : theme === 'funk' ? '#ff40c0' : '#c89030';
  const accentDim   = theme === 'metal' ? '#006888' : theme === 'funk' ? '#a02890' : '#7a5820';

  // Board wood
  const boardTop    = isVintage ? (isMaple ? '#c8a878' : '#3c2010')
                    : (isMaple  ? '#c8a878' : '#111214');
  const boardMid    = isVintage ? (isMaple ? '#b89060' : '#2a1608')
                    : (isMaple  ? '#b89060' : '#0a0c0e');
  const boardBot    = isVintage ? (isMaple ? '#c8a878' : '#3c2010')
                    : (isMaple  ? '#c8a878' : '#111214');
  const grainColor  = isVintage ? (isMaple ? 'rgba(0,0,0,0.06)' : 'rgba(0,0,0,0.12)')
                    : (isMaple  ? 'rgba(0,0,0,0.06)' : 'rgba(255,255,255,0.02)');

  // Inlays
  const inlayFill   = isVintage ? (isMaple ? 'rgba(60,40,20,0.35)'    : 'rgba(240,220,178,0.32)')
                    : (isMaple  ? 'rgba(60,40,20,0.35)' : `rgba(${theme==='metal'?'0,200,255':'255,64,192'},0.18)`);
  const inlayStroke = isVintage ? (isMaple ? 'rgba(40,20,10,0.15)'    : 'rgba(240,220,178,0.12)')
                    : (isMaple  ? 'rgba(40,20,10,0.15)' : `rgba(${theme==='metal'?'0,200,255':'255,64,192'},0.35)`);

  // Nut
  const nutTop      = isMaple ? '#f8f0e0' : (isVintage ? '#f0e0b0' : '#303438');
  const nutBot      = isMaple ? '#d8c8a0' : (isVintage ? '#c8a860' : '#1a1e22');

  // Frets
  const fretColor   = isVintage ? (isMaple ? '#8a7858' : '#8a6420')
                    : (isMaple  ? '#8a7858' : '#2a3038');
  const fret12Color = isVintage ? (isMaple ? '#b0986a' : '#b08840')
                    : (isMaple  ? '#b0986a' : '#3a4450');

  // Strings
  const stringColor = isVintage ? (isMaple ? '#3a2a0a' : '#c8a030')
                    : (isMaple  ? '#3a2a0a' : '#8090a0');

  // Labels
  const labelFill         = isVintage ? (isMaple ? '#7a6040' : '#6a5830')
                          : (isMaple  ? '#7a6040' : accentDim);
  const stringLabelColor  = isVintage ? (isMaple ? '#a07828' : '#c89030')
                          : (isMaple  ? accentColor : accentColor);

  // Revealed note circles
  const noteCircleBg     = isVintage ? (isMaple ? 'rgba(180,130,60,0.9)' : 'rgba(42,22,8,0.85)')
                         : (isMaple  ? 'rgba(180,130,60,0.9)' : 'rgba(10,14,20,0.92)');
  const noteCircleStroke = isVintage ? (isMaple ? 'rgba(120,80,20,0.7)'  : 'rgba(200,144,48,0.6)')
                         : (isMaple  ? 'rgba(120,80,20,0.7)'  : `${accentColor}99`);
  const noteTextColor    = isVintage ? (isMaple ? '#5a3a10' : '#d4902a')
                         : (isMaple  ? '#5a3a10' : accentColor);

  const stringWidths = instrument === 'bass'
    ? [2.0, 2.8, 3.6, 4.4]
    : [1.0, 1.3, 1.7, 2.2, 2.8, 3.5];

  const INLAY = [3,5,7,9];
  const INLAY2 = [12];
  const FRET_LABELS = [1,3,5,7,9,12];

  // Check if a cell has a marker
  const markerAt = (s,f) => markers.find(m => m.s===s && m.f===f);

  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`}>
      <defs>
        <linearGradient id="bgrd" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={boardTop}/>
          <stop offset="40%" stopColor={boardMid}/>
          <stop offset="100%" stopColor={boardBot}/>
        </linearGradient>
        <linearGradient id="nutGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor={nutTop}/>
          <stop offset="100%" stopColor={nutBot}/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
      </defs>

      {/* Board background */}
      <rect x={ML} y={MT - SH*0.55} width={totalFrets*FW} height={lastS*SH + SH*1.1}
        fill="url(#bgrd)" rx="2"/>

      {/* Wood grain lines */}
      {[0.2,0.45,0.72,0.88].map((t,i) => (
        <line key={i}
          x1={ML} y1={MT - SH*0.55 + t*(lastS*SH+SH*1.1)}
          x2={ML+totalFrets*FW} y2={MT - SH*0.55 + t*(lastS*SH+SH*1.1)}
          stroke={grainColor} strokeWidth="1"/>
      ))}

      {/* Fret set highlight */}
      {fretSet && (() => {
        const isMetal = theme === 'metal';
        const isFunk  = theme === 'funk';
        const fillRgb   = isMetal ? '0,200,255' : isFunk ? '255,64,192' : '180,120,30';
        const strokeRgb = isMetal ? '0,200,255' : isFunk ? '255,64,192' : '200,160,60';
        const barRgb    = isMetal ? '0,200,255' : isFunk ? '200,255,32' : '200,160,60';
        return (
        <>
          <rect
            x={ML + (fretSet[0]-1)*FW} y={MT - SH*0.55}
            width={(fretSet[1]-fretSet[0]+1)*FW} height={lastS*SH+SH*1.1}
            fill={`rgba(${fillRgb},0.13)`} rx="2"/>
          <rect
            x={ML + (fretSet[0]-1)*FW} y={MT - SH*0.55}
            width={(fretSet[1]-fretSet[0]+1)*FW} height={lastS*SH+SH*1.1}
            fill="none" stroke={`rgba(${strokeRgb},0.55)`} strokeWidth="1.5" rx="2"/>
          <rect
            x={ML + (fretSet[0]-1)*FW} y={MT - SH*0.55}
            width={(fretSet[1]-fretSet[0]+1)*FW} height={3}
            fill={`rgba(${barRgb},0.6)`} rx="1"/>
          <rect
            x={ML + (fretSet[0]-1)*FW} y={MT + lastS*SH + SH*0.55 - 3}
            width={(fretSet[1]-fretSet[0]+1)*FW} height={3}
            fill={`rgba(${barRgb},0.6)`} rx="1"/>
        </>
        );
      })()}

      {/* Inlay dots */}
      {INLAY.map(f => f <= totalFrets && (
        <circle key={f} cx={cx(f)} cy={MT + (lastS/2)*SH} r={5.5}
          fill={inlayFill} stroke={inlayStroke} strokeWidth="0.5"/>
      ))}
      {INLAY2.filter(f => f <= totalFrets).map(f => [lastS*0.24, lastS*0.76].map((sv,i) => (
        <circle key={`${f}-${i}`} cx={cx(f)} cy={MT + sv*SH} r={5.5}
          fill={inlayFill} stroke={inlayStroke} strokeWidth="0.5"/>
      )))}

      {/* Nut */}
      <rect x={ML-5} y={MT-SH*0.55} width={5} height={lastS*SH+SH*1.1}
        fill="url(#nutGrad)" rx="1"/>

      {/* Fret lines */}
      {Array.from({length:totalFrets},(_,i)=>i+1).map(f => (
        <line key={f}
          x1={ML+f*FW} y1={MT-SH*0.55}
          x2={ML+f*FW} y2={MT+lastS*SH+SH*0.55}
          stroke={f===12?fret12Color:fretColor}
          strokeWidth={f===12?2.5:1.5}/>
      ))}

      {/* String lines */}
      {strings.map((_, s) => (
        <line key={s}
          x1={ML-5} y1={cy(s)} x2={ML+totalFrets*FW+1} y2={cy(s)}
          stroke={stringColor} strokeWidth={stringWidths[s]} opacity="0.85"/>
      ))}

      {/* Fret number labels */}
      {FRET_LABELS.filter(f=>f<=totalFrets).map(f => (
        <text key={f} x={cx(f)} y={MT-16} textAnchor="middle"
          fill={labelFill} fontSize="11" fontFamily="'DM Mono',monospace">{f}</text>
      ))}

      {/* String labels — in free-learn mode show clickable ✕ / revealed note */}
      {strings.map((n, s) => {
        const openKey = `${s}-0`;
        const isFreeLearning = freeLearn;
        const openRevealed = showNotes[openKey];
        if (isFreeLearning && !openRevealed) {
          return (
            <text key={s} x={ML-18} y={cy(s)+5} textAnchor="middle"
              fill="#c04040" fontSize="15" fontWeight="700"
              fontFamily="'DM Mono',monospace"
              style={{pointerEvents:'none'}}>✕</text>
          );
        }
        if (isFreeLearning && openRevealed) {
          return (
            <text key={s} x={ML-18} y={cy(s)+5} textAnchor="middle"
              fill={noteTextColor} fontSize="11" fontWeight="600"
              fontFamily="'DM Mono',monospace"
              style={{pointerEvents:'none'}}>{showNote(noteAt(s,0,instrument), noteStyle)}</text>
          );
        }
        return (
          <text key={s} x={ML-18} y={cy(s)+5} textAnchor="middle"
            fill={stringLabelColor} fontSize="13" fontWeight="600"
            fontFamily="'DM Mono',monospace">{n}</text>
        );
      })}

      {/* Revealed note labels (free mode) — skip fret 0 (shown in string label) */}
      {Object.entries(showNotes).filter(([key]) => !key.endsWith('-0')).map(([key, note]) => {
        const [s,f] = key.split('-').map(Number);
        const r = 13;
        const fs = showNote(noteAt(s,f,instrument),noteStyle).includes('/') ? 8 : 11;
        return (
          <g key={key}>
            <circle cx={cx(f)} cy={cy(s)} r={r} fill={noteCircleBg} stroke={noteCircleStroke} strokeWidth="1"/>
            <text x={cx(f)} y={cy(s)+4} textAnchor="middle"
              fill={noteTextColor} fontSize={fs}
              fontFamily="'DM Mono',monospace" fontWeight="500">{showNote(noteAt(s,f,instrument),noteStyle)}</text>
          </g>
        );
      })}

      {/* Markers */}
      {markers.map((m, i) => {
        const mcx = cx(m.f), mcy = cy(m.s);
        const isMetal = theme === 'metal';
        const isFunk  = theme === 'funk';
        const colors = {
          question: isMetal ? ['#08384a', '#80e0ff']
                  : isFunk  ? ['#3a0a30', '#ffb0e8']
                  : ['#a87028', '#f0ddb8'],
          correct:  isMetal ? ['#0a4838', '#80f0c0']
                  : isFunk  ? ['#2a3a08', '#e8ff80']
                  : ['#4a7830', '#b0e890'],
          wrong:    isMetal ? ['#480818', '#ff90a0']
                  : isFunk  ? ['#480818', '#ff90a0']
                  : ['#882018', '#f0a090'],
          marked:   isMetal ? ['#08384a', '#80e0ff']
                  : isFunk  ? ['#3a0a30', '#ffb0e8']
                  : ['#a87028', '#f0ddb8'],
          interval: isMetal ? ['#082838', '#a0d8ff']
                  : isFunk  ? ['#2a0a3a', '#c890ff']
                  : ['#285870', '#90c8e8'],
          // Free-learn scale roots — high contrast vs interval/pentatonic on every theme.
          root:     isMetal ? ['#5a3818', '#ffd070']
                  : isFunk  ? ['#5a2a18', '#ffd060']
                  :           ['#7a5018', '#ffe890'],
          // Free-learn pentatonic tones — green family, distinct from blue interval.
          pentatonic: isMetal ? ['#0a4830', '#90f0b0']
                    : isFunk  ? ['#1a3a08', '#b8f070']
                    :           ['#2a5828', '#a0d878'],
        };
        const [bg, fg] = colors[m.type] || colors.question;
        const fill = m.fill || bg;
        const stroke = m.stroke || fg;
        const textColor = m.textColor || fg;
        const label = m.label ?? '?';
        const small = label.length > 2;
        const glow = m.type === 'question' || m.type === 'root';
        return (
          <g key={i}
             filter={glow ? "url(#glow)" : undefined}
             onMouseEnter={m.onMouseEnter}
             onMouseLeave={m.onMouseLeave}
             style={m.onMouseEnter ? {cursor:'pointer'} : undefined}>
            <circle cx={mcx} cy={mcy} r={13} fill={fill} stroke={stroke} strokeWidth="1.5" opacity={m.opacity ?? 0.95}/>
            {label && <text x={mcx} y={mcy+4} textAnchor="middle"
              fill={textColor} fontSize={small?8:11}
              fontFamily="'DM Mono',monospace" fontWeight="600">{label}</text>}
          </g>
        );
      })}

      {/* Selected cell highlight (free mode) */}
      {selectedCell && !markerAt(selectedCell.s, selectedCell.f) && (
        <rect
          x={selectedCell.f===0 ? (freeLearn ? ML-18-12 : cx(0)-14) : cx(selectedCell.f)-FW/2+2}
          y={cy(selectedCell.s)-SH/2+2}
          width={selectedCell.f===0 ? 24 : FW-4} height={SH-4}
          fill="rgba(200,144,48,0.12)" stroke="rgba(200,144,48,0.5)"
          strokeWidth="1" rx="2"/>
      )}

      {/* String set highlight (Mode 4) — rendered last so the frame is never
          covered by the nut, strings, or markers. Theme-aware accent picked
          to contrast with each theme's primary hue (gold/cyan/pink). */}
      {stringSet && (() => {
        const accent = theme === 'metal' ? '255,170,70'   // amber, opposite cyan
                     : theme === 'funk'  ? '120,255,140'  // lime, opposite magenta
                     :                     '160,120,240'; // violet, opposite vintage gold
        const top = stringSet[0], bot = stringSet[stringSet.length-1];
        const y = cy(top) - SH*0.55;
        const h = (bot - top) * SH + SH*1.1;
        const x = ML - 4;
        const w = totalFrets * FW + 8;
        return (
        <g pointerEvents="none">
          <rect x={x} y={y} width={w} height={h} fill={`rgba(${accent},0.07)`} rx="3"/>
          <rect x={x}         y={y}         width={w} height={3} fill={`rgba(${accent},0.85)`} rx="1.5"/>
          <rect x={x}         y={y + h - 3} width={w} height={3} fill={`rgba(${accent},0.85)`} rx="1.5"/>
          <rect x={x}         y={y}         width={3} height={h} fill={`rgba(${accent},0.85)`} rx="1.5"/>
          <rect x={x + w - 3} y={y}         width={3} height={h} fill={`rgba(${accent},0.85)`} rx="1.5"/>
        </g>
        );
      })()}

      {/* Interactive click areas */}
      {interactive && strings.map((_,s) =>
        Array.from({length:totalFrets+1},(_,f)=>f).map(f => {
          const inFret   = !fretSet   || (f===0 || (f>=fretSet[0] && f<=fretSet[1]));
          const inString = !stringSet || stringSet.includes(s);
          const inRange  = inFret && inString;
          const isFret0 = f === 0;
          // Open-string hit-box spans the entire region left of the nut so
          // clicking the string-name label (e.g. "E") also registers as fret 0.
          const x = isFret0 ? 0 : cx(f)-FW/2+1;
          const width = isFret0 ? ML-5 : FW-2;
          return (
            <rect key={`${s}-${f}`}
              x={x} y={cy(s)-SH/2}
              width={width} height={SH}
              fill="transparent"
              style={{cursor: inRange?'crosshair':'default'}}
              onClick={() => inRange && onCellClick && onCellClick(s,f)}/>
          );
        })
      )}
    </svg>
  );
}

/* ═══════════════════════════════════════
   TIMER HOOK
═══════════════════════════════════════ */
function useTimer() {
  const [t, setT] = useState(0);
  const ref = useRef(null);
  const start = useCallback(() => {
    setT(0);
    clearInterval(ref.current);
    ref.current = setInterval(() => setT(p => p+1), 1000);
  }, []);
  const stop = useCallback(() => clearInterval(ref.current), []);
  useEffect(() => () => clearInterval(ref.current), []);
  return [t, start, stop];
}

/* ═══════════════════════════════════════
   MOBILE NOTE KEYBOARD
═══════════════════════════════════════ */
const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

function NoteKeyboard({ onNote, disabled, noteStyle='both' }) {
  return (
    <div className="note-keyboard">
      {CHROMATIC.map(n => (
        <button key={n} className="note-key" disabled={disabled}
          onClick={() => onNote(n)}>
          {showNote(n, noteStyle)}
        </button>
      ))}
    </div>
  );
}

function ChordKeyboard({ onChord, disabled, noteStyle='both', difficulty='easy' }) {
  const [root, setRoot] = useState(null);

  function pickRoot(n) {
    setRoot(n);
  }

  function pickQuality(q) {
    if (!root) return;
    // Qualities that append directly without space: 7, sus2, sus4, add9, maj7, m7, 9, 7#9
    const spacedQualities = ['major', 'minor'];
    const name = spacedQualities.includes(q) ? root + ' ' + q : root + q;
    onChord(name);
    setRoot(null);
  }

  const qualities = qualitiesForDifficulty(difficulty);

  useEffect(() => { if (disabled) setRoot(null); }, [disabled]);

  if (root) {
    return (
      <div className="note-keyboard">
        <div style={{width:'100%',textAlign:'center',fontFamily:'DM Mono',fontSize:'0.75rem',
          color:'var(--text-muted)',marginBottom:4}}>
          Root: <span style={{color:'var(--gold)'}}>{showNote(root, noteStyle)}</span>
        </div>
        {qualities.map(q => (
          <button key={q} className="note-key" style={{minWidth:70}} disabled={disabled}
            onClick={() => pickQuality(q)}>{q}</button>
        ))}
        <button className="note-key" style={{minWidth:70,color:'var(--text-muted)'}}
          onClick={() => setRoot(null)}>← back</button>
      </div>
    );
  }

  return (
    <div className="note-keyboard">
      {CHROMATIC.map(n => (
        <button key={n} className="note-key" disabled={disabled}
          onClick={() => pickRoot(n)}>
          {showNote(n, noteStyle)}
        </button>
      ))}
    </div>
  );
}

/* ═══════════════════════════════════════
   STATS PERSISTENCE
═══════════════════════════════════════ */
const STATS_KEY = 'frem_stats';

function loadStats() {
  try { return JSON.parse(localStorage.getItem(STATS_KEY)) || []; }
  catch { return []; }
}

function saveResult(record) {
  const stats = loadStats();
  stats.push({ ...record, timestamp: Date.now() });
  localStorage.setItem(STATS_KEY, JSON.stringify(stats));
}

/* ═══════════════════════════════════════
   FRETBOARD HEATMAP (post-game)
═══════════════════════════════════════ */
// Renders a colored Fretboard where each cell is shaded by how long it took
// to resolve. Green = fastest, red = slowest, smooth HSL gradient in between.
// `cellTimes` is a plain object keyed by "s-f" → seconds (float).
function FretboardHeatmap({ cellTimes, totalFrets, instrument, noteStyle, boardType, theme }) {
  const [hovered, setHovered] = useState(null);

  const entries = Object.entries(cellTimes);
  if (entries.length === 0) return null;
  const times = entries.map(([,t]) => t);

  // Rank-based color mapping: sort all times, give each unique time its rank,
  // map rank → hue. This guarantees full green→red spread regardless of how
  // the times are distributed (linear mapping gets too "green" when there's a
  // slow outlier compressing everything else into the green half).
  const sortedUnique = [...new Set(times)].sort((a, b) => a - b);
  const rankByTime = new Map();
  sortedUnique.forEach((t, i) => rankByTime.set(t, i));
  const denom = Math.max(sortedUnique.length - 1, 1);
  const tMin = sortedUnique[0];
  const tMax = sortedUnique[sortedUnique.length - 1];

  const markers = entries.map(([key, t]) => {
    const [s, f] = key.split('-').map(Number);
    const note = showNote(noteAt(s, f, instrument), noteStyle);
    const k = rankByTime.get(t) / denom;   // 0 → 1
    const hue = (1 - k) * 120;             // 120 (green) → 0 (red)
    return {
      s, f,
      type: 'heatmap',
      label: note,
      fill:   `hsl(${hue},75%,45%)`,
      stroke: `hsl(${hue},80%,25%)`,
      textColor: '#fff',
      onMouseEnter: () => setHovered({ key, note, t }),
      onMouseLeave: () => setHovered(h => h?.key === key ? null : h),
    };
  });

  return (
    <div style={{display:'flex',flexDirection:'column',gap:8,alignItems:'center',width:'100%'}}>
      <div style={{fontFamily:'DM Mono',fontSize:'0.7rem',color:'var(--text-muted)',
        letterSpacing:'0.1em',textTransform:'uppercase'}}>
        Heatmap — green = fastest, red = slowest
      </div>
      <div style={{fontFamily:'DM Mono',fontSize:'0.65rem',color:'var(--text-muted)',
        display:'flex',gap:14,alignItems:'center'}}>
        <span><span style={{display:'inline-block',width:9,height:9,borderRadius:'50%',
          background:'hsl(120,75%,45%)',marginRight:6,verticalAlign:'middle'}}/>
          {tMin.toFixed(2)}s
        </span>
        <span style={{width:120,height:8,borderRadius:4,
          background:'linear-gradient(90deg,hsl(120,75%,45%),hsl(60,75%,45%),hsl(0,75%,45%))'}}/>
        <span><span style={{display:'inline-block',width:9,height:9,borderRadius:'50%',
          background:'hsl(0,75%,45%)',marginRight:6,verticalAlign:'middle'}}/>
          {tMax.toFixed(2)}s
        </span>
      </div>
      <div className="fretboard-wrap">
        <Fretboard markers={markers} totalFrets={totalFrets} noteStyle={noteStyle}
          boardType={boardType} theme={theme} instrument={instrument}/>
      </div>
      <div style={{fontFamily:'DM Mono',fontSize:'0.8rem',height:22,
        color: hovered ? 'var(--gold)' : 'var(--text-muted)',letterSpacing:'0.05em'}}>
        {hovered
          ? <><strong>{hovered.note}</strong> — {hovered.t.toFixed(2)}s</>
          : 'hover a note to see its exact time'}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   GAME MODE 1: RANDOM NOTE
═══════════════════════════════════════ */
function RandomNoteGame({ onBack, tweaks }) {
  const totalFrets = tweaks.frets;
  const instrument = tweaks.instrument || 'guitar';
  const nStrings = stringsFor(instrument).length;
  const [done, setDone] = useState(new Set());
  const [enabledStrings] = useState(() => {
    const raw = tweaks.randomGameStrings || [];
    let arr = Array.from({length:nStrings}, (_, i) => raw[i] !== false);
    if (!arr.some(Boolean)) arr = arr.map(() => true); // safety net
    return arr;
  });
  const [queue, setQueue] = useState(() => {
    const q = [];
    for (let s = 0; s < nStrings; s++) {
      if (!enabledStrings[s]) continue;
      for (let f = 1; f <= totalFrets; f++) q.push({s,f});
    }
    return shuffleArr(q);
  });
  const total = queue.length;
  const [qi, setQi] = useState(0);
  const [input, setInput] = useState('');
  const [feedback, setFeedback] = useState(null);
  const [streak, setStreak] = useState(0);
  const [finished, setFinished] = useState(false);
  const [time, startTimer, stopTimer] = useTimer();
  const inputRef = useRef(null);
  const [flashing, setFlashing] = useState(false);
  const [cellTimes, setCellTimes] = useState({});
  const taskStartRef = useRef(0);

  useEffect(() => { startTimer(); taskStartRef.current = Date.now(); }, []);
  useEffect(() => { if (!feedback) inputRef.current?.focus(); }, [feedback]);
  useEffect(() => { inputRef.current?.focus(); taskStartRef.current = Date.now(); }, [qi]);
  useEffect(() => {
    if (finished) saveResult({ mode: 'random', timeSeconds: time, totalItems: total, avgPerItem: +(time/total).toFixed(2), strings: enabledStrings, instrument });
  }, [finished]);
  useEffect(() => {
    function onKey(e) { if (e.key === 'Escape') onBack(); }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const current = queue[qi % queue.length];
  const expected = current ? noteAt(current.s, current.f, instrument) : null;

  function handleAnswer(note) {
    if (!current) return;
    if (note === expected) {
      const key = `${current.s}-${current.f}`;
      const elapsed = (Date.now() - taskStartRef.current) / 1000;
      setCellTimes(prev => ({ ...prev, [key]: elapsed }));
      const newDone = new Set(done); newDone.add(key);
      setDone(newDone);
      setStreak(s => s+1);
      setFeedback('correct');
      setFlashing(true);
      if (newDone.size >= total) {
        stopTimer();
        setTimeout(() => setFinished(true), 600);
      } else {
        setTimeout(() => { setFlashing(false); setFeedback(null); setInput(''); setQi(q => q+1); }, 500);
      }
    } else {
      setStreak(0);
      setFeedback('wrong');
      setTimeout(() => {
        setFeedback(null);
        setInput('');
      }, 600);
    }
  }

  function submit() {
    if (!input.trim()) return;
    handleAnswer(matchNote(input, expected) ? expected : input);
  }

  if (finished) return (
    <div className="game-wrap" style={{textAlign:'center',gap:32}}>
      <div style={{fontSize:'clamp(2rem,5vw,3rem)',fontWeight:900,fontStyle:'italic',color:'var(--gold)',textShadow:'0 0 40px rgba(200,144,48,0.4)'}}>
        All Clear!
      </div>
      <div style={{fontFamily:'DM Mono',fontSize:'0.85rem',color:'var(--text-dim)',letterSpacing:'0.1em'}}>
        You named every note on the fretboard
      </div>
      <div style={{display:'flex',gap:40,justifyContent:'center',flexWrap:'wrap',fontFamily:'DM Mono',fontSize:'0.8rem',color:'var(--text-dim)'}}>
        <span><span style={{color:'var(--text-muted)'}}>time </span>{time}s</span>
        <span><span style={{color:'var(--text-muted)'}}>notes </span>{total}</span>
        <span><span style={{color:'var(--text-muted)'}}>best streak </span>{streak}</span>
        <span><span style={{color:'var(--text-muted)'}}>avg/note </span>{(time/total).toFixed(1)}s</span>
      </div>
      <div style={{width:80,height:1,background:'linear-gradient(90deg,transparent,var(--gold),transparent)',margin:'0 auto'}}/>
      <FretboardHeatmap cellTimes={cellTimes} totalFrets={totalFrets} instrument={instrument}
        noteStyle={tweaks.noteStyle} boardType={tweaks.board} theme={tweaks.theme}/>
      <button className="submit-btn" style={{fontSize:'0.9rem',padding:'12px 32px'}} onClick={onBack}>
        ← back to menu
      </button>
    </div>
  );

  // Solved + current markers
  const markers = [
    ...[...done].map(key => {
      const [s, f] = key.split('-').map(Number);
      return { s, f, type: 'correct', label: '', opacity: 0.45 };
    }),
    // Current question
    ...(current ? [{
      s: current.s, f: current.f,
      type: feedback==='correct' ? 'correct' : feedback==='wrong' ? 'wrong' : 'question',
      label: feedback==='correct' ? '' : '?'
    }] : [])
  ];

  return (
    <div className="game-wrap">
      <div className="game-header">
        <span className="game-title">▸ Guess the Note</span>
        <button className="back-btn" onClick={onBack}>← back</button>
      </div>

      <div className="fretboard-wrap">
        <Fretboard markers={markers} totalFrets={totalFrets} noteStyle={tweaks.noteStyle} boardType={tweaks.board} theme={tweaks.theme} instrument={instrument}/>
      </div>

      <div className="input-area">
        <div className="prompt-text">Find the note!</div>
        {isMobile ? (
          <NoteKeyboard onNote={n => !feedback && handleAnswer(n)} disabled={!!feedback} noteStyle={tweaks.noteStyle}/>
        ) : (
          <div className="note-input-row">
            <input
              ref={inputRef}
              className={`note-input ${feedback||''} ${flashing?'flash':''}`}
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key==='Enter' && submit()}
              placeholder="note…"
              maxLength={4}
              disabled={!!feedback}
              autoComplete="off" autoCorrect="off" spellCheck="false"
            />
            <button className="submit-btn" onClick={submit}>Enter ↵</button>
          </div>
        )}
        <div className={`feedback-msg ${feedback||''}`}>
          {feedback==='correct' && '✓ Correct!'}
          {feedback==='wrong' && '✗ Wrong answer, try again'}
        </div>
      </div>

      <div className="progress-bar-wrap">
        <div className="progress-label">
          <span>Progress</span>
          <span>{done.size}/{total}</span>
        </div>
        <div className="progress-track">
          <div className="progress-fill" style={{width:`${(done.size/total)*100}%`}}/>
        </div>
      </div>

      <div className="stats-row">
        <span><span className="stat-label">time </span><span className="stat-val">{time}s</span></span>
        <span><span className="stat-label">streak </span><span className={`stat-val ${streak>4?'good':''}`}>{streak}</span></span>
        <span style={{fontFamily:'DM Mono',fontSize:'0.68rem',color:'var(--text-muted)'}}>type name + enter</span>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   GAME MODE 2: FIND NOTES IN FRET SET
═══════════════════════════════════════ */
function FindNotesGame({ onBack, tweaks }) {
  const instrument = tweaks.instrument || 'guitar';
  const nStrings = stringsFor(instrument).length;
  const SET_SIZE = 3 * nStrings;
  const TOTAL_MODE2 = SET_SIZE * FRET_SETS_MODE2.length;
  const [setIdx, setSetIdx] = useState(0);
  const fretSet = FRET_SETS_MODE2[setIdx];
  const [noteQueue, setNoteQueue] = useState(() => notesInSet(FRET_SETS_MODE2[0], nStrings, instrument));
  const [noteQi, setNoteQi] = useState(0);
  const [foundInSet, setFoundInSet] = useState(new Set());
  const [totalFound, setTotalFound] = useState(0);
  const [wrongKey, setWrongKey] = useState(null);
  const [setComplete, setSetComplete] = useState(false);
  const [finished, setFinished] = useState(false);
  const [time, startTimer, stopTimer] = useTimer();
  const [cellTimes, setCellTimes] = useState({});
  const taskStartRef = useRef(0);

  useEffect(() => { startTimer(); taskStartRef.current = Date.now(); }, []);
  // Reset the per-target timer whenever a new target note appears.
  useEffect(() => { taskStartRef.current = Date.now(); }, [noteQi, setIdx]);
  useEffect(() => {
    if (finished) saveResult({ mode: 'find', timeSeconds: time, totalItems: TOTAL_MODE2, avgPerItem: +(time/TOTAL_MODE2).toFixed(2) });
  }, [finished]);
  useEffect(() => {
    function onKey(e) { if (e.key === 'Escape') onBack(); }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const targetNote = noteQueue[noteQi] ?? null;
  const targetPositions = targetNote ? positionsOfNote(targetNote, fretSet, nStrings, instrument) : [];
  const remainingForNote = targetPositions.filter(p => !foundInSet.has(p));

  function clickCell(s, f) {
    if (setComplete || !targetNote) return;
    const key = `${s}-${f}`;
    if (foundInSet.has(key)) return;
    if (noteAt(s,f,instrument) === targetNote) {
      const elapsed = (Date.now() - taskStartRef.current) / 1000;
      setCellTimes(prev => ({ ...prev, [key]: elapsed }));
      const newFound = new Set(foundInSet); newFound.add(key);
      setFoundInSet(newFound);
      setTotalFound(t => t+1);
      // All occurrences of this note found?
      const remaining = targetPositions.filter(p => !newFound.has(p));
      if (remaining.length === 0) {
        const nextNoteQi = noteQi + 1;
        // All notes in set found?
        if (nextNoteQi >= noteQueue.length) {
          setSetComplete(true);
          const isLastSet = setIdx === FRET_SETS_MODE2.length - 1;
          if (isLastSet && totalFound + 1 >= TOTAL_MODE2) {
            stopTimer();
            setTimeout(() => setFinished(true), 1400);
          } else {
            setTimeout(() => {
              const nextIdx = (setIdx + 1) % FRET_SETS_MODE2.length;
              const nextFretSet = FRET_SETS_MODE2[nextIdx];
              setSetIdx(nextIdx);
              setNoteQueue(notesInSet(nextFretSet, nStrings, instrument));
              setNoteQi(0);
              setFoundInSet(new Set());
              setSetComplete(false);
            }, 1400);
          }
        } else {
          setNoteQi(nextNoteQi);
        }
      }
    } else {
      setWrongKey(key);
      setTimeout(() => setWrongKey(null), 700);
    }
  }

  const markers = [];
  for(let s=0;s<nStrings;s++) for(let f=fretSet[0];f<=fretSet[1];f++) {
    const key = `${s}-${f}`;
    if (foundInSet.has(key)) markers.push({s,f,type:'correct',label:'',opacity:0.45});
    if (wrongKey===key) markers.push({s,f,type:'wrong',label:'✗'});
  }

  const setFoundCount = foundInSet.size;

  if (finished) return (
    <div className="game-wrap" style={{textAlign:'center',gap:32}}>
      <div style={{fontSize:'clamp(2rem,5vw,3rem)',fontWeight:900,fontStyle:'italic',color:'var(--gold)',textShadow:'0 0 40px rgba(200,144,48,0.4)'}}>
        All Clear!
      </div>
      <div style={{fontFamily:'DM Mono',fontSize:'0.85rem',color:'var(--text-dim)',letterSpacing:'0.1em'}}>
        You found every note on the fretboard
      </div>
      <div style={{display:'flex',gap:32,justifyContent:'center',flexWrap:'wrap',fontFamily:'DM Mono',fontSize:'0.8rem',color:'var(--text-dim)'}}>
        <span><span style={{color:'var(--text-muted)'}}>time </span>{time}s</span>
        <span><span style={{color:'var(--text-muted)'}}>notes </span>{TOTAL_MODE2}</span>
        <span><span style={{color:'var(--text-muted)'}}>avg/note </span>{(time/TOTAL_MODE2).toFixed(1)}s</span>
      </div>
      <div style={{width:80,height:1,background:'linear-gradient(90deg,transparent,var(--gold),transparent)',margin:'0 auto'}}/>
      <FretboardHeatmap cellTimes={cellTimes} totalFrets={12} instrument={instrument}
        noteStyle={tweaks.noteStyle} boardType={tweaks.board} theme={tweaks.theme}/>
      <button className="submit-btn" style={{fontSize:'0.9rem',padding:'12px 32px'}} onClick={onBack}>
        ← back to menu
      </button>
    </div>
  );

  return (
    <div className="game-wrap">
      <div className="game-header">
        <span className="game-title">▸ Find Notes in Fret Set</span>
        <button className="back-btn" onClick={onBack}>← back</button>
      </div>

      <div className="fretboard-wrap">
        <Fretboard markers={markers} onCellClick={clickCell} fretSet={fretSet} interactive={true} totalFrets={12} noteStyle={tweaks.noteStyle} boardType={tweaks.board} theme={tweaks.theme} instrument={instrument}/>
      </div>

      <div className="input-area">
        {setComplete ? (
          <div style={{fontFamily:'DM Mono',fontSize:'0.95rem',color:'var(--correct)',letterSpacing:'0.1em'}}>
            ✓ Set complete! Next set…
          </div>
        ) : (
          <div style={{textAlign:'center'}}>
            <div className="prompt-text">
              Find all&nbsp;<strong style={{color:'var(--gold)',fontSize:'1.6rem'}}>{targetNote ? showNote(targetNote, tweaks.noteStyle) : '—'}</strong>
            </div>
            <div style={{fontFamily:'DM Mono',fontSize:'0.72rem',color:'var(--text-muted)',marginTop:6}}>
              {remainingForNote.length} remaining · frets {fretSet[0]}–{fretSet[1]}
            </div>
          </div>
        )}
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:8,alignItems:'center',width:'100%',maxWidth:600}}>
        <div className="progress-bar-wrap" style={{marginBottom:0}}>
          <div className="progress-label">
            <span>Fret set {setIdx+1}/{FRET_SETS_MODE2.length} · frets {fretSet[0]}–{fretSet[1]}</span>
            <span>{setFoundCount}/{SET_SIZE}</span>
          </div>
          <div className="progress-track">
            <div className="progress-fill" style={{width:`${(setFoundCount/SET_SIZE)*100}%`}}/>
          </div>
        </div>
        <div className="progress-bar-wrap" style={{marginBottom:0}}>
          <div className="progress-label"><span>Fretboard total</span><span>{totalFound}/{TOTAL_MODE2}</span></div>
          <div className="progress-track">
            <div className="progress-fill" style={{width:`${(totalFound/TOTAL_MODE2)*100}%`}}/>
          </div>
        </div>
      </div>

      <div className="stats-row">
        <span><span className="stat-label">time </span><span className="stat-val">{time}s</span></span>
        <span style={{fontFamily:'DM Mono',fontSize:'0.68rem',color:'var(--text-muted)'}}>click all occurrences</span>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   GAME MODE 3: CHORD IDENTIFICATION
═══════════════════════════════════════ */
function ChordGame({ onBack, tweaks }) {
  const diff = tweaks.chordDifficulty || 'easy';
  const isBass = (tweaks.instrument || 'guitar') === 'bass';
  const [chords] = useState(() => shuffleArr(chordsForDifficulty(diff)));
  const [ci, setCi] = useState(0);
  const [input, setInput] = useState('');
  const [feedback, setFeedback] = useState(null);
  const [score, setScore] = useState(0);
  const [finished, setFinished] = useState(false);
  const [phase, setPhase] = useState('naming');       // 'naming' | 'intervals'
  const [intervals, setIntervals] = useState([]);
  const [intervalIdx, setIntervalIdx] = useState(0);
  const [solvedSymbols, setSolvedSymbols] = useState(new Set());
  const [hintOpen, setHintOpen] = useState(false);
  const [hintLevel, setHintLevel] = useState(1);      // # of hints revealed (1..N)
  const [time, startTimer, stopTimer] = useTimer();
  const inputRef = useRef(null);

  useEffect(() => { startTimer(); }, []);
  useEffect(() => { inputRef.current?.focus(); }, [ci, phase, intervalIdx]);
  useEffect(() => { setHintOpen(false); setHintLevel(1); }, [ci, phase]);
  useEffect(() => {
    if (finished) saveResult({ mode: 'chord', timeSeconds: time, totalItems: CHORD_GOAL, avgPerItem: +(time/CHORD_GOAL).toFixed(2) });
  }, [finished]);
  useEffect(() => {
    function onKey(e) {
      if (e.key !== 'Escape') return;
      if (hintOpen) setHintOpen(false);
      else onBack();
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [hintOpen]);

  if (isBass) return (
    <div className="game-wrap" style={{maxWidth:480,textAlign:'center',gap:24}}>
      <div className="game-header">
        <span className="game-title">▸ Chord Identification</span>
        <button className="back-btn" onClick={onBack}>← back</button>
      </div>
      <div style={{fontFamily:'DM Mono',fontSize:'0.95rem',color:'var(--text-dim)',lineHeight:1.6,padding:'24px 0'}}>
        Chord mode uses guitar-specific CAGED shapes and isn't available for bass.<br/>
        Switch instrument to <strong style={{color:'var(--gold)'}}>guitar</strong> in Tweaks to play.
      </div>
      <button className="submit-btn" style={{fontSize:'0.9rem',padding:'12px 32px'}} onClick={onBack}>
        ← back to menu
      </button>
    </div>
  );

  const chord = chords[ci % chords.length];

  function advanceToNextChord(newScore) {
    if (newScore >= CHORD_GOAL) {
      stopTimer();
      setTimeout(() => setFinished(true), 700);
    } else {
      setTimeout(() => {
        setFeedback(null); setInput('');
        setCi(c => c + 1);
        setPhase('naming');
        setSolvedSymbols(new Set());
      }, 700);
    }
  }

  function handleNaming(name) {
    const norm = name.trim().toLowerCase().replace(/\s+/g,' ');
    if (chordNameCorrect(norm, chord.name.toLowerCase())) {
      setFeedback('correct');
      const ivs = buildChordIntervals(chord);
      setTimeout(() => {
        setFeedback(null); setInput('');
        setIntervals(ivs);
        setIntervalIdx(0);
        setSolvedSymbols(new Set());
        setPhase('intervals');
      }, 600);
    } else {
      setFeedback('wrong');
      setTimeout(() => { setFeedback(null); setInput(''); inputRef.current?.focus(); }, 1200);
    }
  }

  function handleInterval(note) {
    const current = intervals[intervalIdx];
    if (!current) return;
    if (note === current.note) {
      const newSolved = new Set(solvedSymbols);
      newSolved.add(current.symbol);
      setSolvedSymbols(newSolved);
      setFeedback('correct');
      const nextIdx = intervalIdx + 1;
      if (nextIdx >= intervals.length) {
        const newScore = score + 1;
        setScore(newScore);
        advanceToNextChord(newScore);
      } else {
        setTimeout(() => { setFeedback(null); setInput(''); setIntervalIdx(nextIdx); }, 600);
      }
    } else {
      setFeedback('wrong');
      setTimeout(() => { setFeedback(null); setInput(''); inputRef.current?.focus(); }, 1200);
    }
  }

  function submit() {
    if (!input.trim()) return;
    if (phase === 'naming') {
      handleNaming(input);
    } else {
      const current = intervals[intervalIdx];
      if (current && matchNote(input, current.note)) handleInterval(current.note);
      else handleInterval(input);
    }
  }

  // Skip current chord: reveal answer, mark as wrong, advance without scoring.
  function handleSolve() {
    setHintOpen(false);
    setInput(chord.name);
    setFeedback('wrong');
    setTimeout(() => {
      setFeedback(null); setInput('');
      setCi(c => c + 1);
      setPhase('naming');
      setSolvedSymbols(new Set());
    }, 1600);
  }

  if (finished) return (
    <div className="game-wrap" style={{maxWidth:480,textAlign:'center',gap:32}}>
      <div style={{fontSize:'clamp(2rem,5vw,3rem)',fontWeight:900,fontStyle:'italic',color:'var(--gold)',textShadow:'0 0 40px rgba(200,144,48,0.4)'}}>
        Well Done!
      </div>
      <div style={{fontFamily:'DM Mono',fontSize:'0.85rem',color:'var(--text-dim)',letterSpacing:'0.1em'}}>
        You identified {CHORD_GOAL} chords
      </div>
      <div style={{display:'flex',gap:40,justifyContent:'center',fontFamily:'DM Mono',fontSize:'0.8rem',color:'var(--text-dim)'}}>
        <span><span style={{color:'var(--text-muted)'}}>time </span>{time}s</span>
        <span><span style={{color:'var(--text-muted)'}}>chords </span>{CHORD_GOAL}</span>
        <span><span style={{color:'var(--text-muted)'}}>avg/chord </span>{(time/CHORD_GOAL).toFixed(1)}s</span>
      </div>
      <div style={{width:80,height:1,background:'linear-gradient(90deg,transparent,var(--gold),transparent)',margin:'0 auto'}}/>
      <button className="submit-btn" style={{fontSize:'0.9rem',padding:'12px 32px'}} onClick={onBack}>
        ← back to menu
      </button>
    </div>
  );

  // During interval phase: hide labels on unsolved dots, reveal note names on solved ones
  const hideIv = (tweaks.chordIntervals || 'show') === 'hide';
  const markers = chord.positions.map(({s, f, iv}) => {
    if (phase === 'naming') return { s, f, type:'interval', label: hideIv ? '' : iv };
    const solved = solvedSymbols.has(iv);
    return {
      s, f,
      type:  solved ? 'correct' : 'interval',
      label: solved ? showNote(noteAt(s, f), tweaks.noteStyle) : '',
    };
  });

  const currentIv = phase === 'intervals' ? intervals[intervalIdx] : null;

  // Hint helpers — derive root + quality from "<root> <quality>" name format.
  const QUALITY_HINTS = {
    'major':  'Major triad — bright, stable sound.',
    'minor':  'Minor triad — darker, somber sound.',
    '7':      'Dominant 7th — bluesy and unresolved.',
    'maj7':   'Major 7th — jazzy and dreamy.',
    'm7':     'Minor 7th — smooth and mellow.',
    'sus2':   'Suspended 2nd — open, no 3rd.',
    'sus4':   'Suspended 4th — open, no 3rd.',
    'add9':   'Add 9 — major chord with an added 9th, no 7th.',
    '9':      'Dominant 9th — extended dominant chord.',
    '7#9':    'Dominant 7♯9 — the "Hendrix" chord.',
  };
  const chordParts = (() => {
    // Names use both 'C major' (with space) and 'Bm7' / 'Bbsus2' (no space).
    const m = chord.name.match(/^([A-G][#b]?)\s*(.+)$/);
    return m ? { root: m[1], quality: m[2] } : { root: '?', quality: chord.name };
  })();
  const hintTexts = [
    QUALITY_HINTS[chordParts.quality] || `Quality: ${chordParts.quality}`,
    `The root's natural letter is ${chordParts.root[0]} (accidental hidden).`,
  ];

  return (
    <div className="game-wrap">
      <div className="game-header">
        <span className="game-title">▸ Chord Identification</span>
        <button className="back-btn" onClick={onBack}>← back</button>
      </div>

      <div className="fretboard-wrap">
        <Fretboard markers={markers} totalFrets={tweaks.frets} noteStyle={tweaks.noteStyle} boardType={tweaks.board} theme={tweaks.theme}/>
      </div>

      <div className="input-area">
        {phase === 'naming' ? (<>
          <div className="prompt-text">Which chord is this?</div>
          {isMobile ? (
            <ChordKeyboard onChord={name => !feedback && handleNaming(name)} disabled={!!feedback} noteStyle={tweaks.noteStyle} difficulty={diff}/>
          ) : (
            <div className="note-input-row">
              <input ref={inputRef}
                className={`note-input chord-input-wide ${feedback||''}`}
                value={input} onChange={e => setInput(e.target.value)}
                onKeyDown={e => e.key==='Enter' && submit()}
                placeholder="chord name…" disabled={feedback==='correct'}
                autoComplete="off" spellCheck="false"/>
              <button className="submit-btn" onClick={submit}>Enter ↵</button>
              <button className="submit-btn" onClick={() => setHintOpen(true)}
                      title="Show hints" aria-label="Show hints"
                      style={{padding:'10px 14px',fontSize:'0.95rem',fontWeight:700}}>?</button>
            </div>
          )}
          <div className={`feedback-msg ${feedback||''}`}>
            {feedback==='correct' && '✓ Correct!'}
            {feedback==='wrong' && '✗ Wrong, try again!'}
          </div>
          {!isMobile && <div style={{fontFamily:'DM Mono',fontSize:'0.68rem',color:'var(--text-muted)',marginTop:4}}>
            Numbers show intervals: 1=root  3=major 3rd  b3=minor 3rd  5=fifth  b7=minor 7th
          </div>}
        </>) : (<>
          <div style={{fontFamily:'DM Mono',fontSize:'0.75rem',color:'var(--text-muted)',marginBottom:6}}>
            Chord: <span style={{color:'var(--gold)',fontWeight:700}}>{chord.name}</span>
            &nbsp;·&nbsp;{solvedSymbols.size}/{intervals.length} intervals found
          </div>
          <div className="prompt-text">
            What is the <span style={{color:'var(--gold)'}}>{currentIv && IV_LABEL[currentIv.symbol]}</span>?
          </div>
          {isMobile ? (
            <NoteKeyboard onNote={n => !feedback && handleInterval(n)} disabled={!!feedback} noteStyle={tweaks.noteStyle}/>
          ) : (
            <div className="note-input-row">
              <input ref={inputRef}
                className={`note-input ${feedback||''}`}
                value={input} onChange={e => setInput(e.target.value)}
                onKeyDown={e => e.key==='Enter' && submit()}
                placeholder="note…" maxLength={4}
                disabled={feedback==='correct'}
                autoComplete="off" spellCheck="false"/>
              <button className="submit-btn" onClick={submit}>Enter ↵</button>
            </div>
          )}
          <div className={`feedback-msg ${feedback||''}`}>
            {feedback==='correct' && '✓ Correct!'}
            {feedback==='wrong' && '✗ Wrong, try again!'}
          </div>
        </>)}
      </div>

      <div className="progress-bar-wrap">
        <div className="progress-label">
          <span>Progress</span>
          <span>{score}/{CHORD_GOAL}</span>
        </div>
        <div className="progress-track">
          <div className="progress-fill" style={{width:`${(score/CHORD_GOAL)*100}%`}}/>
        </div>
      </div>

      <div className="stats-row">
        <span><span className="stat-label">time </span><span className="stat-val">{time}s</span></span>
        <span><span className="stat-label">score </span><span className="stat-val good">{score}</span></span>
      </div>

      {hintOpen && phase === 'naming' && (
        <div onClick={() => setHintOpen(false)} style={{
          position:'fixed', inset:0, background:'rgba(0,0,0,0.55)',
          display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000,
        }}>
          <div onClick={e => e.stopPropagation()} style={{
            background:'var(--bg)', border:'1px solid var(--gold-dim)',
            padding:'22px 26px', borderRadius:6, minWidth:300, maxWidth:420,
            fontFamily:'DM Mono, monospace', boxShadow:'0 10px 40px rgba(0,0,0,0.55)',
          }}>
            <div style={{fontSize:'0.72rem', color:'var(--gold)', letterSpacing:'0.18em',
                         marginBottom:14, textTransform:'uppercase'}}>
              Hints
            </div>
            <ol style={{margin:0, paddingLeft:18, fontSize:'0.85rem',
                        color:'var(--text)', lineHeight:1.7}}>
              {hintTexts.slice(0, hintLevel).map((h, i) =>
                <li key={i} style={{marginBottom:6}}>{h}</li>
              )}
            </ol>
            <div style={{display:'flex', gap:10, marginTop:20,
                         justifyContent:'space-between', flexWrap:'wrap'}}>
              {hintLevel < hintTexts.length ? (
                <button className="submit-btn" onClick={() => setHintLevel(l => l + 1)}>
                  Reveal another
                </button>
              ) : (
                <span style={{fontSize:'0.7rem', color:'var(--text-muted)',
                              alignSelf:'center'}}>All hints revealed</span>
              )}
              <div style={{display:'flex', gap:10}}>
                <button className="submit-btn" onClick={() => setHintOpen(false)}>Close</button>
                <button className="submit-btn" onClick={handleSolve}
                        style={{borderColor:'var(--wrong)', color:'var(--wrong)'}}>
                  Solve
                </button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════
   GAME MODE 4: FIND TRIADS
═══════════════════════════════════════ */
// A "chord set" = all valid triad voicings of one chord on the current
// stringset. The player completes 5 chord sets before the next stringset.
const CHORD_SETS_PER_STRINGSET = 5;

// Build a shuffled queue of {root, quality} chords that each have at least one
// playable triad voicing on the given stringset within `totalFrets`. Major and
// minor only for now.
function buildTriadChordQueue(stringSet, totalFrets, instrument) {
  const candidates = [];
  for (const root of CHROMATIC) {
    for (const quality of ['major', 'minor']) {
      if (findTriads(root, quality, stringSet, totalFrets, instrument).length > 0) {
        candidates.push({ root, quality });
      }
    }
  }
  return shuffleArr(candidates);
}

function FindTriadsGame({ onBack, tweaks }) {
  const totalFrets = tweaks.frets;
  const instrument = tweaks.instrument || 'guitar';
  const nStrings = stringsFor(instrument).length;
  const stringSets = useMemo(() => triadStringSets(nStrings), [nStrings]);
  const TOTAL_CHORD_SETS = stringSets.length * CHORD_SETS_PER_STRINGSET;

  const [setIdx, setSetIdx] = useState(0);
  const currentSet = stringSets[setIdx];

  const [chordQueue, setChordQueue] = useState(() =>
    buildTriadChordQueue(stringSets[0], totalFrets, instrument));
  const [chordIdx, setChordIdx] = useState(0);
  const currentChord = chordQueue[chordIdx % Math.max(1, chordQueue.length)];

  const [marks, setMarks] = useState([]);                          // in-progress: 0–3 {s,f}
  const [foundTriadsThisChord, setFoundTriadsThisChord] = useState([]); // cleared on chord change
  const [chordSetsCompletedThisSet, setChordSetsCompletedThisSet] = useState(0);
  const [totalChordSetsCompleted, setTotalChordSetsCompleted] = useState(0);
  const [feedback, setFeedback] = useState(null);                  // 'correct' | 'wrong'
  const [wrongMarks, setWrongMarks] = useState(null);
  const [setComplete, setSetComplete] = useState(false);
  const [finished, setFinished] = useState(false);
  const [time, startTimer, stopTimer] = useTimer();

  useEffect(() => { startTimer(); }, []);
  useEffect(() => {
    if (finished) saveResult({ mode:'triads', timeSeconds:time, totalItems:TOTAL_CHORD_SETS, avgPerItem:+(time/TOTAL_CHORD_SETS).toFixed(2) });
  }, [finished]);
  useEffect(() => {
    function onKey(e) {
      if (e.key === 'Escape') {
        if (marks.length > 0) setMarks([]);
        else onBack();
      }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [marks]);

  // Wipe found-triad markers when the chord prompt changes so the new chord
  // starts on a clean board. Counters are unaffected.
  useEffect(() => {
    setFoundTriadsThisChord([]);
    setMarks([]);
  }, [chordIdx]);

  const validTriadsForChord = useMemo(() =>
    currentChord ? findTriads(currentChord.root, currentChord.quality, currentSet, totalFrets, instrument) : [],
    [currentChord, currentSet, totalFrets, instrument]);

  const foundKeysThisChord = useMemo(() =>
    new Set(foundTriadsThisChord.map(triadKey)),
    [foundTriadsThisChord]);

  const remainingForChord = validTriadsForChord.filter(t => !foundKeysThisChord.has(triadKey(t)));

  function clickCell(s, f) {
    if (setComplete || finished || feedback) return;
    if (!currentSet.includes(s)) return;

    // Ignore clicks on cells that already belong to a found triad of the
    // CURRENT chord (foundTriadsThisChord is cleared on chord change).
    if (foundTriadsThisChord.some(t => t.some(p => p.s === s && p.f === f))) return;

    // Toggle an existing mark off.
    const existingIdx = marks.findIndex(m => m.s === s && m.f === f);
    if (existingIdx >= 0) {
      setMarks(marks.filter((_, i) => i !== existingIdx));
      return;
    }

    const newMarks = [...marks, { s, f }];
    if (newMarks.length < 3) {
      setMarks(newMarks);
      return;
    }

    // 3 marks — validate as a triad of the current chord.
    const key = triadKey(newMarks);
    const matched = validTriadsForChord.find(t => triadKey(t) === key);

    if (matched && !foundKeysThisChord.has(key)) {
      const updatedFound = [...foundTriadsThisChord, matched];
      setFoundTriadsThisChord(updatedFound);
      setFeedback('correct');
      setMarks(newMarks);
      setTimeout(() => {
        setFeedback(null);
        setMarks([]);
      }, 500);

      // Did this complete the current chord's set of triads?
      const chordSetComplete = validTriadsForChord.every(t =>
        updatedFound.some(ft => triadKey(ft) === triadKey(t)));

      if (chordSetComplete) {
        const newChordSetsThisSet = chordSetsCompletedThisSet + 1;
        const newTotal = totalChordSetsCompleted + 1;
        setChordSetsCompletedThisSet(newChordSetsThisSet);
        setTotalChordSetsCompleted(newTotal);

        if (newChordSetsThisSet >= CHORD_SETS_PER_STRINGSET) {
          setSetComplete(true);
          const isLastSet = setIdx === stringSets.length - 1;
          if (isLastSet) {
            stopTimer();
            setTimeout(() => setFinished(true), 1400);
          } else {
            setTimeout(() => {
              const nextIdx = setIdx + 1;
              const nextSet = stringSets[nextIdx];
              setSetIdx(nextIdx);
              setChordQueue(buildTriadChordQueue(nextSet, totalFrets, instrument));
              setChordIdx(0);
              setFoundTriadsThisChord([]);
              setChordSetsCompletedThisSet(0);
              setSetComplete(false);
              setMarks([]);
            }, 1400);
          }
        } else {
          // Advance to the next chord prompt within this stringset.
          setTimeout(() => setChordIdx(c => c + 1), 700);
        }
      }
    } else {
      setFeedback('wrong');
      setWrongMarks(newMarks);
      setMarks(newMarks);
      setTimeout(() => {
        setFeedback(null);
        setWrongMarks(null);
        setMarks([]);
      }, 800);
    }
  }

  if (finished) return (
    <div className="game-wrap" style={{maxWidth:480,textAlign:'center',gap:32}}>
      <div style={{fontSize:'clamp(2rem,5vw,3rem)',fontWeight:900,fontStyle:'italic',color:'var(--gold)',textShadow:'0 0 40px rgba(200,144,48,0.4)'}}>
        Triad Master!
      </div>
      <div style={{fontFamily:'DM Mono',fontSize:'0.85rem',color:'var(--text-dim)',letterSpacing:'0.1em'}}>
        You completed every triad set across all string sets
      </div>
      <div style={{display:'flex',gap:32,justifyContent:'center',flexWrap:'wrap',fontFamily:'DM Mono',fontSize:'0.8rem',color:'var(--text-dim)'}}>
        <span><span style={{color:'var(--text-muted)'}}>time </span>{time}s</span>
        <span><span style={{color:'var(--text-muted)'}}>triad sets </span>{TOTAL_CHORD_SETS}</span>
        <span><span style={{color:'var(--text-muted)'}}>avg/set </span>{(time/TOTAL_CHORD_SETS).toFixed(1)}s</span>
      </div>
      <div style={{width:80,height:1,background:'linear-gradient(90deg,transparent,var(--gold),transparent)',margin:'0 auto'}}/>
      <button className="submit-btn" style={{fontSize:'0.9rem',padding:'12px 32px'}} onClick={onBack}>
        ← back to menu
      </button>
    </div>
  );

  // Markers: found triads (green, faint, with note name) + current marks (cyan) + wrong-flash (red ✗)
  const markers = [];
  for (const triad of foundTriadsThisChord) {
    for (const p of triad) {
      markers.push({
        s: p.s, f: p.f,
        type: 'correct',
        label: showNote(noteAt(p.s, p.f, instrument), tweaks.noteStyle),
        opacity: 0.55,
      });
    }
  }
  const wrongKeySet = new Set((wrongMarks || []).map(m => `${m.s}-${m.f}`));
  for (const m of marks) {
    const key = `${m.s}-${m.f}`;
    if (wrongKeySet.has(key)) {
      markers.push({ s: m.s, f: m.f, type: 'wrong', label: '✗' });
    } else {
      markers.push({
        s: m.s, f: m.f,
        type: feedback === 'correct' ? 'correct' : 'marked',
        label: showNote(noteAt(m.s, m.f, instrument), tweaks.noteStyle),
      });
    }
  }

  const tuning = stringsFor(instrument);
  const stringLabels = currentSet.map(s => tuning[s]).join('-');
  const qualityWord = currentChord ? (currentChord.quality === 'minor' ? 'minor' : 'major') : '';
  const chordDisplay = currentChord
    ? `${showNote(currentChord.root, tweaks.noteStyle)} ${qualityWord}`
    : '—';

  return (
    <div className="game-wrap">
      <div className="game-header">
        <span className="game-title">▸ Find Triads</span>
        <button className="back-btn" onClick={onBack}>← back</button>
      </div>

      <div className="fretboard-wrap">
        <Fretboard
          markers={markers}
          onCellClick={clickCell}
          stringSet={currentSet}
          interactive={true}
          totalFrets={totalFrets}
          noteStyle={tweaks.noteStyle}
          boardType={tweaks.board}
          theme={tweaks.theme}
          instrument={instrument}
        />
      </div>

      <div className="input-area">
        {setComplete ? (
          <div style={{fontFamily:'DM Mono',fontSize:'0.95rem',color:'var(--correct)',letterSpacing:'0.1em'}}>
            ✓ String set complete! Next set…
          </div>
        ) : (
          <div style={{textAlign:'center'}}>
            <div className="prompt-text">
              Find all&nbsp;<strong style={{color:'var(--gold)',fontSize:'1.6rem'}}>{chordDisplay}</strong>&nbsp;triads
            </div>
            <div style={{fontFamily:'DM Mono',fontSize:'0.72rem',color:'var(--text-muted)',marginTop:6}}>
              {foundTriadsThisChord.length}/{validTriadsForChord.length} triads found · click 3 notes to form a triad
            </div>
          </div>
        )}
        <div className={`feedback-msg ${feedback||''}`}>
          {feedback==='correct' && '✓ Triad found!'}
          {feedback==='wrong' && '✗ Not a valid ' + chordDisplay + ' triad'}
        </div>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:8,alignItems:'center',width:'100%',maxWidth:600}}>
        <div className="progress-bar-wrap" style={{marginBottom:0}}>
          <div className="progress-label">
            <span>String set {setIdx+1}/{stringSets.length} · {stringLabels}</span>
            <span>{chordSetsCompletedThisSet}/{CHORD_SETS_PER_STRINGSET} triad sets</span>
          </div>
          <div className="progress-track">
            <div className="progress-fill" style={{width:`${(chordSetsCompletedThisSet/CHORD_SETS_PER_STRINGSET)*100}%`}}/>
          </div>
        </div>
        <div className="progress-bar-wrap" style={{marginBottom:0}}>
          <div className="progress-label"><span>Total triad sets</span><span>{totalChordSetsCompleted}/{TOTAL_CHORD_SETS}</span></div>
          <div className="progress-track">
            <div className="progress-fill" style={{width:`${(totalChordSetsCompleted/TOTAL_CHORD_SETS)*100}%`}}/>
          </div>
        </div>
      </div>

      <div className="stats-row">
        <span><span className="stat-label">time </span><span className="stat-val">{time}s</span></span>
        <span style={{fontFamily:'DM Mono',fontSize:'0.68rem',color:'var(--text-muted)'}}>click 3 notes on the highlighted strings · Esc clears marks</span>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   GAME MODE 5: FREE LEARNING
═══════════════════════════════════════ */
function FreeLearn({ onBack, tweaks }) {
  const totalFrets = tweaks.frets;
  const instrument = tweaks.instrument || 'guitar';
  const nStrings = stringsFor(instrument).length;
  const [revealed, setRevealed] = useState({});
  const [sel, setSel] = useState({s:0,f:1});
  const [scaleRoot, setScaleRoot] = useState('C');
  const [scaleType, setScaleType] = useState(null);

  const scaleSet = scaleType ? new Set(scaleNotes(scaleRoot, {
    major: MAJOR_SCALE, minor: MINOR_SCALE,
    'pent.maj': PENTATONIC_MAJOR, 'pent.min': PENTATONIC_MINOR
  }[scaleType])) : null;
  // When a full major/minor scale is shown, also compute its pentatonic subset
  // so we can visually distinguish the "safe" pentatonic tones from the rest.
  // Pure pentatonic modes treat every scale tone as pentatonic.
  const pentatonicSet = scaleType ? new Set(scaleNotes(scaleRoot,
    scaleType === 'minor' || scaleType === 'pent.min' ? PENTATONIC_MINOR : PENTATONIC_MAJOR
  )) : null;

  function handleCellClick(s, f) {
    const key = `${s}-${f}`;
    setRevealed(prev => {
      const n = {...prev};
      if (n[key]) delete n[key]; else n[key] = showNote(noteAt(s,f,instrument), tweaks.noteStyle);
      return n;
    });
    setSel({s,f});
  }

  useEffect(() => {
    function onKey(e) {
      const {s,f} = sel;
      if (e.key==='ArrowUp'||e.key==='k') setSel({s:Math.max(0,s-1),f});
      else if (e.key==='ArrowDown'||e.key==='j') setSel({s:Math.min(nStrings-1,s+1),f});
      else if (e.key==='ArrowLeft'||e.key==='h') setSel({s,f:Math.max(0,f-1)});
      else if (e.key==='ArrowRight'||e.key==='l') setSel({s,f:Math.min(totalFrets,f+1)});
      else if (e.key===' ') { e.preventDefault(); handleCellClick(s,f); }
      else if (e.key==='r') setRevealed({});
      else if (e.key==='Escape') onBack();
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [sel, revealed, totalFrets, nStrings]);

  // Match revealed notes against chord shapes (guitar-only; shapes are 6-string CAGED)
  const matchedChords = useMemo(() => {
    if (instrument !== 'guitar') return [];
    const keys = Object.keys(revealed);
    if (keys.length < 3) return [];
    const revSet = new Set(keys);
    const revPositions = keys.map(k => { const [s,f] = k.split('-').map(Number); return {s,f}; });
    const matches = [];
    const seen = new Set();
    for (const chord of CHORD_SHAPES) {
      const posKeys = chord.positions.map(p => `${p.s}-${p.f}`);
      if (!posKeys.every(k => revSet.has(k))) continue;
      const chordSet = new Set(posKeys);
      // barre fret = lowest fret appearing on 2+ strings (skip fret 0)
      const fretCounts = {};
      for (const p of chord.positions) { if (p.f > 0) fretCounts[p.f] = (fretCounts[p.f]||0)+1; }
      const barreFret = Object.entries(fretCounts)
        .filter(([,c]) => c >= 2)
        .map(([f]) => Number(f))
        .sort((a,b) => a-b)[0] || -1;
      const extraOk = revPositions.every(rp => {
        const k = `${rp.s}-${rp.f}`;
        if (chordSet.has(k)) return true;
        return barreFret > 0 && rp.f === barreFret;
      });
      if (!extraOk) continue;
      if (!seen.has(chord.name)) {
        matches.push(chord);
        seen.add(chord.name);
      }
    }
    return matches;
  }, [revealed, instrument]);

  // Build scale markers
  const scaleMarkers = [];
  if (scaleSet) {
    for(let s=0;s<nStrings;s++) for(let f=1;f<=totalFrets;f++) {
      const n = noteAt(s,f,instrument);
      if (scaleSet.has(n) && !revealed[`${s}-${f}`]) {
        const isRoot = n === scaleRoot;
        const isPent = pentatonicSet && pentatonicSet.has(n);
        const type = isRoot ? 'root' : isPent ? 'pentatonic' : 'interval';
        scaleMarkers.push({ s, f, type, label: n });
      }
    }
  }

  return (
    <div className="game-wrap">
      <div className="game-header">
        <span className="game-title">▸ Free Learning</span>
        <button className="back-btn" onClick={onBack}>← back</button>
      </div>

      <div className="fretboard-wrap">
        <Fretboard
          markers={scaleMarkers}
          showNotes={revealed}
          onCellClick={handleCellClick}
          interactive={true}
          selectedCell={sel}
          totalFrets={totalFrets}
          noteStyle={tweaks.noteStyle} boardType={tweaks.board} theme={tweaks.theme}
          freeLearn={true}
          instrument={instrument}
        />
      </div>

      <div style={{textAlign:'center',fontFamily:'DM Mono',fontSize:'0.85rem',
        color: matchedChords.length > 0 ? 'var(--gold,#c89030)' : 'var(--text-dim,#888)',
        padding:'6px 0'}}>
        {matchedChords.length > 0
          ? matchedChords.map((c,i) => {
              const IV_SHORT = {'1':'root','2':'major 2nd','b3':'minor 3rd','3':'major 3rd','4':'perfect 4th','5':'perfect 5th','b7':'minor 7th','7':'major 7th','9':'9th','#9':'sharp 9th'};
              const seen = new Set();
              const parts = [];
              for (const iv of IV_ORDER) {
                const p = c.positions.find(p => p.iv === iv);
                if (!p || seen.has(iv)) continue;
                seen.add(iv);
                parts.push(`${IV_SHORT[iv]}: ${showNote(noteAt(p.s, p.f), tweaks.noteStyle)}`);
              }
              return <div key={i}>{i > 0 && <hr style={{border:'none',borderTop:'1px solid var(--text-dim,#444)',margin:'4px 0'}}/>}<strong>{c.name}</strong> ({parts.join(', ')})</div>;
            })
          : 'no chord identified yet'}
      </div>

      <div className="scale-row">
        <select className="root-select" value={scaleRoot} onChange={e=>setScaleRoot(e.target.value)}>
          {CHROMATIC.map(n=><option key={n} value={n}>{showNote(n, tweaks.noteStyle)}</option>)}
        </select>
        {['major','minor','pent.maj','pent.min'].map(t => (
          <button key={t} className={`scale-btn ${scaleType===t?'active':''}`}
            onClick={()=>setScaleType(p=>p===t?null:t)}>{t}</button>
        ))}
        <button className="scale-btn" onClick={()=>setRevealed({})}>clear</button>
      </div>

      {scaleSet && (() => {
        const t = tweaks.theme;
        const swatch = {
          root:       t === 'metal' ? '#ffd070' : t === 'funk' ? '#ffd060' : '#ffe890',
          pentatonic: t === 'metal' ? '#90f0b0' : t === 'funk' ? '#b8f070' : '#a0d878',
          interval:   t === 'metal' ? '#a0d8ff' : t === 'funk' ? '#c890ff' : '#90c8e8',
        };
        const dot = c => ({display:'inline-block',width:9,height:9,borderRadius:'50%',
                           background:c,marginRight:6,verticalAlign:'middle',
                           boxShadow:`0 0 6px ${c}88`});
        const isPureP = scaleType === 'pent.maj' || scaleType === 'pent.min';
        return (
          <div className="free-legend" style={{justifyContent:'center'}}>
            <span><span style={dot(swatch.root)}/>root</span>
            {!isPureP && <span><span style={dot(swatch.pentatonic)}/>pentatonic</span>}
            {!isPureP && <span><span style={dot(swatch.interval)}/>diatonic</span>}
            {isPureP && <span><span style={dot(swatch.pentatonic)}/>pentatonic tones</span>}
          </div>
        );
      })()}

      <div className="free-legend">
        <span><span>↑↓←→</span> / hjkl: move</span>
        <span><span>Space</span>: reveal/hide</span>
        <span><span>click</span>: reveal note</span>
        <span><span>r</span>: clear all</span>
      </div>
    </div>
  );
}

function NoteListGame({ onBack, tweaks }) {
  const [notes, setNotes] = useState(() => shuffleArr(CHROMATIC));
  const [key, setKey] = useState(0);

  function shuffle() { setNotes(shuffleArr(CHROMATIC)); setKey(k=>k+1); }

  useEffect(() => {
    function onKey(e) {
      if (e.key==='n' || e.key===' ' || e.key==='Enter') { e.preventDefault(); shuffle(); }
      else if (e.key==='Escape'||e.key==='b') onBack();
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  return (
    <div className="game-wrap" style={{maxWidth:480}}>
      <div className="game-header">
        <span className="game-title">▸ Note List</span>
        <button className="back-btn" onClick={onBack}>← back</button>
      </div>

      <div className="note-list-wrap" key={key} onTouchStart={shuffle} style={{cursor:'pointer',WebkitTapHighlightColor:'transparent'}}>
        <div className="note-list-title">Chromatic Scale</div>
        <div className="note-list-items">
          {notes.map((n) => (
            <div key={n} className="note-list-item">{showNote(n, tweaks?.noteStyle)}</div>
          ))}
        </div>
        <div className="note-list-hint" style={{marginTop:24}}>
          <span>space</span> / <span>enter</span> / <span>n</span>: shuffle &nbsp; <span>Esc</span>: back
        </div>
      </div>
    </div>
  );
}
