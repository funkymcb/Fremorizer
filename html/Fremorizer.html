<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fremorizer</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Oswald:wght@400;500;700&family=Bungee&family=Fraunces:ital,wght@0,400;1,400;1,700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="lib.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// Music theory + chord matching helpers live in /lib.js so they're testable
// under Node. The names below are re-bound from the global API object.
const {
  CHROMATIC, DISPLAY_BOTH, DISPLAY_FLAT, showNote,
  TUNINGS, stringsFor, noteAt, matchNote, OPEN_MIDI,
  MAJOR_SCALE, MINOR_SCALE, DORIAN_SCALE, MIXOLYDIAN_SCALE, HARMONIC_MINOR_SCALE,
  PENTATONIC_MAJOR, PENTATONIC_MINOR, scaleNotes,
  CHORD_SHAPES, CHORD_GOAL, shuffleArr,
  CHORD_QUALITIES_EASY, CHORD_QUALITIES_MEDIUM, CHORD_QUALITIES_HARD,
  getChordDifficulty, DIFFICULTY_RANK, isBasicBarreChord,
  chordsForDifficulty, qualitiesForDifficulty,
  FRET_SETS_MODE2, notesInSet, positionsOfNote,
  IV_ORDER, IV_LABEL, buildChordIntervals,
  CHORD_ENHARMONIC, expandChordInput, normalizeChordName,
  matchesChordName, chordNameCorrect, displayChordName,
  triadStringSets, findTriads, triadKey,
  identifyChords, buildShapeChart,
} = window.Fremorizer;

/* ═══════════════════════════════════════
   AUDIO — sample-based playback (Strat SF2 → WAVs)
═══════════════════════════════════════ */
const AUDIO = (() => {
  let ctx = null;
  const SEMI_NAMED = {C:0,'C#':1,D:2,'D#':3,E:4,F:5,'F#':6,G:7,'G#':8,A:9,'A#':10,B:11};

  // Sample bank: one medium-velocity layer ("gt2") covers ~Eb2 to C#6.
  // We pitch-shift the nearest sampled note for in-between pitches.
  const SAMPLE_PATH  = 'assets/sounds/strat/';
  const SAMPLE_LAYER = 'gt2';
  const SAMPLE_MIDIS = [39,40,42,45,47,50,52,54,56,59,61,64,66,68,70,73,76,78,81,83,85];

  const state = { muted: localStorage.getItem('frem_muted') === '1' };
  const cache = {};   // midi -> { L: AudioBuffer, R: AudioBuffer }
  const loading = {}; // midi -> Promise

  function ensureCtx(resume = true) {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Only attempt to resume during actual playback. resume() before a user
    // gesture is a no-op in Chrome/Safari and emits a console warning.
    if (resume && ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function midiFromName(name, octave) {
    const s = SEMI_NAMED[name];
    return s == null ? null : s + (octave + 1) * 12;
  }

  function nearestSampledMidi(target) {
    let best = SAMPLE_MIDIS[0], bestDiff = Math.abs(target - best);
    for (const m of SAMPLE_MIDIS) {
      const d = Math.abs(target - m);
      if (d < bestDiff) { bestDiff = d; best = m; }
    }
    return best;
  }

  async function loadSample(midi) {
    if (cache[midi]) return cache[midi];
    if (loading[midi]) return loading[midi];
    loading[midi] = (async () => {
      const c = ensureCtx(false);
      const fetchChan = async ch => {
        const res = await fetch(`${SAMPLE_PATH}${SAMPLE_LAYER}-${midi}${ch}.wav`);
        if (!res.ok) throw new Error(`missing sample ${midi}${ch}`);
        return c.decodeAudioData(await res.arrayBuffer());
      };
      const [L, R] = await Promise.all([fetchChan('L'), fetchChan('R')]);
      cache[midi] = { L, R };
      return cache[midi];
    })();
    return loading[midi];
  }

  let preloadStarted = false;
  function preloadAll() {
    if (preloadStarted) return;
    preloadStarted = true;
    SAMPLE_MIDIS.forEach(m => loadSample(m).catch(() => {}));
  }

  function playMidi(midi, dur=0.9, vol=0.6) {
    if (state.muted || midi == null) return;
    const c = ensureCtx();
    preloadAll();
    const sourceMidi = nearestSampledMidi(midi);
    const rate = Math.pow(2, (midi - sourceMidi) / 12);
    loadSample(sourceMidi).then(({L, R}) => {
      const t = c.currentTime;
      const gain = c.createGain();
      gain.gain.setValueAtTime(0.0, t);
      gain.gain.linearRampToValueAtTime(vol, t + 0.005);
      gain.gain.setValueAtTime(vol, t + dur);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur + 0.25);
      gain.connect(c.destination);
      [[L, -0.6], [R, 0.6]].forEach(([buf, pan]) => {
        const src = c.createBufferSource();
        src.buffer = buf;
        src.playbackRate.value = rate;
        const panner = c.createStereoPanner();
        panner.pan.value = pan;
        src.connect(panner).connect(gain);
        src.start(t);
        src.stop(t + dur + 0.3);
      });
    }).catch(() => {});
  }

  return {
    get muted() { return state.muted; },
    setMuted(m) {
      state.muted = !!m;
      try { localStorage.setItem('frem_muted', state.muted ? '1' : '0'); } catch (e) {}
      if (!state.muted) preloadAll();
    },
    // Eagerly fetch + decode every sample so the first note plays instantly.
    // Safe to call before any user gesture — AudioContext stays suspended,
    // decodeAudioData still works.
    preload() { preloadAll(); },
    note(name, octave=4) { playMidi(midiFromName(name, octave)); },
    cell(s, f, instrument='guitar') {
      const arr = OPEN_MIDI[instrument] || OPEN_MIDI.guitar;
      if (arr[s] == null) return;
      playMidi(arr[s] + f);
    },
    // Strike multiple notes simultaneously (chord). Slightly longer ring and
    // a per-note attenuation so a 6-note chord doesn't clip.
    chord(positions, instrument='guitar') {
      const arr = OPEN_MIDI[instrument] || OPEN_MIDI.guitar;
      const n = positions.length || 1;
      const vol = Math.min(0.55, 0.9 / Math.sqrt(n));
      positions.forEach(({s, f}) => {
        if (arr[s] == null) return;
        playMidi(arr[s] + f, 1.8, vol);
      });
    },
  };
})();

/* ═══════════════════════════════════════
   FRETBOARD SVG
═══════════════════════════════════════ */
function Fretboard({ markers=[], onCellClick, fretSet, stringSet, showNotes={}, interactive=false, selectedCell, totalFrets=12, noteStyle='both', boardType='rosewood', theme='vintage', freeLearn=false, instrument='guitar', zoomWindow=null }) {
  const strings = stringsFor(instrument);
  const nStrings = strings.length;
  const lastS = nStrings - 1;
  const FW = 70, SH = 32, ML = 54, MT = 36, MB = 18;
  const W = ML + totalFrets * FW + 22;
  const H = MT + lastS * SH + MB;
  const cx = f => f === 0 ? 14 : ML + (f - 0.5) * FW;
  const cy = s => MT + s * SH;

  // Zoom (mobile): crop the viewBox to a fret window so the region of
  // interest fills the screen instead of squeezing all 12 frets into a
  // phone width. A left gutter keeps the string labels visible.
  const ZG = 36;
  const zoom = zoomWindow ? (() => {
    const x = ML + (zoomWindow[0] - 1) * FW - ZG;
    const w = (zoomWindow[1] - zoomWindow[0] + 1) * FW + ZG + 10;
    return { x, w };
  })() : null;
  const stringLabelX = zoom ? zoom.x + ZG - 18 : ML - 18;
  // Board colors — theme + board type aware
  const isMaple = boardType === 'maple';
  const isVintage = theme === 'vintage';
  const accentColor = theme === 'metal' ? '#00c8ff' : theme === 'funk' ? '#ff40c0' : '#c89030';
  const accentDim   = theme === 'metal' ? '#006888' : theme === 'funk' ? '#a02890' : '#7a5820';

  // Board wood
  const boardTop    = isVintage ? (isMaple ? '#c8a878' : '#3c2010')
                    : (isMaple  ? '#c8a878' : '#111214');
  const boardMid    = isVintage ? (isMaple ? '#b89060' : '#2a1608')
                    : (isMaple  ? '#b89060' : '#0a0c0e');
  const boardBot    = isVintage ? (isMaple ? '#c8a878' : '#3c2010')
                    : (isMaple  ? '#c8a878' : '#111214');
  const grainColor  = isVintage ? (isMaple ? 'rgba(0,0,0,0.06)' : 'rgba(0,0,0,0.12)')
                    : (isMaple  ? 'rgba(0,0,0,0.06)' : 'rgba(255,255,255,0.02)');

  // Inlays
  const inlayFill   = isVintage ? (isMaple ? 'rgba(60,40,20,0.35)'    : 'rgba(240,220,178,0.32)')
                    : (isMaple  ? 'rgba(60,40,20,0.35)' : `rgba(${theme==='metal'?'120,224,255':'255,176,232'},0.42)`);
  const inlayStroke = isVintage ? (isMaple ? 'rgba(40,20,10,0.15)'    : 'rgba(240,220,178,0.12)')
                    : (isMaple  ? 'rgba(40,20,10,0.15)' : `rgba(${theme==='metal'?'160,232,255':'255,200,240'},0.7)`);

  // Nut
  const nutTop      = isMaple ? '#f8f0e0' : (isVintage ? '#f0e0b0' : '#303438');
  const nutBot      = isMaple ? '#d8c8a0' : (isVintage ? '#c8a860' : '#1a1e22');

  // Frets
  const fretColor   = isVintage ? (isMaple ? '#8a7858' : '#8a6420')
                    : (isMaple  ? '#8a7858' : '#2a3038');
  const fret12Color = isVintage ? (isMaple ? '#b0986a' : '#b08840')
                    : (isMaple  ? '#b0986a' : '#3a4450');

  // Strings
  const stringColor = isVintage ? (isMaple ? '#3a2a0a' : '#c8a030')
                    : (isMaple  ? '#3a2a0a' : '#8090a0');

  // Labels
  const labelFill         = isVintage ? (isMaple ? '#7a6040' : '#6a5830')
                          : (isMaple  ? '#7a6040' : accentDim);
  const stringLabelColor  = isVintage ? (isMaple ? '#a07828' : '#c89030')
                          : (isMaple  ? accentColor : accentColor);

  // Revealed note circles
  const noteCircleBg     = isVintage ? (isMaple ? 'rgba(180,130,60,0.9)' : 'rgba(42,22,8,0.85)')
                         : (isMaple  ? 'rgba(180,130,60,0.9)' : 'rgba(10,14,20,0.92)');
  const noteCircleStroke = isVintage ? (isMaple ? 'rgba(120,80,20,0.7)'  : 'rgba(200,144,48,0.6)')
                         : (isMaple  ? 'rgba(120,80,20,0.7)'  : `${accentColor}99`);
  const noteTextColor    = isVintage ? (isMaple ? '#5a3a10' : '#d4902a')
                         : (isMaple  ? '#5a3a10' : accentColor);

  const stringWidths = instrument === 'bass'
    ? [2.0, 2.8, 3.6, 4.4]
    : [1.0, 1.3, 1.7, 2.2, 2.8, 3.5];

  const INLAY = [3,5,7,9];
  const INLAY2 = [12];
  const FRET_LABELS = [1,3,5,7,9,12];

  // Check if a cell has a marker
  const markerAt = (s,f) => markers.find(m => m.s===s && m.f===f);

  return (
    <svg width={zoom ? zoom.w : W} height={H}
      viewBox={zoom ? `${zoom.x} 0 ${zoom.w} ${H}` : `0 0 ${W} ${H}`}>
      <defs>
        <linearGradient id="bgrd" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={boardTop}/>
          <stop offset="40%" stopColor={boardMid}/>
          <stop offset="100%" stopColor={boardBot}/>
        </linearGradient>
        <linearGradient id="nutGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor={nutTop}/>
          <stop offset="100%" stopColor={nutBot}/>
        </linearGradient>
        <filter id="glow" x="-75%" y="-75%" width="250%" height="250%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
      </defs>

      {/* Board background */}
      <rect x={ML} y={MT - SH*0.55} width={totalFrets*FW} height={lastS*SH + SH*1.1}
        fill="url(#bgrd)" rx="2"/>

      {/* Wood grain lines */}
      {[0.2,0.45,0.72,0.88].map((t,i) => (
        <line key={i}
          x1={ML} y1={MT - SH*0.55 + t*(lastS*SH+SH*1.1)}
          x2={ML+totalFrets*FW} y2={MT - SH*0.55 + t*(lastS*SH+SH*1.1)}
          stroke={grainColor} strokeWidth="1"/>
      ))}

      {/* Fret set highlight */}
      {fretSet && (() => {
        const isMetal = theme === 'metal';
        const isFunk  = theme === 'funk';
        // On maple (light wood), bright/light colors wash out — use deeper, more saturated tones.
        const fillRgb   = isMetal ? '0,200,255'
                        : isFunk  ? (isMaple ? '170,20,120' : '255,64,192')
                        :           (isMaple ? '120,60,10'  : '180,120,30');
        const strokeRgb = isMetal ? '0,200,255'
                        : isFunk  ? (isMaple ? '160,10,110' : '255,64,192')
                        :           (isMaple ? '100,50,8'   : '200,160,60');
        const barRgb    = isMetal ? '0,200,255'
                        : isFunk  ? (isMaple ? '160,180,20' : '200,255,32')
                        :           (isMaple ? '120,80,20'  : '200,160,60');
        const fillA   = isMaple && !isMetal ? 0.22 : 0.13;
        const strokeA = isMaple && !isMetal ? 0.85 : 0.55;
        const barA    = isMaple && !isMetal ? 0.85 : 0.6;
        return (
        <>
          <rect
            x={ML + (fretSet[0]-1)*FW} y={MT - SH*0.55}
            width={(fretSet[1]-fretSet[0]+1)*FW} height={lastS*SH+SH*1.1}
            fill={`rgba(${fillRgb},${fillA})`} rx="2"/>
          <rect
            x={ML + (fretSet[0]-1)*FW} y={MT - SH*0.55}
            width={(fretSet[1]-fretSet[0]+1)*FW} height={lastS*SH+SH*1.1}
            fill="none" stroke={`rgba(${strokeRgb},${strokeA})`} strokeWidth="1.5" rx="2"/>
          <rect
            x={ML + (fretSet[0]-1)*FW} y={MT - SH*0.55}
            width={(fretSet[1]-fretSet[0]+1)*FW} height={3}
            fill={`rgba(${barRgb},${barA})`} rx="1"/>
          <rect
            x={ML + (fretSet[0]-1)*FW} y={MT + lastS*SH + SH*0.55 - 3}
            width={(fretSet[1]-fretSet[0]+1)*FW} height={3}
            fill={`rgba(${barRgb},${barA})`} rx="1"/>
        </>
        );
      })()}

      {/* Inlay dots */}
      {INLAY.map(f => f <= totalFrets && (
        <circle key={f} cx={cx(f)} cy={MT + (lastS/2)*SH} r={5.5}
          fill={inlayFill} stroke={inlayStroke} strokeWidth="0.5"/>
      ))}
      {INLAY2.filter(f => f <= totalFrets).map(f => [lastS*0.24, lastS*0.76].map((sv,i) => (
        <circle key={`${f}-${i}`} cx={cx(f)} cy={MT + sv*SH} r={5.5}
          fill={inlayFill} stroke={inlayStroke} strokeWidth="0.5"/>
      )))}

      {/* Nut */}
      <rect x={ML-5} y={MT-SH*0.55} width={5} height={lastS*SH+SH*1.1}
        fill="url(#nutGrad)" rx="1"/>

      {/* Fret lines */}
      {Array.from({length:totalFrets},(_,i)=>i+1).map(f => (
        <line key={f}
          x1={ML+f*FW} y1={MT-SH*0.55}
          x2={ML+f*FW} y2={MT+lastS*SH+SH*0.55}
          stroke={f===12?fret12Color:fretColor}
          strokeWidth={f===12?2.5:1.5}/>
      ))}

      {/* String lines */}
      {strings.map((_, s) => (
        <line key={s}
          x1={ML-5} y1={cy(s)} x2={ML+totalFrets*FW+1} y2={cy(s)}
          stroke={stringColor} strokeWidth={stringWidths[s]} opacity="0.85"/>
      ))}

      {/* Fret number labels */}
      {FRET_LABELS.filter(f=>f<=totalFrets).map(f => (
        <text key={f} x={cx(f)} y={MT-16} textAnchor="middle"
          fill={labelFill} fontSize="11" fontFamily="'DM Mono',monospace">{f}</text>
      ))}

      {/* String labels — in free-learn mode show clickable ✕ / revealed note */}
      {strings.map((n, s) => {
        const openKey = `${s}-0`;
        const isFreeLearning = freeLearn;
        const openRevealed = showNotes[openKey];
        if (isFreeLearning && !openRevealed) {
          return (
            <text key={s} x={stringLabelX} y={cy(s)+5} textAnchor="middle"
              fill="#c04040" fontSize="15" fontWeight="700"
              fontFamily="'DM Mono',monospace"
              style={{pointerEvents:'none'}}>✕</text>
          );
        }
        if (isFreeLearning && openRevealed) {
          return (
            <text key={s} x={stringLabelX} y={cy(s)+5} textAnchor="middle"
              fill={noteTextColor} fontSize="11" fontWeight="600"
              fontFamily="'DM Mono',monospace"
              style={{pointerEvents:'none'}}>{showNote(noteAt(s,0,instrument), noteStyle)}</text>
          );
        }
        return (
          <text key={s} x={stringLabelX} y={cy(s)+5} textAnchor="middle"
            fill={stringLabelColor} fontSize="13" fontWeight="600"
            fontFamily="'DM Mono',monospace">{n}</text>
        );
      })}

      {/* Revealed note labels (free mode) — skip fret 0 (shown in string label) */}
      {Object.entries(showNotes).filter(([key]) => !key.endsWith('-0')).map(([key, note]) => {
        const [s,f] = key.split('-').map(Number);
        const r = 13;
        const fs = showNote(noteAt(s,f,instrument),noteStyle).includes('/') ? 8 : 11;
        return (
          <g key={key}>
            <circle cx={cx(f)} cy={cy(s)} r={r} fill={noteCircleBg} stroke={noteCircleStroke} strokeWidth="1"/>
            <text x={cx(f)} y={cy(s)+4} textAnchor="middle"
              fill={noteTextColor} fontSize={fs}
              fontFamily="'DM Mono',monospace" fontWeight="500">{showNote(noteAt(s,f,instrument),noteStyle)}</text>
          </g>
        );
      })}

      {/* Markers */}
      {markers.map((m, i) => {
        const mcx = cx(m.f), mcy = cy(m.s);
        const isMetal = theme === 'metal';
        const isFunk  = theme === 'funk';
        const colors = {
          question: isMetal ? ['#08384a', '#80e0ff']
                  : isFunk  ? ['#3a0a30', '#ffb0e8']
                  : ['#a87028', '#f0ddb8'],
          correct:  isMetal ? ['#0a4838', '#80f0c0']
                  : isFunk  ? ['#2a3a08', '#e8ff80']
                  : ['#4a7830', '#b0e890'],
          wrong:    isMetal ? ['#480818', '#ff90a0']
                  : isFunk  ? ['#480818', '#ff90a0']
                  : ['#882018', '#f0a090'],
          marked:   isMetal ? ['#08384a', '#80e0ff']
                  : isFunk  ? ['#3a0a30', '#ffb0e8']
                  : ['#a87028', '#f0ddb8'],
          interval: isMetal ? ['#082838', '#a0d8ff']
                  : isFunk  ? ['#2a0a3a', '#c890ff']
                  : ['#285870', '#90c8e8'],
          // Free-learn scale roots — high contrast vs interval/pentatonic on every theme.
          root:     isMetal ? ['#5a3818', '#ffd070']
                  : isFunk  ? ['#5a2a18', '#ffd060']
                  :           ['#7a5018', '#ffe890'],
          // Free-learn pentatonic tones — green family, distinct from blue interval.
          pentatonic: isMetal ? ['#0a4830', '#90f0b0']
                    : isFunk  ? ['#1a3a08', '#b8f070']
                    :           ['#2a5828', '#a0d878'],
        };
        const [bg, fg] = colors[m.type] || colors.question;
        const fill = m.fill || bg;
        const stroke = m.stroke || fg;
        const textColor = m.textColor || fg;
        const label = m.label ?? '?';
        const small = label.length > 2;
        const glow = m.type === 'question' || m.type === 'root';
        return (
          <g key={i}
             className={m.type === 'question' ? 'marker-blink' : undefined}
             filter={glow ? "url(#glow)" : undefined}
             onMouseEnter={m.onMouseEnter}
             onMouseLeave={m.onMouseLeave}
             style={m.onMouseEnter ? {cursor:'pointer'} : undefined}>
            <circle cx={mcx} cy={mcy} r={13} fill={fill} stroke={stroke} strokeWidth="1.5" opacity={m.opacity ?? 0.95}/>
            {label && <text x={mcx} y={mcy+4} textAnchor="middle"
              fill={textColor} fontSize={small?8:11}
              fontFamily="'DM Mono',monospace" fontWeight="600">{label}</text>}
          </g>
        );
      })}

      {/* Selected cell highlight (free mode) */}
      {selectedCell && !markerAt(selectedCell.s, selectedCell.f) && (
        <rect
          x={selectedCell.f===0 ? (freeLearn ? ML-18-12 : cx(0)-14) : cx(selectedCell.f)-FW/2+2}
          y={cy(selectedCell.s)-SH/2+2}
          width={selectedCell.f===0 ? 24 : FW-4} height={SH-4}
          fill="rgba(200,144,48,0.12)" stroke="rgba(200,144,48,0.5)"
          strokeWidth="1" rx="2"/>
      )}

      {/* String set highlight (Mode 4) — rendered last so the frame is never
          covered by the nut, strings, or markers. Theme-aware accent picked
          to contrast with each theme's primary hue (gold/cyan/pink). */}
      {stringSet && (() => {
        const accent = theme === 'metal' ? '255,170,70'   // amber, opposite cyan
                     : theme === 'funk'  ? '120,255,140'  // lime, opposite magenta
                     :                     '160,120,240'; // violet, opposite vintage gold
        const top = stringSet[0], bot = stringSet[stringSet.length-1];
        const y = cy(top) - SH*0.55;
        const h = (bot - top) * SH + SH*1.1;
        const x = ML - 4;
        const w = totalFrets * FW + 8;
        return (
        <g pointerEvents="none">
          <rect x={x} y={y} width={w} height={h} fill={`rgba(${accent},0.07)`} rx="3"/>
          <rect x={x}         y={y}         width={w} height={3} fill={`rgba(${accent},0.85)`} rx="1.5"/>
          <rect x={x}         y={y + h - 3} width={w} height={3} fill={`rgba(${accent},0.85)`} rx="1.5"/>
          <rect x={x}         y={y}         width={3} height={h} fill={`rgba(${accent},0.85)`} rx="1.5"/>
          <rect x={x + w - 3} y={y}         width={3} height={h} fill={`rgba(${accent},0.85)`} rx="1.5"/>
        </g>
        );
      })()}

      {/* Interactive click areas */}
      {interactive && strings.map((_,s) =>
        Array.from({length:totalFrets+1},(_,f)=>f).map(f => {
          const inFret   = !fretSet   || (f===0 || (f>=fretSet[0] && f<=fretSet[1]));
          const inString = !stringSet || stringSet.includes(s);
          const inRange  = inFret && inString;
          const isFret0 = f === 0;
          // Open-string hit-box spans the entire region left of the nut so
          // clicking the string-name label (e.g. "E") also registers as fret 0.
          const x = isFret0 ? 0 : cx(f)-FW/2+1;
          const width = isFret0 ? ML-5 : FW-2;
          return (
            <rect key={`${s}-${f}`}
              x={x} y={cy(s)-SH/2}
              width={width} height={SH}
              fill="transparent"
              style={{cursor: inRange?'crosshair':'default'}}
              onClick={() => inRange && onCellClick && onCellClick(s,f)}/>
          );
        })
      )}
    </svg>
  );
}

/* ═══════════════════════════════════════
   TIMER HOOK
═══════════════════════════════════════ */
function useTimer() {
  const [t, setT] = useState(0);
  const ref = useRef(null);
  const start = useCallback(() => {
    setT(0);
    clearInterval(ref.current);
    ref.current = setInterval(() => setT(p => p+1), 1000);
  }, []);
  const stop = useCallback(() => clearInterval(ref.current), []);
  useEffect(() => () => clearInterval(ref.current), []);
  return [t, start, stop];
}

function ChordKeyboard({ onChord, disabled, noteStyle='both', difficulty='easy' }) {
  const [root, setRoot] = useState(null);

  function pickRoot(n) {
    setRoot(n);
  }

  function pickQuality(q) {
    if (!root) return;
    // Qualities that append directly without space: 7, sus2, sus4, add9, maj7, m7, 9, 7#9
    const spacedQualities = ['major', 'minor'];
    const name = spacedQualities.includes(q) ? root + ' ' + q : root + q;
    onChord(name);
    setRoot(null);
  }

  const qualities = qualitiesForDifficulty(difficulty);

  useEffect(() => { if (disabled) setRoot(null); }, [disabled]);

  if (root) {
    return (
      <div className="note-keyboard">
        <div style={{width:'100%',textAlign:'center',fontFamily:'DM Mono',fontSize:'0.75rem',
          color:'var(--text-muted)',marginBottom:4}}>
          Root: <span style={{color:'var(--gold)'}}>{showNote(root, noteStyle)}</span>
        </div>
        {qualities.map(q => (
          <button key={q} className="note-key" style={{minWidth:70}} disabled={disabled}
            onClick={() => pickQuality(q)}>{q}</button>
        ))}
        <button className="note-key" style={{minWidth:70,color:'var(--text-muted)'}}
          onClick={() => setRoot(null)}>← back</button>
      </div>
    );
  }

  return (
    <div className="note-keyboard">
      {CHROMATIC.map(n => (
        <button key={n} className="note-key" disabled={disabled}
          onClick={() => pickRoot(n)}>
          {showNote(n, noteStyle)}
        </button>
      ))}
    </div>
  );
}

const STATS_KEY = 'frem_stats';

function loadStats() {
  try { return JSON.parse(localStorage.getItem(STATS_KEY)) || []; }
  catch { return []; }

function saveResult(record) {

/* ═══════════════════════════════════════
   FRETBOARD HEATMAP (post-game)
═══════════════════════════════════════ */
// Renders a colored Fretboard where each cell is shaded by how long it took
// to resolve. Green = fastest, red = slowest, smooth HSL gradient in between.
// `cellTimes` is a plain object keyed by "s-f" → seconds (float).
function FretboardHeatmap({ cellTimes, totalFrets, instrument, noteStyle, boardType, theme }) {
  const [hovered, setHovered] = useState(null);

  const entries = Object.entries(cellTimes);
  if (entries.length === 0) return null;
  const times = entries.map(([,t]) => t);

  // Rank-based color mapping: sort all times, give each unique time its rank,
  // map rank → hue. This guarantees full green→red spread regardless of how
  // the times are distributed (linear mapping gets too "green" when there's a
  // slow outlier compressing everything else into the green half).
  const sortedUnique = [...new Set(times)].sort((a, b) => a - b);
  const rankByTime = new Map();
  sortedUnique.forEach((t, i) => rankByTime.set(t, i));
  const denom = Math.max(sortedUnique.length - 1, 1);
  const tMin = sortedUnique[0];
  const tMax = sortedUnique[sortedUnique.length - 1];

  const markers = entries.map(([key, t]) => {
    const [s, f] = key.split('-').map(Number);
    const note = showNote(noteAt(s, f, instrument), noteStyle);
    const k = rankByTime.get(t) / denom;   // 0 → 1
    const hue = (1 - k) * 120;             // 120 (green) → 0 (red)
    return {
      s, f,
      type: 'heatmap',
      label: note,
      fill:   `hsl(${hue},75%,45%)`,
      stroke: `hsl(${hue},80%,25%)`,
      textColor: '#fff',
      onMouseEnter: () => setHovered({ key, note, t }),
      onMouseLeave: () => setHovered(h => h?.key === key ? null : h),
    };
  });

  return (
    <div style={{display:'flex',flexDirection:'column',gap:8,alignItems:'center',width:'100%'}}>
      <div style={{fontFamily:'DM Mono',fontSize:'0.7rem',color:'var(--text-muted)',
        letterSpacing:'0.1em',textTransform:'uppercase'}}>
        Heatmap — green = fastest, red = slowest
      </div>
      <div style={{fontFamily:'DM Mono',fontSize:'0.65rem',color:'var(--text-muted)',
        display:'flex',gap:14,alignItems:'center'}}>
        <span><span style={{display:'inline-block',width:9,height:9,borderRadius:'50%',
          background:'hsl(120,75%,45%)',marginRight:6,verticalAlign:'middle'}}/>
          {tMin.toFixed(2)}s
        </span>
        <span style={{width:120,height:8,borderRadius:4,
          background:'linear-gradient(90deg,hsl(120,75%,45%),hsl(60,75%,45%),hsl(0,75%,45%))'}}/>
        <span><span style={{display:'inline-block',width:9,height:9,borderRadius:'50%',
          background:'hsl(0,75%,45%)',marginRight:6,verticalAlign:'middle'}}/>
          {tMax.toFixed(2)}s
        </span>
      </div>
      <div className="fretboard-wrap">
        <Fretboard markers={markers} totalFrets={totalFrets} noteStyle={noteStyle}
          boardType={boardType} theme={theme} instrument={instrument}/>
      </div>
      <div style={{fontFamily:'DM Mono',fontSize:'0.8rem',height:22,
        color: hovered ? 'var(--gold)' : 'var(--text-muted)',letterSpacing:'0.05em'}}>
        {hovered
          ? <><strong>{hovered.note}</strong> — {hovered.t.toFixed(2)}s</>
          : 'hover a note to see its exact time'}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   GAME MODE 1: RANDOM NOTE
═══════════════════════════════════════ */
function RandomNoteGame({ onBack, onRestart, tweaks }) {
  const totalFrets = tweaks.frets;
  const instrument = tweaks.instrument || 'guitar';
  const nStrings = stringsFor(instrument).length;
  const [done, setDone] = useState(new Set());
  const [enabledStrings] = useState(() => {
    const raw = tweaks.randomGameStrings || [];
    let arr = Array.from({length:nStrings}, (_, i) => raw[i] !== false);
    if (!arr.some(Boolean)) arr = arr.map(() => true); // safety net
    return arr;
  });
  const FRET_BANDS = [[1,3],[4,6],[7,9],[10,12]];
  const [enabledFretSets] = useState(() => {
    const raw = tweaks.randomGameFretSets || [];
    let arr = Array.from({length:4}, (_, i) => raw[i] !== false);
    if (!arr.some(Boolean)) arr = arr.map(() => true); // safety net
    return arr;
  });
  const [queue, setQueue] = useState(() => {
    function inEnabledBand(f) {
      for (let i = 0; i < FRET_BANDS.length; i++) {
        if (!enabledFretSets[i]) continue;
        const [lo, hi] = FRET_BANDS[i];
        if (f >= lo && f <= hi) return true;
      }
      return false;
    }
    const q = [];
    for (let s = 0; s < nStrings; s++) {
      if (!enabledStrings[s]) continue;
      for (let f = 1; f <= totalFrets; f++) {
        if (!inEnabledBand(f)) continue;
        q.push({s,f});
      }
    }
    // If the user disabled every band that fits within totalFrets, fall back
    // to asking every fret in totalFrets so the game can still run.
    if (q.length === 0) {
      for (let s = 0; s < nStrings; s++) {
        if (!enabledStrings[s]) continue;
        for (let f = 1; f <= totalFrets; f++) q.push({s,f});
      }
    }
    return shuffleArr(q);
  });
  const total = queue.length;
  const [qi, setQi] = useState(0);
  const [input, setInput] = useState('');
  const [feedback, setFeedback] = useState(null);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [finished, setFinished] = useState(false);
  const [time, startTimer, stopTimer] = useTimer();
  const inputRef = useRef(null);
  const [flashing, setFlashing] = useState(false);
  const [cellTimes, setCellTimes] = useState({});
  const taskStartRef = useRef(0);

  useEffect(() => { startTimer(); taskStartRef.current = Date.now(); }, []);
  useEffect(() => { if (!feedback) inputRef.current?.focus(); }, [feedback]);
  useEffect(() => { inputRef.current?.focus(); taskStartRef.current = Date.now(); }, [qi]);
  useEffect(() => {
    if (finished) saveResult({ mode: 'random', timeSeconds: time, totalItems: total, avgPerItem: +(time/total).toFixed(2), strings: enabledStrings, fretSets: enabledFretSets, instrument });
  }, [finished]);
  useEffect(() => {
    function onKey(e) { if (e.key === 'Escape') onBack(); }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const current = queue[qi % queue.length];
  const expected = current ? noteAt(current.s, current.f, instrument) : null;

  function handleAnswer(note) {
    if (!current) return;
    if (note === expected) {
      // Play at the actual string/fret pitch
      AUDIO.cell(current.s, current.f, instrument);
      const key = `${current.s}-${current.f}`;
      const elapsed = (Date.now() - taskStartRef.current) / 1000;
      setCellTimes(prev => ({ ...prev, [key]: elapsed }));
      const newDone = new Set(done); newDone.add(key);
      setDone(newDone);
      const newStreak = streak + 1;
      setStreak(newStreak);
      if (newStreak > bestStreak) setBestStreak(newStreak);
      setFeedback('correct');
      setFlashing(true);
      if (newDone.size >= total) {
        stopTimer();
        setTimeout(() => setFinished(true), 600);
      } else {
        setTimeout(() => { setFlashing(false); setFeedback(null); setInput(''); setQi(q => q+1); }, 500);
      }
    } else {
      // Play whatever the user pressed/typed (auto-skips if not a real note)
      AUDIO.note(note, 4);
      setStreak(0);
      setFeedback('wrong');
      setTimeout(() => {
        setFeedback(null);
        setInput('');
      }, 600);
    }
  }

  function submit() {
    if (!input.trim()) return;
    handleAnswer(matchNote(input, expected) ? expected : input);
  }

  if (finished) return (
    <div className="game-wrap" style={{textAlign:'center',gap:32}}>
      <div style={{fontSize:'clamp(2rem,5vw,3rem)',fontWeight:900,fontStyle:'italic',color:'var(--gold)',textShadow:'0 0 40px rgba(200,144,48,0.4)'}}>
        All Clear!
      </div>
      <div style={{fontFamily:'DM Mono',fontSize:'0.85rem',color:'var(--text-dim)',letterSpacing:'0.1em'}}>
        You named every note on the fretboard
      </div>
      <div style={{display:'flex',gap:40,justifyContent:'center',flexWrap:'wrap',fontFamily:'DM Mono',fontSize:'0.8rem',color:'var(--text-dim)'}}>
        <span><span style={{color:'var(--text-muted)'}}>time </span>{time}s</span>
        <span><span style={{color:'var(--text-muted)'}}>notes </span>{total}</span>
        <span><span style={{color:'var(--text-muted)'}}>best streak </span>{bestStreak}</span>
        <span><span style={{color:'var(--text-muted)'}}>avg/note </span>{(time/total).toFixed(1)}s</span>
      </div>
      <div style={{width:80,height:1,background:'linear-gradient(90deg,transparent,var(--gold),transparent)',margin:'0 auto'}}/>
      <FretboardHeatmap cellTimes={cellTimes} totalFrets={totalFrets} instrument={instrument}
        noteStyle={tweaks.noteStyle} boardType={tweaks.board} theme={tweaks.theme}/>
      <div style={{display:'flex',gap:16,justifyContent:'center',flexWrap:'wrap'}}>
        <button className="submit-btn" style={{fontSize:'0.9rem',padding:'12px 32px'}} onClick={onRestart}>
          ↻ new game
        </button>
        <button className="submit-btn" style={{fontSize:'0.9rem',padding:'12px 32px'}} onClick={onBack}>
          ← back to menu
        </button>
      </div>
    </div>
  );

  // Solved + current markers
  const markers = [
    ...[...done].map(key => {
      const [s, f] = key.split('-').map(Number);
      return { s, f, type: 'correct', label: '', opacity: 0.45 };
    }),
    // Current question
    ...(current ? [{
      s: current.s, f: current.f,
      type: feedback==='correct' ? 'correct' : feedback==='wrong' ? 'wrong' : 'question',
      label: feedback==='correct' ? '' : '?'
    }] : [])
  ];

  return (
    <div className="game-wrap">
      <div className="game-header">
        <span className="game-title">▸ Guess the Note</span>
        <button className="back-btn" onClick={onBack}>← back</button>
      </div>

      <div className="fretboard-wrap">
        {/* Mobile: zoom to the queried fret ±3 so the question is readable
            on a phone. Desktop keeps the full board. */}
        <Fretboard markers={markers} totalFrets={totalFrets} noteStyle={tweaks.noteStyle} boardType={tweaks.board} theme={tweaks.theme} instrument={instrument}
          zoomWindow={(isMobile && window.innerWidth < 960 && current && totalFrets > 7)
            ? (() => { const lo = Math.max(1, Math.min(current.f - 3, totalFrets - 6)); return [lo, lo + 6]; })()
            : null}/>
      </div>

      <div className="input-area">
        <div className="prompt-text">Find the note!</div>
        {isMobile ? (
          <NoteKeyboard onNote={n => !feedback && handleAnswer(n)} disabled={!!feedback} noteStyle={tweaks.noteStyle}/>
        ) : (
          <div className="note-input-row">
            <input
              ref={inputRef}
              className={`note-input ${feedback||''} ${flashing?'flash':''}`}
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key==='Enter' && submit()}
              placeholder="note…"
              maxLength={4}
              disabled={!!feedback}
              autoComplete="off" autoCorrect="off" spellCheck="false"
            />
            <button className="submit-btn" onClick={submit}>Enter ↵</button>
          </div>
        )}
        <div className={`feedback-msg ${feedback||''}`}>
          {feedback==='correct' && '✓ Correct!'}
          {feedback==='wrong' && '✗ Wrong answer, try again'}
        </div>
      </div>

      <div className="progress-bar-wrap">
        <div className="progress-label">
          <span>Progress</span>
          <span>{done.size}/{total}</span>
        </div>
        <div className="progress-track">
          <div className="progress-fill" style={{width:`${(done.size/total)*100}%`}}/>
        </div>
      </div>

      <div className="stats-row">
        <span><span className="stat-label">time </span><span className="stat-val">{time}s</span></span>
        <span><span className="stat-label">streak </span><span className={`stat-val ${streak>4?'good':''}`}>{streak}</span></span>
        <span style={{fontFamily:'DM Mono',fontSize:'0.68rem',color:'var(--text-muted)'}}>type name + enter</span>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   GAME MODE 2: FIND NOTES IN FRET SET
═══════════════════════════════════════ */
function FindNotesGame({ onBack, onRestart, tweaks }) {
  const instrument = tweaks.instrument || 'guitar';
  const nStrings = stringsFor(instrument).length;
  const SET_SIZE = 3 * nStrings;
  const TOTAL_MODE2 = SET_SIZE * FRET_SETS_MODE2.length;
  const [setIdx, setSetIdx] = useState(0);
  const fretSet = FRET_SETS_MODE2[setIdx];
  const [noteQueue, setNoteQueue] = useState(() => notesInSet(FRET_SETS_MODE2[0], nStrings, instrument));
  const [noteQi, setNoteQi] = useState(0);
  const [foundInSet, setFoundInSet] = useState(new Set());
  const [totalFound, setTotalFound] = useState(0);
  const [wrongKey, setWrongKey] = useState(null);
  const [setComplete, setSetComplete] = useState(false);
  const [finished, setFinished] = useState(false);
  const [time, startTimer, stopTimer] = useTimer();
  const [cellTimes, setCellTimes] = useState({});
  const taskStartRef = useRef(0);

  useEffect(() => { startTimer(); taskStartRef.current = Date.now(); }, []);
  // Reset the per-target timer whenever a new target note appears.
  useEffect(() => { taskStartRef.current = Date.now(); }, [noteQi, setIdx]);
  useEffect(() => {
    if (finished) saveResult({ mode: 'find', timeSeconds: time, totalItems: TOTAL_MODE2, avgPerItem: +(time/TOTAL_MODE2).toFixed(2), instrument });
  }, [finished]);
  useEffect(() => {
    function onKey(e) { if (e.key === 'Escape') onBack(); }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const targetNote = noteQueue[noteQi] ?? null;
  const targetPositions = targetNote ? positionsOfNote(targetNote, fretSet, nStrings, instrument) : [];
  const remainingForNote = targetPositions.filter(p => !foundInSet.has(p));

  function clickCell(s, f) {
    if (setComplete || !targetNote) return;
    const key = `${s}-${f}`;
    if (foundInSet.has(key)) return;
    AUDIO.cell(s, f, instrument);
    if (noteAt(s,f,instrument) === targetNote) {
      const elapsed = (Date.now() - taskStartRef.current) / 1000;
      setCellTimes(prev => ({ ...prev, [key]: elapsed }));
      const newFound = new Set(foundInSet); newFound.add(key);
      setFoundInSet(newFound);
      setTotalFound(t => t+1);
      // All occurrences of this note found?
      const remaining = targetPositions.filter(p => !newFound.has(p));
      if (remaining.length === 0) {
        const nextNoteQi = noteQi + 1;
        // All notes in set found?
        if (nextNoteQi >= noteQueue.length) {
          setSetComplete(true);
          const isLastSet = setIdx === FRET_SETS_MODE2.length - 1;
          if (isLastSet && totalFound + 1 >= TOTAL_MODE2) {
            stopTimer();
            setTimeout(() => setFinished(true), 1400);
          } else {
            setTimeout(() => {
              const nextIdx = (setIdx + 1) % FRET_SETS_MODE2.length;
              const nextFretSet = FRET_SETS_MODE2[nextIdx];
              setSetIdx(nextIdx);
              setNoteQueue(notesInSet(nextFretSet, nStrings, instrument));
              setNoteQi(0);
              setFoundInSet(new Set());
              setSetComplete(false);
            }, 1400);
          }
        } else {
          setNoteQi(nextNoteQi);
        }
      }
    } else {
      setWrongKey(key);
      setTimeout(() => setWrongKey(null), 700);
    }
  }

  const markers = [];
  for(let s=0;s<nStrings;s++) for(let f=fretSet[0];f<=fretSet[1];f++) {
    const key = `${s}-${f}`;
    if (foundInSet.has(key)) markers.push({s,f,type:'correct',label:'',opacity:0.45});
    if (wrongKey===key) markers.push({s,f,type:'wrong',label:'✗'});
  }

  const setFoundCount = foundInSet.size;

  if (finished) return (
    <div className="game-wrap" style={{textAlign:'center',gap:32}}>
      <div style={{fontSize:'clamp(2rem,5vw,3rem)',fontWeight:900,fontStyle:'italic',color:'var(--gold)',textShadow:'0 0 40px rgba(200,144,48,0.4)'}}>
        All Clear!
      </div>
      <div style={{fontFamily:'DM Mono',fontSize:'0.85rem',color:'var(--text-dim)',letterSpacing:'0.1em'}}>
        You found every note on the fretboard
      </div>
      <div style={{display:'flex',gap:32,justifyContent:'center',flexWrap:'wrap',fontFamily:'DM Mono',fontSize:'0.8rem',color:'var(--text-dim)'}}>
        <span><span style={{color:'var(--text-muted)'}}>time </span>{time}s</span>
        <span><span style={{color:'var(--text-muted)'}}>notes </span>{TOTAL_MODE2}</span>
        <span><span style={{color:'var(--text-muted)'}}>avg/note </span>{(time/TOTAL_MODE2).toFixed(1)}s</span>
      </div>
      <div style={{width:80,height:1,background:'linear-gradient(90deg,transparent,var(--gold),transparent)',margin:'0 auto'}}/>
      <FretboardHeatmap cellTimes={cellTimes} totalFrets={12} instrument={instrument}
        noteStyle={tweaks.noteStyle} boardType={tweaks.board} theme={tweaks.theme}/>
      <div style={{display:'flex',gap:16,justifyContent:'center',flexWrap:'wrap'}}>
        <button className="submit-btn" style={{fontSize:'0.9rem',padding:'12px 32px'}} onClick={onRestart}>
          ↻ new game
        </button>
        <button className="submit-btn" style={{fontSize:'0.9rem',padding:'12px 32px'}} onClick={onBack}>
          ← back to menu
        </button>
      </div>
    </div>
  );

  return (
    <div className="game-wrap">
      <div className="game-header">
        <span className="game-title">▸ Find Notes in Fret Set</span>
        <button className="back-btn" onClick={onBack}>← back</button>
      </div>

      <div className="fretboard-wrap">
        {/* Mobile: zoom to the active 3-fret band (±2 frets of context). */}
        <Fretboard markers={markers} onCellClick={clickCell} fretSet={fretSet} interactive={true} totalFrets={12} noteStyle={tweaks.noteStyle} boardType={tweaks.board} theme={tweaks.theme} instrument={instrument}
          zoomWindow={(isMobile && window.innerWidth < 960 && fretSet)
            ? (() => { const lo = Math.max(1, Math.min(fretSet[0] - 2, 12 - 6)); return [lo, lo + 6]; })()
            : null}/>
      </div>

      <div className="input-area">
        {setComplete ? (
          <div style={{fontFamily:'DM Mono',fontSize:'0.95rem',color:'var(--correct)',letterSpacing:'0.1em'}}>
            ✓ Set complete! Next set…
          </div>
        ) : (
          <div style={{textAlign:'center'}}>
            <div className="prompt-text">
              Find all&nbsp;<strong style={{color:'var(--gold)',fontSize:'1.6rem'}}>{targetNote ? showNote(targetNote, tweaks.noteStyle) : '—'}</strong>
            </div>
            <div style={{fontFamily:'DM Mono',fontSize:'0.72rem',color:'var(--text-muted)',marginTop:6}}>
              {remainingForNote.length} remaining · frets {fretSet[0]}–{fretSet[1]}
            </div>
          </div>
        )}
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:8,alignItems:'center',width:'100%',maxWidth:600}}>
        <div className="progress-bar-wrap" style={{marginBottom:0}}>
          <div className="progress-label">
            <span>Fret set {setIdx+1}/{FRET_SETS_MODE2.length} · frets {fretSet[0]}–{fretSet[1]}</span>
            <span>{setFoundCount}/{SET_SIZE}</span>
          </div>
          <div className="progress-track">
            <div className="progress-fill" style={{width:`${(setFoundCount/SET_SIZE)*100}%`}}/>
          </div>
        </div>
        <div className="progress-bar-wrap" style={{marginBottom:0}}>
          <div className="progress-label"><span>Fretboard total</span><span>{totalFound}/{TOTAL_MODE2}</span></div>
          <div className="progress-track">
            <div className="progress-fill" style={{width:`${(totalFound/TOTAL_MODE2)*100}%`}}/>
          </div>
        </div>
      </div>

      <div className="stats-row">
        <span><span className="stat-label">time </span><span className="stat-val">{time}s</span></span>
        <span style={{fontFamily:'DM Mono',fontSize:'0.68rem',color:'var(--text-muted)'}}>click all occurrences</span>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   CHORD SHAPE CHART (movable shapes, interval labels only)
═══════════════════════════════════════ */
// Horizontal mini-fretboard in the same orientation as the game board:
// strings as rows (high E on top, low E at the bottom), fret offsets as
// columns increasing to the right. Root-agnostic — dots carry interval
// labels, the root dot is filled. Muted strings get an × at the left.
function ShapeDiagram({ positions }) {
  const maxF = Math.max(...positions.map(p => p.f), 2);
  const cols = maxF + 1;
  const colW = 24, rowH = 15, padL = 16, padR = 6, padY = 9;
  const w = padL + cols*colW + padR, h = padY*2 + rowH*5;
  const yFor = s => padY + s * rowH;
  const xFor = f => padL + (f + 0.5) * colW;
  const used = new Set(positions.map(p => p.s));
  return (
    <svg width={w} height={h} style={{flex:'none'}}>
      {[0,1,2,3,4,5].map(s => (
        <line key={s} x1={padL} y1={yFor(s)} x2={padL+cols*colW} y2={yFor(s)}
          stroke="var(--text-muted)" strokeWidth="1" opacity="0.45"/>
      ))}
      {Array.from({length: cols+1}, (_, c) => (
        <line key={c} x1={padL+c*colW} y1={yFor(0)} x2={padL+c*colW} y2={yFor(5)}
          stroke="var(--text-muted)" strokeWidth="1" opacity="0.45"/>
      ))}
      {[0,1,2,3,4,5].filter(s => !used.has(s)).map(s => (
        <text key={s} x={padL-8} y={yFor(s)+3} textAnchor="middle"
          fontSize="9" fill="var(--text-muted)">×</text>
      ))}
      {positions.map((p, i) => (
        <g key={i}>
          <circle cx={xFor(p.f)} cy={yFor(p.s)} r={6.5}
            fill={p.iv === '1' ? 'var(--gold)' : 'var(--bg)'}
            stroke="var(--gold)" strokeWidth="1.2"/>
          <text x={xFor(p.f)} y={yFor(p.s) + 2.5} textAnchor="middle"
            fontSize={p.iv.length > 2 ? 5.5 : 7} fontWeight="700"
            fontFamily="DM Mono, monospace"
            fill={p.iv === '1' ? 'var(--bg)' : 'var(--text)'}>{p.iv}</text>
        </g>
      ))}
    </svg>
  );
}

function ChordChartModal({ diff, onClose }) {
  const chart = useMemo(() => buildShapeChart(diff), [diff]);
  return (
    <div onClick={onClose} style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,0.65)',

        background:'var(--bg)', border:'1px solid var(--gold-dim)', borderRadius:6,
        padding:'20px 24px', maxWidth:640, width:'92vw', maxHeight:'85vh', overflowY:'auto',
        fontFamily:'DM Mono, monospace', boxShadow:'0 10px 40px rgba(0,0,0,0.55)',
      }}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6}}>

          Movable shapes with interval labels — the filled dot is the root (1).
          Match the pattern on the board, then read the chord from wherever the root sits.
        </div>
        {chart.map(group => (
