/* ═══════════════════════════════════════
   GAME MODE 3: CHORD IDENTIFICATION
═══════════════════════════════════════ */
function ChordGame({ onBack, onRestart, tweaks }) {
  const diff = tweaks.chordDifficulty || 'easy';
  const isBass = (tweaks.instrument || 'guitar') === 'bass';
  const [chords] = useState(() => shuffleArr(chordsForDifficulty(diff)));
  const [ci, setCi] = useState(0);
  const [input, setInput] = useState('');
  const [feedback, setFeedback] = useState(null);
  const [score, setScore] = useState(0);
  const [finished, setFinished] = useState(false);
  const [phase, setPhase] = useState('naming');       // 'naming' | 'intervals'
  const [intervals, setIntervals] = useState([]);
  const [intervalIdx, setIntervalIdx] = useState(0);
  const [solvedSymbols, setSolvedSymbols] = useState(new Set());
  const [hintOpen, setHintOpen] = useState(false);
  const [hintLevel, setHintLevel] = useState(1);      // # of hints revealed (1..N)
  const [chartOpen, setChartOpen] = useState(false);
  const [time, startTimer, stopTimer] = useTimer();
  const inputRef = useRef(null);

  useEffect(() => { startTimer(); }, []);
  useEffect(() => { inputRef.current?.focus(); }, [ci, phase, intervalIdx]);
  useEffect(() => { setHintOpen(false); setHintLevel(1); }, [ci, phase]);
  // Strum the chord whenever a new one appears (naming phase). Slight delay
  // so it doesn't collide with the previous chord's correct-answer feedback.
  useEffect(() => {
    if (phase !== 'naming') return;
    const c = chords[ci % chords.length];
    if (!c?.positions) return;
    const id = setTimeout(() => AUDIO.chord(c.positions, 'guitar'), 120);
    return () => clearTimeout(id);
  }, [ci, phase]);
  useEffect(() => {
    if (finished) saveResult({ mode: 'chord', timeSeconds: time, totalItems: CHORD_GOAL, avgPerItem: +(time/CHORD_GOAL).toFixed(2), difficulty: diff });
  }, [finished]);
  useEffect(() => {
    function onKey(e) {
      if (e.key !== 'Escape') return;
      if (chartOpen) setChartOpen(false);
      else if (hintOpen) setHintOpen(false);
      else onBack();
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [hintOpen, chartOpen]);

  if (isBass) return (
    <div className="game-wrap" style={{maxWidth:480,textAlign:'center',gap:24}}>
      <div className="game-header">
        <span className="game-title">▸ Chord Identification</span>
        <button className="back-btn" onClick={onBack}>← back</button>
      </div>
      <div style={{fontFamily:'DM Mono',fontSize:'0.95rem',color:'var(--text-dim)',lineHeight:1.6,padding:'24px 0'}}>
        Chord mode uses guitar-specific CAGED shapes and isn't available for bass.<br/>
        Switch instrument to <strong style={{color:'var(--gold)'}}>guitar</strong> in Tweaks to play.
      </div>
      <button className="submit-btn" style={{fontSize:'0.9rem',padding:'12px 32px'}} onClick={onBack}>
        ← back to menu
      </button>
    </div>
  );

  const chord = chords[ci % chords.length];

  function advanceToNextChord(newScore) {
    if (newScore >= CHORD_GOAL) {
      stopTimer();
      setTimeout(() => setFinished(true), 700);
    } else {
      setTimeout(() => {
        setFeedback(null); setInput('');
        setCi(c => c + 1);
        setPhase('naming');
        setSolvedSymbols(new Set());
      }, 700);
    }
  }

  function handleNaming(name) {
    const norm = name.trim().toLowerCase().replace(/\s+/g,' ');
    if (chordNameCorrect(norm, chord.name.toLowerCase())) {
      setFeedback('correct');
      const ivs = buildChordIntervals(chord);
      setTimeout(() => {
        setFeedback(null); setInput('');
        setIntervals(ivs);
        setIntervalIdx(0);
        setSolvedSymbols(new Set());
        setPhase('intervals');
      }, 600);
    } else {
      setFeedback('wrong');
      setTimeout(() => { setFeedback(null); setInput(''); inputRef.current?.focus(); }, 1200);
    }
  }

  function handleInterval(note) {
    const current = intervals[intervalIdx];
    if (!current) return;
    if (note === current.note) {
      // Ring all fingered positions of this interval (handles octave doublings)
      chord.positions
        .filter(p => p.iv === current.symbol)
        .forEach(p => AUDIO.cell(p.s, p.f, 'guitar'));
      const newSolved = new Set(solvedSymbols);
      newSolved.add(current.symbol);
      setSolvedSymbols(newSolved);
      setFeedback('correct');
      const nextIdx = intervalIdx + 1;
      if (nextIdx >= intervals.length) {
        const newScore = score + 1;
        setScore(newScore);
        advanceToNextChord(newScore);
      } else {
        setTimeout(() => { setFeedback(null); setInput(''); setIntervalIdx(nextIdx); }, 600);
      }
    } else {
      setFeedback('wrong');
      setTimeout(() => { setFeedback(null); setInput(''); inputRef.current?.focus(); }, 1200);
    }
  }

  function submit() {
    if (!input.trim()) return;
    if (phase === 'naming') {
      handleNaming(input);
    } else {
      const current = intervals[intervalIdx];
      if (current && matchNote(input, current.note)) handleInterval(current.note);
      else handleInterval(input);
    }
  }

  // Skip current chord: reveal answer, mark as wrong, advance without scoring.
  function handleSolve() {
    setHintOpen(false);
    setInput(displayChordName(chord.name, tweaks.noteStyle));
    setFeedback('wrong');
    setTimeout(() => {
      setFeedback(null); setInput('');
      setCi(c => c + 1);
      setPhase('naming');
      setSolvedSymbols(new Set());
    }, 1600);
  }

  if (finished) return (
    <div className="game-wrap" style={{maxWidth:480,textAlign:'center',gap:32}}>
      <div style={{fontSize:'clamp(2rem,5vw,3rem)',fontWeight:900,fontStyle:'italic',color:'var(--gold)',textShadow:'0 0 40px rgba(200,144,48,0.4)'}}>
        Well Done!
      </div>
      <div style={{fontFamily:'DM Mono',fontSize:'0.85rem',color:'var(--text-dim)',letterSpacing:'0.1em'}}>
        You identified {CHORD_GOAL} chords
      </div>
      <div style={{display:'flex',gap:40,justifyContent:'center',fontFamily:'DM Mono',fontSize:'0.8rem',color:'var(--text-dim)'}}>
        <span><span style={{color:'var(--text-muted)'}}>time </span>{time}s</span>
        <span><span style={{color:'var(--text-muted)'}}>chords </span>{CHORD_GOAL}</span>
        <span><span style={{color:'var(--text-muted)'}}>avg/chord </span>{(time/CHORD_GOAL).toFixed(1)}s</span>
      </div>
      <div style={{width:80,height:1,background:'linear-gradient(90deg,transparent,var(--gold),transparent)',margin:'0 auto'}}/>
      <div style={{display:'flex',gap:16,justifyContent:'center',flexWrap:'wrap'}}>
        <button className="submit-btn" style={{fontSize:'0.9rem',padding:'12px 32px'}} onClick={onRestart}>
          ↻ new game
        </button>
        <button className="submit-btn" style={{fontSize:'0.9rem',padding:'12px 32px'}} onClick={onBack}>
          ← back to menu
        </button>
      </div>
    </div>
  );

  // During interval phase: hide labels on unsolved dots, reveal note names on solved ones
  const hideIv = (tweaks.chordIntervals || 'show') === 'hide';
  const markers = chord.positions.map(({s, f, iv}) => {
    if (phase === 'naming') return { s, f, type:'interval', label: hideIv ? '' : iv };
    const solved = solvedSymbols.has(iv);
    return {
      s, f,
      type:  solved ? 'correct' : 'interval',
      label: solved ? showNote(noteAt(s, f), tweaks.noteStyle) : '',
    };
  });

  const currentIv = phase === 'intervals' ? intervals[intervalIdx] : null;

  // Hint helpers — derive root + quality from "<root> <quality>" name format.
  const QUALITY_HINTS = {
    'major':  'Major triad — bright, stable sound.',
    'minor':  'Minor triad — darker, somber sound.',
    '7':      'Dominant 7th — bluesy and unresolved.',
    'maj7':   'Major 7th — jazzy and dreamy.',
    'm7':     'Minor 7th — smooth and mellow.',
    'sus2':   'Suspended 2nd — open, no 3rd.',
    'sus4':   'Suspended 4th — open, no 3rd.',
    'add9':   'Add 9 — major chord with an added 9th, no 7th.',
    '9':      'Dominant 9th — extended dominant chord.',
    '7#9':    'Dominant 7♯9 — the "Hendrix" chord.',
    '6':      'Major 6th — sweet, jazzy resolution chord.',
    'm6':     'Minor 6th — dark Dorian flavor.',
    '6/9':    'Six-nine — lush jazz ending chord.',
    'maj9':   'Major 9th — soft and floating.',
    'm9':     'Minor 9th — smooth soul/R&B color.',
    'm(maj7)':'Minor major 7th — tense, film-noir sound.',
    'm7b5':   'Half-diminished — the ii chord of minor keys.',
    'dim7':   'Diminished 7th — symmetric, maximum tension.',
    'aug':    'Augmented — raised 5th, unresolved lift.',
    '7sus4':  'Dominant 7 sus4 — funky, no 3rd.',
    '7b5':    'Dominant 7 flat 5 — tritone-sub color.',
    '7#5':    'Augmented dominant — altered tension.',
    '7b9':    'Dominant 7 flat 9 — dark jazz dominant.',
    '13':     'Dominant 13th — the full jazz dominant.',
  };
  const chordParts = (() => {
    // Names use both 'C major' (with space) and 'Bm7' / 'Bbsus2' (no space).
    const m = chord.name.match(/^([A-G][#b]?)\s*(.+)$/);
    return m ? { root: m[1], quality: m[2] } : { root: '?', quality: chord.name };
  })();
  const hintTexts = [
    QUALITY_HINTS[chordParts.quality] || `Quality: ${chordParts.quality}`,
    `The root's natural letter is ${chordParts.root[0]} (accidental hidden).`,
  ];

  return (
    <div className="game-wrap">
      <div className="game-header">
        <span className="game-title">▸ Chord Identification</span>
        <button className="back-btn" onClick={onBack}>← back</button>
      </div>

      <div className="fretboard-wrap">
        {/* Always 12 frets: the shape pool uses positions up to fret 12, so a
            7/9-fret board (FRETS tweak) would clip chords off the edge. */}
        <Fretboard markers={markers} totalFrets={12} noteStyle={tweaks.noteStyle} boardType={tweaks.board} theme={tweaks.theme}/>
      </div>

      <div className="input-area">
        {phase === 'naming' ? (<>
          <div className="prompt-text">Which chord is this?</div>
          {isMobile ? (<>
            <ChordKeyboard onChord={name => !feedback && handleNaming(name)} disabled={!!feedback} noteStyle={tweaks.noteStyle} difficulty={diff}/>
            <button className="submit-btn" onClick={() => setHintOpen(true)}
              style={{alignSelf:'center', marginTop:6, padding:'8px 22px', fontSize:'0.8rem'}}>
              ? hints
            </button>
          </>) : (
            <div className="note-input-row">
              <input ref={inputRef}
                className={`note-input chord-input-wide ${feedback||''}`}
                value={input} onChange={e => setInput(e.target.value)}
                onKeyDown={e => e.key==='Enter' && submit()}
                placeholder="chord name…" disabled={feedback==='correct'}
                autoComplete="off" spellCheck="false"/>
              <button className="submit-btn" onClick={submit}>Enter ↵</button>
              <button className="submit-btn" onClick={() => setHintOpen(true)}
                      title="Show hints" aria-label="Show hints"
                      style={{padding:'10px 14px',fontSize:'0.95rem',fontWeight:700}}>?</button>
            </div>
          )}
          <div className={`feedback-msg ${feedback||''}`}>
            {feedback==='correct' && '✓ Correct!'}
            {feedback==='wrong' && '✗ Wrong, try again!'}
          </div>
          {!isMobile && <div style={{fontFamily:'DM Mono',fontSize:'0.68rem',color:'var(--text-muted)',marginTop:4}}>
            Numbers show intervals: 1=root  3=major 3rd  b3=minor 3rd  5=fifth  b7=minor 7th
          </div>}
        </>) : (<>
          <div style={{fontFamily:'DM Mono',fontSize:'0.75rem',color:'var(--text-muted)',marginBottom:6}}>
            Chord: <span style={{color:'var(--gold)',fontWeight:700}}>{displayChordName(chord.name, tweaks.noteStyle)}</span>
            &nbsp;·&nbsp;{solvedSymbols.size}/{intervals.length} intervals found
          </div>
          <div className="prompt-text">
            What is the <span style={{color:'var(--gold)'}}>{currentIv && IV_LABEL[currentIv.symbol]}</span>?
          </div>
          {isMobile ? (
            <NoteKeyboard onNote={n => !feedback && handleInterval(n)} disabled={!!feedback} noteStyle={tweaks.noteStyle}/>
          ) : (
            <div className="note-input-row">
              <input ref={inputRef}
                className={`note-input ${feedback||''}`}
                value={input} onChange={e => setInput(e.target.value)}
                onKeyDown={e => e.key==='Enter' && submit()}
                placeholder="note…" maxLength={4}
                disabled={feedback==='correct'}
                autoComplete="off" spellCheck="false"/>
              <button className="submit-btn" onClick={submit}>Enter ↵</button>
            </div>
          )}
          <div className={`feedback-msg ${feedback||''}`}>
            {feedback==='correct' && '✓ Correct!'}
            {feedback==='wrong' && '✗ Wrong, try again!'}
          </div>
        </>)}
      </div>

      <div className="progress-bar-wrap">
        <div className="progress-label">
          <span>Progress</span>
          <span>{score}/{CHORD_GOAL}</span>
        </div>
        <div className="progress-track">
          <div className="progress-fill" style={{width:`${(score/CHORD_GOAL)*100}%`}}/>
        </div>
      </div>

      <div className="stats-row">
        <span><span className="stat-label">time </span><span className="stat-val">{time}s</span></span>
        <span><span className="stat-label">score </span><span className="stat-val good">{score}</span></span>
      </div>

      {hintOpen && phase === 'naming' && (
        <div onClick={() => setHintOpen(false)} style={{
          position:'fixed', inset:0, background:'rgba(0,0,0,0.55)',
          display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000,
        }}>
          <div onClick={e => e.stopPropagation()} style={{
            background:'var(--bg)', border:'1px solid var(--gold-dim)',
            padding:'22px 26px', borderRadius:6, minWidth:300, maxWidth:420,
            fontFamily:'DM Mono, monospace', boxShadow:'0 10px 40px rgba(0,0,0,0.55)',
          }}>
            <div style={{fontSize:'0.72rem', color:'var(--gold)', letterSpacing:'0.18em',
                         marginBottom:14, textTransform:'uppercase'}}>
              Hints
            </div>
            <ol style={{margin:0, paddingLeft:18, fontSize:'0.85rem',
                        color:'var(--text)', lineHeight:1.7}}>
              {hintTexts.slice(0, hintLevel).map((h, i) =>
                <li key={i} style={{marginBottom:6}}>{h}</li>
              )}
            </ol>
            <div style={{display:'flex', gap:10, marginTop:20,
                         justifyContent:'space-between', flexWrap:'wrap'}}>
              <div style={{display:'flex', gap:10, flexWrap:'wrap'}}>
                {hintLevel < hintTexts.length ? (
                  <button className="submit-btn" onClick={() => setHintLevel(l => l + 1)}>
                    Reveal another
                  </button>
                ) : (
                  <span style={{fontSize:'0.7rem', color:'var(--text-muted)',
                                alignSelf:'center'}}>All hints revealed</span>
                )}
                <button className="submit-btn" onClick={() => setChartOpen(true)}>
                  Chord chart
                </button>
              </div>
              <div style={{display:'flex', gap:10}}>
                <button className="submit-btn" onClick={() => setHintOpen(false)}>Close</button>
                <button className="submit-btn" onClick={handleSolve}
                        style={{borderColor:'var(--wrong)', color:'var(--wrong)'}}>
                  Solve
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      {chartOpen && <ChordChartModal diff={diff} onClose={() => setChartOpen(false)}/>}
    </div>
  );
}

/* ═══════════════════════════════════════
   GAME MODE 4: FIND TRIADS
═══════════════════════════════════════ */
// A "chord set" = all valid triad voicings of one chord on the current
// stringset. The player completes 5 chord sets before the next stringset.
const CHORD_SETS_PER_STRINGSET = 5;

// Build a shuffled queue of {root, quality} chords that each have at least one
// playable triad voicing on the given stringset within `totalFrets`. Major and
// minor only for now.
function buildTriadChordQueue(stringSet, totalFrets, instrument) {
  const candidates = [];
  for (const root of CHROMATIC) {
    for (const quality of ['major', 'minor', 'dim']) {
      if (findTriads(root, quality, stringSet, totalFrets, instrument).length > 0) {
        candidates.push({ root, quality });
      }
    }
  }
  return shuffleArr(candidates);
}

function FindTriadsGame({ onBack, onRestart, tweaks }) {
  const totalFrets = tweaks.frets;
  const instrument = tweaks.instrument || 'guitar';
  const nStrings = stringsFor(instrument).length;
  const stringSets = useMemo(() => triadStringSets(nStrings), [nStrings]);
  const TOTAL_CHORD_SETS = stringSets.length * CHORD_SETS_PER_STRINGSET;

  const [setIdx, setSetIdx] = useState(0);
  const currentSet = stringSets[setIdx];

  const [chordQueue, setChordQueue] = useState(() =>
    buildTriadChordQueue(stringSets[0], totalFrets, instrument));
  const [chordIdx, setChordIdx] = useState(0);
  const currentChord = chordQueue[chordIdx % Math.max(1, chordQueue.length)];

  const [marks, setMarks] = useState([]);                          // in-progress: 0–3 {s,f}
  const [foundTriadsThisChord, setFoundTriadsThisChord] = useState([]); // cleared on chord change
  const [chordSetsCompletedThisSet, setChordSetsCompletedThisSet] = useState(0);
  const [totalChordSetsCompleted, setTotalChordSetsCompleted] = useState(0);
  const [feedback, setFeedback] = useState(null);                  // 'correct' | 'wrong'
  const [wrongMarks, setWrongMarks] = useState(null);
  const [setComplete, setSetComplete] = useState(false);
  const [finished, setFinished] = useState(false);
  const [time, startTimer, stopTimer] = useTimer();

  useEffect(() => { startTimer(); }, []);
  useEffect(() => {
    if (finished) saveResult({ mode:'triads', timeSeconds:time, totalItems:TOTAL_CHORD_SETS, avgPerItem:+(time/TOTAL_CHORD_SETS).toFixed(2), instrument });
  }, [finished]);
  useEffect(() => {
    function onKey(e) {
      if (e.key === 'Escape') {
        if (marks.length > 0) setMarks([]);
        else onBack();
      }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [marks]);

  // Wipe found-triad markers when the chord prompt changes so the new chord
  // starts on a clean board. Counters are unaffected.
  useEffect(() => {
    setFoundTriadsThisChord([]);
    setMarks([]);
  }, [chordIdx]);

  const validTriadsForChord = useMemo(() =>
    currentChord ? findTriads(currentChord.root, currentChord.quality, currentSet, totalFrets, instrument) : [],
    [currentChord, currentSet, totalFrets, instrument]);

  const foundKeysThisChord = useMemo(() =>
    new Set(foundTriadsThisChord.map(triadKey)),
    [foundTriadsThisChord]);

  const remainingForChord = validTriadsForChord.filter(t => !foundKeysThisChord.has(triadKey(t)));

  function clickCell(s, f) {
    if (setComplete || finished || feedback) return;
    if (!currentSet.includes(s)) return;

    // Ignore clicks on cells that already belong to a found triad of the
    // CURRENT chord (foundTriadsThisChord is cleared on chord change).
    if (foundTriadsThisChord.some(t => t.some(p => p.s === s && p.f === f))) return;

    // Toggle an existing mark off.
    const existingIdx = marks.findIndex(m => m.s === s && m.f === f);
    if (existingIdx >= 0) {
      setMarks(marks.filter((_, i) => i !== existingIdx));
      return;
    }

    AUDIO.cell(s, f, instrument);

    const newMarks = [...marks, { s, f }];
    if (newMarks.length < 3) {
      setMarks(newMarks);
      return;
    }

    // 3 marks — validate as a triad of the current chord.
    const key = triadKey(newMarks);
    const matched = validTriadsForChord.find(t => triadKey(t) === key);

    if (matched && !foundKeysThisChord.has(key)) {
      const updatedFound = [...foundTriadsThisChord, matched];
      setFoundTriadsThisChord(updatedFound);
      setFeedback('correct');
      setMarks(newMarks);
      setTimeout(() => {
        setFeedback(null);
        setMarks([]);
      }, 500);

      // Did this complete the current chord's set of triads?
      const chordSetComplete = validTriadsForChord.every(t =>
        updatedFound.some(ft => triadKey(ft) === triadKey(t)));

      if (chordSetComplete) {
        const newChordSetsThisSet = chordSetsCompletedThisSet + 1;
        const newTotal = totalChordSetsCompleted + 1;
        setChordSetsCompletedThisSet(newChordSetsThisSet);
        setTotalChordSetsCompleted(newTotal);

        if (newChordSetsThisSet >= CHORD_SETS_PER_STRINGSET) {
          setSetComplete(true);
          const isLastSet = setIdx === stringSets.length - 1;
          if (isLastSet) {
            stopTimer();
            setTimeout(() => setFinished(true), 1400);
          } else {
            setTimeout(() => {
              const nextIdx = setIdx + 1;
              const nextSet = stringSets[nextIdx];
              setSetIdx(nextIdx);
              setChordQueue(buildTriadChordQueue(nextSet, totalFrets, instrument));
              setChordIdx(0);
              setFoundTriadsThisChord([]);
              setChordSetsCompletedThisSet(0);
              setSetComplete(false);
              setMarks([]);
            }, 1400);
          }
        } else {
          // Advance to the next chord prompt within this stringset.
          setTimeout(() => setChordIdx(c => c + 1), 700);
        }
      }
    } else {
      setFeedback('wrong');
      setWrongMarks(newMarks);
      setMarks(newMarks);
      setTimeout(() => {
        setFeedback(null);
        setWrongMarks(null);
        setMarks([]);
      }, 800);
    }
  }

  if (finished) return (
    <div className="game-wrap" style={{maxWidth:480,textAlign:'center',gap:32}}>
      <div style={{fontSize:'clamp(2rem,5vw,3rem)',fontWeight:900,fontStyle:'italic',color:'var(--gold)',textShadow:'0 0 40px rgba(200,144,48,0.4)'}}>
        Triad Master!
      </div>
      <div style={{fontFamily:'DM Mono',fontSize:'0.85rem',color:'var(--text-dim)',letterSpacing:'0.1em'}}>
        You completed every triad set across all string sets
      </div>
      <div style={{display:'flex',gap:32,justifyContent:'center',flexWrap:'wrap',fontFamily:'DM Mono',fontSize:'0.8rem',color:'var(--text-dim)'}}>
        <span><span style={{color:'var(--text-muted)'}}>time </span>{time}s</span>
        <span><span style={{color:'var(--text-muted)'}}>triad sets </span>{TOTAL_CHORD_SETS}</span>
        <span><span style={{color:'var(--text-muted)'}}>avg/set </span>{(time/TOTAL_CHORD_SETS).toFixed(1)}s</span>
      </div>
      <div style={{width:80,height:1,background:'linear-gradient(90deg,transparent,var(--gold),transparent)',margin:'0 auto'}}/>
      <div style={{display:'flex',gap:16,justifyContent:'center',flexWrap:'wrap'}}>
        <button className="submit-btn" style={{fontSize:'0.9rem',padding:'12px 32px'}} onClick={onRestart}>
          ↻ new game
        </button>
        <button className="submit-btn" style={{fontSize:'0.9rem',padding:'12px 32px'}} onClick={onBack}>
          ← back to menu
        </button>
      </div>
    </div>
  );

  // Markers: found triads (green, faint, with note name) + current marks (cyan) + wrong-flash (red ✗)
  const markers = [];
  for (const triad of foundTriadsThisChord) {
    for (const p of triad) {
      markers.push({
        s: p.s, f: p.f,
        type: 'correct',
        label: showNote(noteAt(p.s, p.f, instrument), tweaks.noteStyle),
        opacity: 0.55,
      });
    }
  }
  const wrongKeySet = new Set((wrongMarks || []).map(m => `${m.s}-${m.f}`));
  for (const m of marks) {
    const key = `${m.s}-${m.f}`;
    if (wrongKeySet.has(key)) {
      markers.push({ s: m.s, f: m.f, type: 'wrong', label: '✗' });
    } else {
      markers.push({
        s: m.s, f: m.f,
        type: feedback === 'correct' ? 'correct' : 'marked',
        label: showNote(noteAt(m.s, m.f, instrument), tweaks.noteStyle),
      });
    }
  }

  const tuning = stringsFor(instrument);
  const stringLabels = currentSet.map(s => tuning[s]).join('-');
  const qualityWord = currentChord ? currentChord.quality : '';
  const chordDisplay = currentChord
    ? `${showNote(currentChord.root, tweaks.noteStyle)} ${qualityWord}`
    : '—';

  return (
    <div className="game-wrap">
      <div className="game-header">
        <span className="game-title">▸ Find Triads</span>
        <button className="back-btn" onClick={onBack}>← back</button>
      </div>

      <div className="fretboard-wrap">
        <Fretboard
          markers={markers}
          onCellClick={clickCell}
          stringSet={currentSet}
          interactive={true}
          totalFrets={totalFrets}
          noteStyle={tweaks.noteStyle}
          boardType={tweaks.board}
          theme={tweaks.theme}
          instrument={instrument}
        />
      </div>

      <div className="input-area">
        {setComplete ? (
          <div style={{fontFamily:'DM Mono',fontSize:'0.95rem',color:'var(--correct)',letterSpacing:'0.1em'}}>
            ✓ String set complete! Next set…
          </div>
        ) : (
          <div style={{textAlign:'center'}}>
            <div className="prompt-text">
              Find all&nbsp;<strong style={{color:'var(--gold)',fontSize:'1.6rem'}}>{chordDisplay}</strong>&nbsp;triads
            </div>
            <div style={{fontFamily:'DM Mono',fontSize:'0.72rem',color:'var(--text-muted)',marginTop:6}}>
              {foundTriadsThisChord.length}/{validTriadsForChord.length} triads found · click 3 notes to form a triad
            </div>
          </div>
        )}
        <div className={`feedback-msg ${feedback||''}`}>
          {feedback==='correct' && '✓ Triad found!'}
          {feedback==='wrong' && '✗ Not a valid ' + chordDisplay + ' triad'}
        </div>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:8,alignItems:'center',width:'100%',maxWidth:600}}>
        <div className="progress-bar-wrap" style={{marginBottom:0}}>
          <div className="progress-label">
            <span>String set {setIdx+1}/{stringSets.length} · {stringLabels}</span>
            <span>{chordSetsCompletedThisSet}/{CHORD_SETS_PER_STRINGSET} triad sets</span>
          </div>
          <div className="progress-track">
            <div className="progress-fill" style={{width:`${(chordSetsCompletedThisSet/CHORD_SETS_PER_STRINGSET)*100}%`}}/>
          </div>
        </div>
        <div className="progress-bar-wrap" style={{marginBottom:0}}>
          <div className="progress-label"><span>Total triad sets</span><span>{totalChordSetsCompleted}/{TOTAL_CHORD_SETS}</span></div>
          <div className="progress-track">
            <div className="progress-fill" style={{width:`${(totalChordSetsCompleted/TOTAL_CHORD_SETS)*100}%`}}/>
          </div>
        </div>
      </div>

      <div className="stats-row">
        <span><span className="stat-label">time </span><span className="stat-val">{time}s</span></span>
        <span style={{fontFamily:'DM Mono',fontSize:'0.68rem',color:'var(--text-muted)'}}>click 3 notes on the highlighted strings · Esc clears marks</span>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   GAME MODE 5: FREE LEARNING
═══════════════════════════════════════ */
function FreeLearn({ onBack, tweaks }) {
  const totalFrets = tweaks.frets;
  const instrument = tweaks.instrument || 'guitar';
  const nStrings = stringsFor(instrument).length;
  const [revealed, setRevealed] = useState({});
  const [sel, setSel] = useState({s:0,f:1});
  const [scaleRoot, setScaleRoot] = useState('C');
  const [scaleType, setScaleType] = useState(null);

  const scaleSet = scaleType ? new Set(scaleNotes(scaleRoot, {
    major: MAJOR_SCALE, minor: MINOR_SCALE,
    dorian: DORIAN_SCALE, mixo: MIXOLYDIAN_SCALE, 'harm.min': HARMONIC_MINOR_SCALE,
    'pent.maj': PENTATONIC_MAJOR, 'pent.min': PENTATONIC_MINOR
  }[scaleType])) : null;
  // When a full scale is shown, also compute its pentatonic subset so we can
  // visually distinguish the "safe" pentatonic tones from the rest. Minor-
  // flavored scales overlay the minor pentatonic, the rest the major one.
  // Pure pentatonic modes treat every scale tone as pentatonic.
  const pentatonicSet = scaleType ? new Set(scaleNotes(scaleRoot,
    ['minor','pent.min','dorian','harm.min'].includes(scaleType) ? PENTATONIC_MINOR : PENTATONIC_MAJOR
  )) : null;

  function handleCellClick(s, f) {
    AUDIO.cell(s, f, instrument);
    const key = `${s}-${f}`;
    setRevealed(prev => {
      const n = {...prev};
      if (n[key]) delete n[key]; else n[key] = showNote(noteAt(s,f,instrument), tweaks.noteStyle);
      return n;
    });
    setSel({s,f});
  }

  useEffect(() => {
    function onKey(e) {
      const {s,f} = sel;
      if (e.key==='ArrowUp'||e.key==='k') setSel({s:Math.max(0,s-1),f});
      else if (e.key==='ArrowDown'||e.key==='j') setSel({s:Math.min(nStrings-1,s+1),f});
      else if (e.key==='ArrowLeft'||e.key==='h') setSel({s,f:Math.max(0,f-1)});
      else if (e.key==='ArrowRight'||e.key==='l') setSel({s,f:Math.min(totalFrets,f+1)});
      else if (e.key===' ') { e.preventDefault(); handleCellClick(s,f); }
      else if (e.key==='r') setRevealed({});
      else if (e.key==='Escape') onBack();
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [sel, revealed, totalFrets, nStrings]);

  // Identify chords from the revealed notes' pitch classes — any voicing, any
  // position, any instrument. Fires as soon as a full triad (or power chord)
  // is on the board and lists every valid name for the same notes.
  const matchedChords = useMemo(() => {
    // Lowest sounding note gives inversions their slash bass (C/E).
    const open = OPEN_MIDI[instrument] || OPEN_MIDI.guitar;
    const pcs = new Set();
    let bassMidi = Infinity, bassPc = null;
    for (const k of Object.keys(revealed)) {
      const [s, f] = k.split('-').map(Number);
      const pc = CHROMATIC.indexOf(noteAt(s, f, instrument));
      pcs.add(pc);
      const midi = open[s] + f;
      if (midi < bassMidi) { bassMidi = midi; bassPc = pc; }
    }
    return identifyChords(pcs, bassPc).slice(0, 6);
  }, [revealed, instrument]);

  // Build scale markers
  const scaleMarkers = [];
  if (scaleSet) {
    for(let s=0;s<nStrings;s++) for(let f=1;f<=totalFrets;f++) {
      const n = noteAt(s,f,instrument);
      if (scaleSet.has(n) && !revealed[`${s}-${f}`]) {
        const isRoot = n === scaleRoot;
        const isPent = pentatonicSet && pentatonicSet.has(n);
        const type = isRoot ? 'root' : isPent ? 'pentatonic' : 'interval';
        scaleMarkers.push({ s, f, type, label: n });
      }
    }
  }

  return (
    <div className="game-wrap">
      <div className="game-header">
        <span className="game-title">▸ Free Learning</span>
        <button className="back-btn" onClick={onBack}>← back</button>
      </div>

      <div className="fretboard-wrap">
        <Fretboard
          markers={scaleMarkers}
          showNotes={revealed}
          onCellClick={handleCellClick}
          interactive={true}
          selectedCell={sel}
          totalFrets={totalFrets}
          noteStyle={tweaks.noteStyle} boardType={tweaks.board} theme={tweaks.theme}
          freeLearn={true}
          instrument={instrument}
        />
      </div>

      <div style={{textAlign:'center',fontFamily:'DM Mono',fontSize:'0.85rem',
        color: matchedChords.length > 0 ? 'var(--gold,#c89030)' : 'var(--text-dim,#888)',
        padding:'6px 0'}}>
        {matchedChords.length > 0
          ? matchedChords.map((c,i) => {
              // Slash bass gets a single enharmonic name — "A major/C#/Db"
              // would read like a double slash chord.
              const name = showNote(c.root, tweaks.noteStyle) + c.suf
                + (c.bass ? '/' + showNote(c.bass, tweaks.noteStyle === 'flat' ? 'flat' : 'sharp') : '');
              const parts = c.tones.map(t => `${t.label}: ${showNote(t.note, tweaks.noteStyle)}`);
              return <div key={i}>{i > 0 && <hr style={{border:'none',borderTop:'1px solid var(--text-dim,#444)',margin:'4px 0'}}/>}<strong>{name}</strong>{c.no5 ? ' (no 5th)' : ''} ({parts.join(', ')})</div>;
            })
          : 'no chord identified yet'}
      </div>

      <div className="scale-row">
        <select className="root-select" value={scaleRoot} onChange={e=>setScaleRoot(e.target.value)}>
          {CHROMATIC.map(n=><option key={n} value={n}>{showNote(n, tweaks.noteStyle)}</option>)}
        </select>
        {['major','minor','dorian','mixo','harm.min','pent.maj','pent.min'].map(t => (
          <button key={t} className={`scale-btn ${scaleType===t?'active':''}`}
            onClick={()=>setScaleType(p=>p===t?null:t)}>{t}</button>
        ))}
        <button className="scale-btn" onClick={()=>setRevealed({})}>clear</button>
      </div>

      {scaleSet && (() => {
        const t = tweaks.theme;
        const swatch = {
          root:       t === 'metal' ? '#ffd070' : t === 'funk' ? '#ffd060' : '#ffe890',
          pentatonic: t === 'metal' ? '#90f0b0' : t === 'funk' ? '#b8f070' : '#a0d878',
          interval:   t === 'metal' ? '#a0d8ff' : t === 'funk' ? '#c890ff' : '#90c8e8',
        };
        const dot = c => ({display:'inline-block',width:9,height:9,borderRadius:'50%',
                           background:c,marginRight:6,verticalAlign:'middle',
                           boxShadow:`0 0 6px ${c}88`});
        const isPureP = scaleType === 'pent.maj' || scaleType === 'pent.min';
        return (
          <div className="free-legend" style={{justifyContent:'center'}}>
            <span><span style={dot(swatch.root)}/>root</span>
            {!isPureP && <span><span style={dot(swatch.pentatonic)}/>pentatonic</span>}
            {!isPureP && <span><span style={dot(swatch.interval)}/>diatonic</span>}
            {isPureP && <span><span style={dot(swatch.pentatonic)}/>pentatonic tones</span>}
          </div>
        );
      })()}

      <div className="free-legend">
        <span><span>↑↓←→</span> / hjkl: move</span>
        <span><span>Space</span>: reveal/hide</span>
        <span><span>click</span>: reveal note</span>
        <span><span>r</span>: clear all</span>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   GAME MODE 6: NOTE LIST
═══════════════════════════════════════ */
function NoteListGame({ onBack, tweaks }) {
  const [notes, setNotes] = useState(() => shuffleArr(CHROMATIC));
  const [key, setKey] = useState(0);

  function shuffle() { setNotes(shuffleArr(CHROMATIC)); setKey(k=>k+1); }

  useEffect(() => {
    function onKey(e) {
      if (e.key==='n' || e.key===' ' || e.key==='Enter') { e.preventDefault(); shuffle(); }
      else if (e.key==='Escape'||e.key==='b') onBack();
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  return (
    <div className="game-wrap" style={{maxWidth:480}}>
      <div className="game-header">
        <span className="game-title">▸ Note List</span>
        <button className="back-btn" onClick={onBack}>← back</button>
      </div>

      <div className="note-list-wrap" key={key} onTouchStart={shuffle} style={{cursor:'pointer',WebkitTapHighlightColor:'transparent'}}>
        <div className="note-list-title">Chromatic Scale</div>
        <div className="note-list-items">
          {notes.map((n) => (
            <div key={n} className="note-list-item">{showNote(n, tweaks?.noteStyle)}</div>
          ))}
        </div>
        <div className="note-list-hint" style={{marginTop:24}}>
          <span>space</span> / <span>enter</span> / <span>n</span>: shuffle &nbsp; <span>Esc</span>: back
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   STATS VIEW
═══════════════════════════════════════ */
const MODE_LABELS = { random: 'Random Note', find: 'Find Notes', chord: 'Chords', triads: 'Triads' };

function ProgressGraph({ mode, stats }) {
  // Hooks must be called unconditionally before any early return.
  const [hover, setHover] = useState(null);
  const data = stats.filter(s => s.mode === mode);
  if (data.length < 2) return null;
  const W = 480, H = 120, PX = 40, PY = 16;
  const avgs = data.map(d => d.avgPerItem);
  const maxY = Math.max(...avgs) * 1.15;
  const points = data.map((d, i) => ({
    x: PX + (i / (data.length - 1)) * (W - 2*PX),
    y: PY + (1 - d.avgPerItem / maxY) * (H - 2*PY),
    avg: d.avgPerItem,
  }));
  const polyline = points.map(p => `${p.x},${p.y}`).join(' ');
  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{width:'100%',maxWidth:W}}>
      {[0.25,0.5,0.75].map(t => (
        <line key={t} x1={PX} y1={PY + t*(H-2*PY)} x2={W-PX} y2={PY + t*(H-2*PY)}
          stroke="var(--border)" strokeWidth="0.5"/>
      ))}
      <text x={4} y={PY+4} fontSize="9" fill="var(--text-muted)" fontFamily="DM Mono">
        {maxY.toFixed(1)}s
      </text>
      <text x={4} y={H-PY+4} fontSize="9" fill="var(--text-muted)" fontFamily="DM Mono">0s</text>
      <polyline points={polyline} fill="none" stroke="var(--gold)" strokeWidth="1.5"
        strokeLinejoin="round" strokeLinecap="round"/>
      {points.map((p,i) => (
        <g key={i}>
          <circle cx={p.x} cy={p.y} r={hover===i?4:2.5} fill="var(--gold)"/>
          <circle cx={p.x} cy={p.y} r={10} fill="transparent"
            style={{cursor:'pointer'}}
            onMouseEnter={() => setHover(i)}
            onMouseLeave={() => setHover(h => h===i ? null : h)}>
            <title>{`${p.avg.toFixed(2)}s avg/item`}</title>
          </circle>
        </g>
      ))}
      {hover !== null && (() => {
        const p = points[hover];
        const label = `${p.avg.toFixed(2)}s`;
        const tw = label.length * 6 + 12;
        const above = p.y - 14 > PY;
        const tx = Math.min(Math.max(p.x - tw/2, 2), W - tw - 2);
        const ty = above ? p.y - 22 : p.y + 8;
        return (
          <g style={{pointerEvents:'none'}}>
            <rect x={tx} y={ty} width={tw} height={16} rx="3"
              fill="var(--bg,#1a1a1a)" stroke="var(--gold)" strokeWidth="0.8" opacity="0.95"/>
            <text x={tx + tw/2} y={ty + 11} textAnchor="middle"
              fontSize="10" fontFamily="DM Mono" fill="var(--gold)">{label}</text>
          </g>
        );
      })()}
    </svg>
  );
}

function StatsView({ onBack }) {
  const [stats, setStats] = useState(loadStats);
  const [filter, setFilter] = useState('all');
  const [confirmReset, setConfirmReset] = useState(false);

  useEffect(() => {
    function onKey(e) {
      if (e.key !== 'Escape') return;
      if (confirmReset) setConfirmReset(false);
      else onBack();
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [confirmReset]);

  // Auto-cancel the reset confirm if the user doesn't follow through.
  useEffect(() => {
    if (!confirmReset) return;
    const t = setTimeout(() => setConfirmReset(false), 4000);
    return () => clearTimeout(t);
  }, [confirmReset]);

  function removeEntry(ts) {
    setStats(prev => {
      const next = prev.filter(s => s.timestamp !== ts);
      localStorage.setItem(STATS_KEY, JSON.stringify(next));
      return next;
    });
  }

  function resetAll() {
    if (!confirmReset) { setConfirmReset(true); return; }
    setStats(() => {
      localStorage.setItem(STATS_KEY, JSON.stringify([]));
      return [];
    });
    setConfirmReset(false);
  }

  const filtered = filter === 'all' ? stats : stats.filter(s => s.mode === filter);
  const recent = [...filtered].reverse().slice(0, 20);

  function formatDate(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString(undefined, { month:'short', day:'numeric' })
      + ' ' + d.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
  }

  return (
    <div className="game-wrap" style={{maxWidth:560}}>
      <div className="game-header">
        <span className="game-title">▸ Stats</span>
        <button className="back-btn" onClick={onBack}>← back</button>
      </div>

      <div className="scale-row">
        {['all','random','find','chord','triads'].map(m => (
          <button key={m} className={`scale-btn ${filter===m?'active':''}`}
            onClick={() => setFilter(m)}>
            {m === 'all' ? 'All' : MODE_LABELS[m]}
          </button>
        ))}
      </div>

      <div style={{display:'flex',gap:32,flexWrap:'wrap',justifyContent:'center',
        fontFamily:'DM Mono',fontSize:'0.8rem',color:'var(--text-dim)'}}>
        <span><span style={{color:'var(--text-muted)'}}>sessions </span>{filtered.length}</span>
        {filtered.length > 0 && <>
          <span><span style={{color:'var(--text-muted)'}}>best avg </span>
            {Math.min(...filtered.map(s=>s.avgPerItem)).toFixed(2)}s</span>
          <span><span style={{color:'var(--text-muted)'}}>last avg </span>
            {filtered[filtered.length-1].avgPerItem.toFixed(2)}s</span>
        </>}
      </div>

      {(filter === 'all' ? ['random','find','chord','triads'] : [filter]).map(m => {
        const modeData = stats.filter(s => s.mode === m);
        if (modeData.length < 2) return null;
        return (
          <div key={m} style={{width:'100%'}}>
            <div style={{fontFamily:'DM Mono',fontSize:'0.7rem',color:'var(--text-muted)',
              letterSpacing:'0.1em',marginBottom:8}}>
              {MODE_LABELS[m]} — avg/item over time (lower is better)
            </div>
            <ProgressGraph mode={m} stats={stats}/>
          </div>
        );
      })}

      {recent.length === 0 ? (
        <div style={{fontFamily:'DM Mono',fontSize:'0.8rem',color:'var(--text-muted)',
          textAlign:'center',padding:'32px 0'}}>
          No sessions yet. Complete a game to see stats here.
        </div>
      ) : (<>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
          width:'100%',marginTop:8,paddingBottom:6,
          borderBottom:'1px solid var(--border)'}}>
          <span style={{fontFamily:'DM Mono',fontSize:'0.7rem',
            color:'var(--text-muted)',letterSpacing:'0.1em',textTransform:'uppercase'}}>
            Recent sessions
          </span>
          {stats.length > 0 && (
            <button className="scale-btn"
              onClick={resetAll}
              style={{fontSize:'0.65rem',padding:'4px 10px',
                      borderColor: confirmReset ? 'var(--wrong)' : undefined,
                      color: confirmReset ? 'var(--wrong)' : undefined}}>
              {confirmReset ? 'click again to confirm' : 'reset all'}
            </button>
          )}
        </div>
        {recent.some(s => s.mode === 'random') && (
          <div style={{fontFamily:'DM Mono',fontSize:'0.65rem',color:'var(--text-muted)',
            display:'flex',gap:14,alignItems:'center',flexWrap:'wrap',
            padding:'6px 12px 4px',letterSpacing:'0.04em'}}>
            <span style={{display:'inline-flex',gap:6,alignItems:'center'}}>
              <span style={{display:'inline-flex',gap:2}}>
                {[0,1,2,3,4,5].map(i => (
                  <span key={i} style={{width:6,height:6,borderRadius:'50%',
                    background:'var(--gold)',border:'1px solid var(--gold)'}}/>
                ))}
              </span>
              strings (1 = high → N = low)
            </span>
            <span style={{display:'inline-flex',gap:6,alignItems:'center'}}>
              <span style={{display:'inline-flex',gap:2}}>
                {[0,1,2,3].map(i => (
                  <span key={i} style={{width:10,height:5,borderRadius:1,
                    background:'var(--gold)',border:'1px solid var(--gold)'}}/>
                ))}
              </span>
              fret sets (1-3 · 4-6 · 7-9 · 10-12)
            </span>
            <span>filled = active</span>
          </div>
        )}
        <div style={{width:'100%',display:'flex',flexDirection:'column',gap:0}}>
          {recent.map(s => (
            <div key={s.timestamp} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
              padding:'8px 12px',borderBottom:'1px solid var(--border)',
              fontFamily:'DM Mono',fontSize:'0.72rem'}}>
              <span style={{color:'var(--text-muted)',minWidth:120}}>{formatDate(s.timestamp)}</span>
              <span style={{color:'var(--gold-dim)',display:'inline-flex',alignItems:'center',gap:8}}>
                {MODE_LABELS[s.mode]}
                {s.mode === 'random' && (() => {
                  // Legacy entries lack `strings`/`fretSets`; assume all-on.
                  const stringFallback = Array(s.instrument === 'bass' ? 4 : 6).fill(true);
                  const dots = s.strings || stringFallback;
                  const onStrings = dots.map((on,i) => on ? (i+1) : null).filter(Boolean).join(',');
                  const bandLabels = ['1-3','4-6','7-9','10-12'];
                  const bars = s.fretSets || [true,true,true,true];
                  const onBands = bars.map((on,i) => on ? bandLabels[i] : null).filter(Boolean).join(',');
                  const legacy = !s.strings && !s.fretSets ? ' (legacy, assumed)' : '';
                  return (<>
                    <span style={{display:'inline-flex',gap:2}}
                      title={`Active strings: ${onStrings}${legacy}`}>
                      {dots.map((on, i) => (
                        <span key={i} style={{width:6,height:6,borderRadius:'50%',
                          background: on ? 'var(--gold)' : 'transparent',
                          border:`1px solid ${on ? 'var(--gold)' : 'var(--text-muted)'}`}}/>
                      ))}
                    </span>
                    <span style={{display:'inline-flex',gap:2}}
                      title={`Active fret sets: ${onBands}${legacy}`}>
                      {bars.map((on, i) => (
                        <span key={i} style={{width:10,height:5,borderRadius:1,
                          background: on ? 'var(--gold)' : 'transparent',
                          border:`1px solid ${on ? 'var(--gold)' : 'var(--text-muted)'}`}}/>
                      ))}
                    </span>
                  </>);
                })()}
              </span>
              <span style={{color:'var(--text-dim)'}}>{s.timeSeconds}s</span>
              <span style={{color:'var(--text-dim)'}}>{s.avgPerItem.toFixed(2)}s/item</span>
              <button onClick={() => removeEntry(s.timestamp)}
                aria-label="Remove this entry" title="Remove this entry"
                style={{background:'transparent',border:'none',cursor:'pointer',
                        color:'var(--text-muted)',fontSize:'0.95rem',lineHeight:1,
                        padding:'2px 6px',marginLeft:6,borderRadius:3}}
                onMouseEnter={e => e.currentTarget.style.color = 'var(--wrong)'}
                onMouseLeave={e => e.currentTarget.style.color = 'var(--text-muted)'}>
                ×
              </button>
            </div>
          ))}
        </div>
      </>)}
    </div>
  );
}

/* ═══════════════════════════════════════
   MENU
═══════════════════════════════════════ */
const MENU_ITEMS = [
  { id:'random',  label:'Guess a random note' },
  { id:'find',    label:'Find notes in fret sets' },
  { id:'chord',   label:'Identify Chords' },
  { id:'triads',  label:'Find triads on string sets' },
  { id:'free',    label:'Free learning — explore the fretboard' },
  { id:'notes',   label:'Simple random note list' },
  { id:'stats',   label:'View session stats & progress' },
];

function Menu({ onSelect }) {
  const [active, setActive] = useState(0);

  useEffect(() => {
    function onKey(e) {
      if (e.key==='ArrowUp'||e.key==='k') setActive(a=>Math.max(0,a-1));
      else if (e.key==='ArrowDown'||e.key==='j') setActive(a=>Math.min(MENU_ITEMS.length-1,a+1));
      else if (e.key==='Enter') onSelect(MENU_ITEMS[active].id);
      else {
        const n = parseInt(e.key);
        if (n>=1&&n<=6) onSelect(MENU_ITEMS[n-1].id);
      }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [active]);

  return (
    <div className="menu-wrap">
      <div className="menu-logo">Fremorizer</div>
      <div className="menu-tagline">guitar fretboard trainer</div>
      <div className="menu-divider"/>
      <ul className="menu-list">
        {MENU_ITEMS.slice(0, 6).map((item, i) => (
          <li key={item.id}
            className={`menu-item ${i===active?'active':''}`}
            onClick={() => onSelect(item.id)}
            onMouseEnter={() => setActive(i)}>
            <span className="menu-num">{i+1}.</span>
            <span className="menu-label">{item.label}</span>
          </li>
        ))}
      </ul>
      <div style={{width:60,height:1,background:'linear-gradient(90deg,transparent,var(--border),transparent)',margin:'16px auto'}}/>
      <ul className="menu-list">
        {MENU_ITEMS.slice(6).map((item, i) => (
          <li key={item.id}
            className={`menu-item ${i+6===active?'active':''}`}
            style={{justifyContent:'center'}}
            onClick={() => onSelect(item.id)}
            onMouseEnter={() => setActive(i+6)}>
            <span className="menu-label">{item.label}</span>
          </li>
        ))}
      </ul>
      <div className="menu-hint">
        <span>↑↓</span> navigate &nbsp; <span>Enter</span> select &nbsp; <span>1–6</span> quick select
      </div>

      <div className="amp-panel">
        <div className="amp-label">also available as CLI</div>
        <div className="amp-screws">
          <div className="amp-screw"/>
          <div className="amp-screw"/>
        </div>
        <div className="amp-content">
          Visit: <a href="https://github.com/funkymcb/Fremorizer" target="_blank" rel="noopener noreferrer">github.com/funkymcb/Fremorizer</a><br/>
          Or run: <span className="amp-cmd">ssh -p 2222 fremorizer.com</span>
        </div>
      </div>
    </div>
  );
}

function ContactFooter() {
  return (
    <div className="contact-footer">
      contact · <a href="mailto:admin@fremorizer.com">admin@fremorizer.com</a>
    </div>
  );
}

/* ═══════════════════════════════════════
   TWEAKS
═══════════════════════════════════════ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "frets": 12,
  "noteStyle": "both",
  "theme": "vintage",
  "board": "rosewood",
  "chordDifficulty": "easy",
  "chordIntervals": "show",
  "instrument": "guitar",
  "randomGameStrings": [true, true, true, true, true, true],
  "randomGameFretSets": [true, true, true, true]
}/*EDITMODE-END*/;

const TWEAKS_KEY = 'frem_tweaks';

function loadTweaks() {
  try {
    const saved = JSON.parse(localStorage.getItem(TWEAKS_KEY));
    if (!saved || typeof saved !== 'object') return TWEAK_DEFAULTS;
    return { ...TWEAK_DEFAULTS, ...saved };
  } catch { return TWEAK_DEFAULTS; }
}

function ThemeBar({ tweaks, setTweaks }) {
  return (
    <div className="theme-bar">
      <div className="theme-group">
        <div className="theme-group-label">Design</div>
        <div className="theme-group-btns">
          {[['vintage','Vintage'],['metal','Metal'],['funk','Funk']].map(([val,label]) => (
            <button key={val} className={`theme-btn ${tweaks.theme===val?'active':''}`}
              onClick={() => setTweaks(t=>({...t,theme:val}))}>{label}</button>
          ))}
        </div>
      </div>
      <div className="theme-sep"/>
      <div className="theme-group">
        <div className="theme-group-label">Fretboard</div>
        <div className="theme-group-btns">
          {[['rosewood','Rosewood'],['maple','Maple']].map(([val,label]) => (
            <button key={val} className={`theme-btn ${tweaks.board===val?'active':''}`}
              onClick={() => setTweaks(t=>({...t,board:val}))}>{label}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

function TweaksPanel({ tweaks, setTweaks, onClose }) {
  const ref = useRef(null);
  const [showChordInfo, setShowChordInfo] = useState(false);
  useEffect(() => {
    function onDocDown(e) {
      if (ref.current && !ref.current.contains(e.target)) onClose?.();
    }
    document.addEventListener('mousedown', onDocDown);
    document.addEventListener('touchstart', onDocDown);
    return () => {
      document.removeEventListener('mousedown', onDocDown);
      document.removeEventListener('touchstart', onDocDown);
    };
  }, [onClose]);
  return (
    <div className="tweaks-panel" ref={ref}>
      <div className="tweaks-title">Tweaks</div>
      <div className="tweak-row">
        <div className="tweak-label">THEME</div>
        <div className="tweak-options">
          {[['vintage','Vintage'],['metal','Metal'],['funk','Funk']].map(([val,label]) => (
            <button key={val} className={`tweak-opt ${tweaks.theme===val?'active':''}`}
              onClick={() => setTweaks(t=>({...t,theme:val}))}>{label}</button>
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <div className="tweak-label">FINGERBOARD</div>
        <div className="tweak-options">
          {[['rosewood','Rosewood'],['maple','Maple']].map(([val,label]) => (
            <button key={val} className={`tweak-opt ${tweaks.board===val?'active':''}`}
              onClick={() => setTweaks(t=>({...t,board:val}))}>{label}</button>
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <div className="tweak-label">INSTRUMENT</div>
        <div className="tweak-options">
          {[['guitar','Guitar'],['bass','Bass']].map(([val,label]) => (
            <button key={val} className={`tweak-opt ${(tweaks.instrument||'guitar')===val?'active':''}`}
              onClick={() => setTweaks(t=>({...t,instrument:val}))}>{label}</button>
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <div className="tweak-label">FRETS</div>
        <div className="tweak-options">
          {[7,9,12].map(n => (
            <button key={n} className={`tweak-opt ${tweaks.frets===n?'active':''}`}
              onClick={() => setTweaks(t=>({...t,frets:n}))}>{n}</button>
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <div className="tweak-label">NOTE STYLE</div>
        <div className="tweak-options">
          {['sharp','flat','both'].map(s => (
            <button key={s} className={`tweak-opt ${tweaks.noteStyle===s?'active':''}`}
              onClick={() => setTweaks(t=>({...t,noteStyle:s}))}>{s}</button>
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <div className="tweak-label">RANDOM NOTE GAME STRINGS</div>
        <div className="tweak-options">
          {stringsFor(tweaks.instrument || 'guitar').map((note, idx) => {
            const arr = tweaks.randomGameStrings || [];
            const active = arr[idx] !== false;
            return (
              <button key={idx} className={`tweak-opt ${active?'active':''}`}
                title={`String ${idx+1} — open ${note}`}
                onClick={() => setTweaks(t => {
                  const n = stringsFor(t.instrument || 'guitar').length;
                  const next = Array.from({length:n}, (_, i) => (t.randomGameStrings || [])[i] !== false);
                  // Keep at least one string enabled.
                  if (active && next.filter(Boolean).length <= 1) return t;
                  next[idx] = !active;
                  return {...t, randomGameStrings: next};
                })}>
                {idx+1}:{note}
              </button>
            );
          })}
        </div>
      </div>
      <div className="tweak-row">
        <div className="tweak-label">RANDOM NOTE GAME FRET SETS</div>
        <div className="tweak-options">
          {[[1,3],[4,6],[7,9],[10,12]].map(([lo,hi], idx) => {
            const arr = tweaks.randomGameFretSets || [];
            const active = arr[idx] !== false;
            return (
              <button key={idx} className={`tweak-opt ${active?'active':''}`}
                title={`Frets ${lo}–${hi}`}
                onClick={() => setTweaks(t => {
                  const next = Array.from({length:4}, (_, i) => (t.randomGameFretSets || [])[i] !== false);
                  // Keep at least one fret set enabled.
                  if (active && next.filter(Boolean).length <= 1) return t;
                  next[idx] = !active;
                  return {...t, randomGameFretSets: next};
                })}>
                {lo}-{hi}
              </button>
            );
          })}
        </div>
      </div>
      <div className="tweak-row">
        <div className="tweak-label">
          CHORD DIFFICULTY
          <span onClick={() => setShowChordInfo(v => !v)}
            style={{marginLeft:6,cursor:'pointer',display:'inline-block',width:16,height:16,
              lineHeight:'16px',textAlign:'center',borderRadius:'50%',fontSize:'0.6rem',
              fontWeight:700,border:'1px solid var(--text-muted)',color:'var(--text-muted)',
              verticalAlign:'middle',userSelect:'none'}}>?</span>
        </div>
        <div className="tweak-options">
          {['easy','medium','hard','pro'].map(d => (
            <button key={d} className={`tweak-opt ${tweaks.chordDifficulty===d?'active':''}`}
              onClick={() => setTweaks(t=>({...t,chordDifficulty:d}))}>{d}</button>
          ))}
        </div>
      </div>
      {showChordInfo && (
        <div style={{padding:'8px 12px',fontSize:'0.7rem',fontFamily:'DM Mono',color:'var(--text-muted)',
          lineHeight:1.5,borderTop:'1px solid var(--border-subtle,rgba(128,128,128,0.15))'}}>
          <div><b>Easy</b> — major, minor</div>
          <div><b>Medium</b> — + dominant 7th, sus2, sus4, add9</div>
          <div><b>Hard</b> — + maj7, m7, 9th, 7#9</div>
          <div><b>Pro</b> — + 6, m6, 6/9, maj9, m9, m(maj7), m7b5, dim7, aug, 7sus4, 7b5, 7#5, 7b9, 13</div>
        </div>
      )}
      <div className="tweak-row">
        <div className="tweak-label">CHORD INTERVALS</div>
        <div className="tweak-options">
          {['show','hide'].map(v => (
            <button key={v} className={`tweak-opt ${(tweaks.chordIntervals||'show')===v?'active':''}`}
              onClick={() => setTweaks(t=>({...t,chordIntervals:v}))}>{v}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   APP
═══════════════════════════════════════ */
function App() {
  const [mode, setMode] = useState(() => localStorage.getItem('frem_mode') || null);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweaks, setTweaks] = useState(loadTweaks);
  const [muted, setMuted] = useState(() => AUDIO.muted);
  function toggleMute() {
    const next = !muted;
    AUDIO.setMuted(next);
    setMuted(next);
    // Briefly play a tone when unmuting so the user hears confirmation.
    if (!next) AUDIO.note('A', 4);
  }

  useEffect(() => {
    localStorage.setItem(TWEAKS_KEY, JSON.stringify(tweaks));
  }, [tweaks]);

  // Warm the sample cache on first render so the first note doesn't wait
  // on network + decodeAudioData. Runs after paint so it never blocks UI.
  useEffect(() => { AUDIO.preload(); }, []);

  // Apply theme + board to <html>
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', tweaks.theme);
    document.body.style.backgroundColor =
      tweaks.theme === 'metal' ? '#06080a' :
      tweaks.theme === 'funk'  ? '#0d0420' : '';
  }, [tweaks.theme]);

  useEffect(() => {
    if (mode) document.documentElement.setAttribute('data-in-game', '');
    else document.documentElement.removeAttribute('data-in-game');
  }, [mode]);

  useEffect(() => {
    if (mode) localStorage.setItem('frem_mode', mode);
    else localStorage.removeItem('frem_mode');
  }, [mode]);

  // Tweaks toggle via keyboard shortcut (T key on the menu screen)
  useEffect(() => {
    function handler(e) {
      if (!mode && e.key === 't') setTweaksOpen(o => !o);
    }
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [mode]);

  function back() { setMode(null); }
  // Bumping the key remounts the active game component, restarting the
  // current mode with the same tweaks/settings.
  const [gameKey, setGameKey] = useState(0);
  function restart() { setGameKey(k => k + 1); }

  return (
    <>
      {!mode && <Menu onSelect={setMode}/>}
      {mode==='random' && <RandomNoteGame key={gameKey} onBack={back} onRestart={restart} tweaks={tweaks}/>}
      {mode==='find' && <FindNotesGame key={gameKey} onBack={back} onRestart={restart} tweaks={tweaks}/>}
      {mode==='chord' && <ChordGame key={gameKey} onBack={back} onRestart={restart} tweaks={tweaks}/>}
      {mode==='triads' && <FindTriadsGame key={gameKey} onBack={back} onRestart={restart} tweaks={tweaks}/>}
      {mode==='free' && <FreeLearn onBack={back} tweaks={tweaks}/>}
      {mode==='notes' && <NoteListGame onBack={back} tweaks={tweaks}/>}
      {mode==='stats' && <StatsView onBack={back}/>}
      {tweaksOpen && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} onClose={() => setTweaksOpen(false)}/>}
      {!tweaksOpen && (
        <button className="tweaks-cta" onClick={() => setTweaksOpen(true)} aria-label="Open tweaks">
          <span className="tweaks-cta-icon">⚙</span>
          <span className="tweaks-cta-label">Tweak it</span>
        </button>
      )}
      <button
        className={`audio-cta ${muted ? 'muted' : 'on'}`}
        onClick={toggleMute}
        aria-label={muted ? 'Unmute sound' : 'Mute sound'}
        title={muted ? 'Sound off — click to enable' : 'Sound on — click to mute'}>
        <span className="audio-cta-icon">{muted ? '🔇' : '🔊'}</span>
        <span className="audio-cta-label">{muted ? 'Muted' : 'Sound'}</span>
      </button>
      <ContactFooter/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
