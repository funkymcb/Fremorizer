name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Declare the minimum permissions at workflow level; jobs narrow further where possible.
permissions:
  contents: read

jobs:
  # ── 1. build binaries for every target platform ─────────────────────────────
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: true
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify module checksums
        run: go mod verify

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BIN="fremorizer"
          [ "$GOOS" = "windows" ] && BIN="${BIN}.exe"
          go build -trimpath -ldflags="-s -w" -o "${BIN}" .

      - name: Package archive
        run: |
          TAG="${{ github.ref_name }}"
          NAME="fremorizer-${TAG}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${NAME}.zip" fremorizer.exe
          else
            tar czf "${NAME}.tar.gz" fremorizer
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fremorizer-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            fremorizer-*.tar.gz
            fremorizer-*.zip
          if-no-files-found: error
          retention-days: 1 # only needed until the release job picks them up

  # ── 2. publish GitHub Release with all archives + checksums ─────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write # required to create a release and upload assets

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Generate SHA-256 checksums
        working-directory: dist/
        run: sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true # auto-generates changelog from commits

  # ── 3. build and push Docker image to GHCR ──────────────────────────────────
  docker:
    name: Publish Docker Image
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write # required to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
